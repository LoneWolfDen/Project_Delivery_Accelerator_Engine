<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Share Your Feedback</title>
<style>
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--text-dim:#8b949e;--accent:#58a6ff;--green:#3fb950;
  --green-dim:#238636;--yellow:#d29922;--red:#f85149;--radius:6px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;}
.wrap{width:100%;max-width:580px;}
.logo{font-size:15px;font-weight:700;color:var(--text);margin-bottom:24px;display:flex;align-items:center;gap:8px;}
.logo span{color:var(--accent);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;margin-bottom:14px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:10px;}
label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:4px;font-weight:500;}
input,textarea,select{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:7px 10px;border-radius:var(--radius);font-size:12px;width:100%;
  transition:border-color .15s;font-family:inherit;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);}
textarea{resize:vertical;min-height:70px;line-height:1.5;}
.form-row{margin-bottom:12px;}
.btn{display:inline-flex;align-items:center;gap:5px;background:var(--accent);
  color:#000;border:none;padding:8px 16px;border-radius:var(--radius);
  cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;
  border:1px solid var(--border);color:var(--text-dim);}
.tag-blue{border-color:#1f6feb;color:var(--accent);background:rgba(88,166,255,.08);}
.tag-green{border-color:var(--green-dim);color:var(--green);background:rgba(63,185,80,.08);}
.hint{font-size:11px;color:var(--text-dim);margin-bottom:6px;}
.success{text-align:center;padding:40px 20px;}
.success .icon{font-size:48px;margin-bottom:14px;}
.success h2{font-size:20px;margin-bottom:8px;color:var(--green);}
.success p{color:var(--text-dim);font-size:13px;}
.error-msg{padding:12px;background:rgba(248,81,73,.08);border:1px solid var(--red);
  border-radius:var(--radius);color:var(--red);font-size:12px;margin-bottom:12px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">⚡ <span>Contexta</span> — Client Feedback</div>
  <div id="app"><div class="card"><p style="color:var(--text-dim);font-size:12px">Loading…</p></div></div>
</div>

<script>
const token=new URLSearchParams(window.location.search).get('token')||'';

async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  try{const r=await fetch(path,opts);return r.json();}catch(e){return{error:e.message};}
}

async function init(){
  if(!token){
    document.getElementById('app').innerHTML=
      '<div class="card"><p class="error-msg">No feedback token provided. This link may be invalid.</p></div>';
    return;
  }
  const r=await api('GET',`/api/feedback/form?token=${encodeURIComponent(token)}`);
  if(!r.valid){
    document.getElementById('app').innerHTML=
      `<div class="card"><p class="error-msg">${r.error||'This link is invalid or has expired.'}</p></div>`;
    return;
  }
  renderForm(r);
}

function renderForm(ctx){
  const proposal=ctx.proposal||{};
  const verId=ctx.proposal_ver_id||'';
  const versions=proposal.versions||[];
  const ver=versions.find(v=>v.version_id===verId)||versions.slice(-1)[0]||{};

  document.getElementById('app').innerHTML=`
    <div class="card">
      <p style="font-size:13px;color:var(--text-dim);margin-bottom:4px">You have been invited to review</p>
      <h2 style="font-size:18px;margin-bottom:4px">${escH(proposal.proposal_name||ctx.project_name||'Proposal')}</h2>
      ${proposal.client?`<p style="font-size:12px;color:var(--text-dim);margin-bottom:12px">Client: ${escH(proposal.client)}</p>`:''}
      ${ver.label?`<div class="flex" style="gap:6px;margin-bottom:10px">
        <span class="tag tag-blue">${escH(ver.label)}</span>
        ${ver.status?`<span class="tag">${ver.status}</span>`:''}
      </div>`:''}
      ${ver.notes?`<p style="font-size:12px;color:var(--text-dim);margin-bottom:4px">${escH(ver.notes)}</p>`:''}
    </div>

    <div class="card">
      <div class="card-title">Your Details</div>
      <div class="form-row"><label>Your Name</label>
        <input id="fbName" placeholder="e.g. Sarah Chen" autocomplete="name"></div>
      <div class="form-row"><label>Email (optional)</label>
        <input id="fbEmail" type="email" placeholder="s.chen@company.com" autocomplete="email"></div>
    </div>

    <div class="card">
      <div class="card-title">✅ What are you happy to proceed with?</div>
      <p class="hint">One item per line. E.g. "Migration phased approach"</p>
      <textarea id="fbAccepted" rows="4" placeholder="Migration phased approach&#10;AWS as primary cloud provider"></textarea>
    </div>

    <div class="card">
      <div class="card-title">✗ What are you not comfortable with?</div>
      <p class="hint">Items you want removed, changed, or reconsidered.</p>
      <textarea id="fbRejected" rows="3" placeholder="Full re-platform in Phase 1"></textarea>
    </div>

    <div class="card">
      <div class="card-title">⚠ Questions or concerns</div>
      <p class="hint">Anything you'd like clarified before proceeding.</p>
      <textarea id="fbConcerns" rows="4" placeholder="Timeline too aggressive — Q4 freeze conflict&#10;Need dedicated security review before sign-off"></textarea>
    </div>

    <div class="card">
      <div class="card-title">Additional Notes</div>
      <textarea id="fbNotes" rows="3" placeholder="Any other feedback for the delivery team…"></textarea>
    </div>

    <div id="submitError"></div>
    <button class="btn" id="submitBtn" onclick="submitFeedback()">Submit Feedback</button>
    <p style="font-size:10px;color:var(--text-dim);margin-top:12px">
      This link is for one-time use. Your response will be shared with the delivery team.
    </p>`;
}

function escH(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function splitLines(s){
  return (s||'').split('\n').map(l=>l.trim()).filter(Boolean);
}

async function submitFeedback(){
  const btn=document.getElementById('submitBtn');
  const errEl=document.getElementById('submitError');
  btn.disabled=true;btn.textContent='Submitting…';
  errEl.innerHTML='';

  const body={
    token,
    responder_name:document.getElementById('fbName').value.trim(),
    responder_email:document.getElementById('fbEmail').value.trim(),
    accepted:splitLines(document.getElementById('fbAccepted').value),
    rejected:splitLines(document.getElementById('fbRejected').value),
    concerns:splitLines(document.getElementById('fbConcerns').value),
    notes:document.getElementById('fbNotes').value.trim(),
  };

  const r=await api('POST','/api/feedback/submit',body);
  if(r.status==='submitted'){
    document.getElementById('app').innerHTML=`
      <div class="card success">
        <div class="icon">✅</div>
        <h2>Thank you for your feedback!</h2>
        <p>Your response has been received and will be reviewed by the delivery team.</p>
      </div>`;
  }else{
    errEl.innerHTML=`<p class="error-msg">${r.error||'Submission failed. Please try again.'}</p>`;
    btn.disabled=false;btn.textContent='Submit Feedback';
  }
}

init();
</script>
</body>
</html>
