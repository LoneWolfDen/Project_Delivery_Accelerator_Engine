<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Delivery Accelerator v3</title>
<style>
:root {
  --bg: #0f1419; --surface: #1a2332; --surface2: #243447;
  --border: #2d4055; --text: #e6edf3; --text-dim: #8b949e;
  --accent: #58a6ff; --accent2: #3fb950; --warn: #d29922; --danger: #f85149;
  --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5; }
header { background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
header h1 { font-size: 16px; font-weight: 600; white-space:nowrap; }
header .phase-badge { background: var(--accent); color:#000; padding:2px 10px;
  border-radius: 12px; font-size: 11px; font-weight: 600; }
.proj-select { background:var(--surface2); border:1px solid var(--border);
  color:var(--text); padding:5px 10px; border-radius:var(--radius); font-size:12px; }
nav { display:flex; gap:3px; margin-left:auto; flex-wrap:wrap; }
nav button { background:transparent; color:var(--text-dim); border:none;
  padding:7px 12px; border-radius:var(--radius); cursor:pointer; font-size:12px; }
nav button:hover, nav button.active { background:var(--surface2); color:var(--accent); }
main { max-width:1100px; margin:0 auto; padding:20px; }
</style>
</head>
<body>
<div id="app">
  <header id="header"></header>
  <main id="main"></main>
</div>

<style>
.card { background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:18px; margin-bottom:14px; }
.card h2 { font-size:14px; margin-bottom:10px; color:var(--accent); }
.card h3 { font-size:12px; margin:10px 0 5px; color:var(--text-dim); }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; }
.stat { text-align:center; padding:10px; background:var(--surface2); border-radius:var(--radius); }
.stat .num { font-size:24px; font-weight:700; color:var(--accent); }
.stat .label { font-size:10px; color:var(--text-dim); text-transform:uppercase; }
ul.items { list-style:none; }
ul.items li { padding:5px 0; border-bottom:1px solid var(--border); font-size:12px; }
ul.items li:last-child { border:none; }
.btn { background:var(--accent); color:#000; border:none; padding:7px 14px;
  border-radius:var(--radius); cursor:pointer; font-size:12px; font-weight:600; }
.btn:hover { opacity:0.85; }
.btn-outline { background:transparent; color:var(--accent); border:1px solid var(--accent); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn-warn { background:var(--warn); color:#000; }
.btn-danger { background:var(--danger); color:#fff; }
input,select,textarea { background:var(--surface2); border:1px solid var(--border);
  color:var(--text); padding:7px 10px; border-radius:var(--radius); font-size:12px; width:100%; }
select { width:auto; min-width:140px; }
textarea { resize:vertical; min-height:60px; font-family:inherit; }
.form-row { margin-bottom:10px; }
.form-row label { display:block; font-size:11px; color:var(--text-dim); margin-bottom:3px; }
.flex { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.mt { margin-top:10px; }
.empty { text-align:center; padding:32px; color:var(--text-dim); }
.tag { display:inline-block; background:var(--surface2); padding:2px 8px;
  border-radius:10px; font-size:10px; margin:2px; }
.tag-ok { border:1px solid var(--accent2); color:var(--accent2); }
.tag-off { border:1px solid var(--text-dim); color:var(--text-dim); }
.findings-section { margin:8px 0; }
.findings-section .title { font-size:11px; font-weight:600; color:var(--text-dim);
  margin-bottom:3px; text-transform:uppercase; }
.findings-section li { font-size:12px; padding:3px 0; }
.prompt-box { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
  padding:10px; font-family:monospace; font-size:11px; white-space:pre-wrap;
  max-height:300px; overflow-y:auto; margin-top:8px; color:var(--text-dim); }
.collapsible summary { cursor:pointer; font-size:12px; color:var(--accent); margin-top:8px; }
.backend-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:6px; margin-top:8px; }
.backend-chip { padding:6px 10px; border-radius:var(--radius); font-size:11px;
  background:var(--surface2); border:1px solid var(--border); text-align:center; }
.backend-chip.available { border-color:var(--accent2); }
/* File Explorer */
.file-explorer { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.file-item { border-bottom:1px solid var(--border); }
.file-item:last-child { border-bottom:none; }
.file-header { display:flex; align-items:center; gap:8px; padding:10px 12px; cursor:pointer;
  font-size:12px; transition:background 0.15s; }
.file-header:hover { background:var(--surface2); }
.file-chevron { font-size:9px; color:var(--text-dim); transition:transform 0.2s; width:12px; }
.file-item.expanded .file-chevron { transform:rotate(90deg); }
.file-icon { font-size:14px; }
.file-name { font-weight:600; color:var(--text); }
.file-body { display:none; padding:0 12px 10px 34px; }
.file-item.expanded .file-body { display:block; }
.file-section { padding:3px 0; font-size:11px; color:var(--text-dim);
  border-left:2px solid var(--border); padding-left:8px; margin:3px 0; }
.section-title { color:var(--text); font-weight:500; }
.file-toggle { font-size:10px; padding:3px 8px; border-radius:10px; cursor:pointer;
  margin-left:auto; font-weight:600; user-select:none; white-space:nowrap; }
.toggle-on { background:rgba(63,185,80,0.15); color:var(--accent2); border:1px solid var(--accent2); }
.toggle-off { background:rgba(248,81,73,0.1); color:var(--danger); border:1px solid var(--danger); }
</style>

<script>
// ─── API Helper ───
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  try { const r = await fetch(path, opts); return r.json(); }
  catch(e) { return {error: e.message}; }
}

// ─── State ───
let state = { projects:[], current:null, tab:'dashboard', backends:[], adminConfig:{}, health:{}, lastDeepDive:null };
const TABS = ['dashboard','ingest','intelligence','versions','reviews','phases','admin'];

// ─── Header ───
function renderHeader() {
  const proj = state.current;
  const phase = proj ? proj.phase : '';
  const options = state.projects.map(p =>
    `<option value="${p.id}" ${p.id===(proj?.id)?'selected':''}>${p.name}</option>`
  ).join('');
  document.getElementById('header').innerHTML = `
    <h1>Accelerator</h1>
    ${phase ? `<span class="phase-badge">${phase}</span>` : ''}
    ${state.projects.length ? `<select class="proj-select" onchange="selectProject(this.value)">${options}</select>` : '<span style="color:var(--text-dim);font-size:12px">No projects</span>'}
    <nav>${TABS.map(t=>`<button class="${state.tab===t?'active':''}" onclick="switchTab('${t}')">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}
      <button class="${state.tab==='settings'?'active':''}" onclick="switchTab('settings')">⚙</button>
    </nav>`;
}

function switchTab(tab) { state.tab = tab; render(); }

async function render() {
  renderHeader();
  const main = document.getElementById('main');
  const views = {
    dashboard: viewDashboard, ingest: viewIngest, intelligence: viewIntelligence,
    versions: viewVersions, reviews: viewReviews,
    phases: viewPhases, settings: viewSettings, admin: viewAdmin
  };
  main.innerHTML = await (views[state.tab] || viewDashboard)();
}
</script>

<script>
// ─── Dashboard View (V3: Hierarchy-aware with version/review selectors) ───
async function viewDashboard() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;

  // Load hierarchy metrics (defaults to latest version + latest review)
  let metrics = {};
  try { metrics = await api('GET',`/api/projects/${pid}/hierarchy/metrics`); } catch(e){}

  // Also load raw intel for backwards compat
  let intel = {};
  try { const r = await api('GET',`/api/projects/${pid}/intelligence`); intel = r.intelligence || r; } catch(e){}

  // Load versions + reviews for selectors
  let versions = [], reviews = [];
  try { const r = await api('GET',`/api/projects/${pid}/hierarchy/versions`); versions = r.versions || []; } catch(e){}
  try { const r = await api('GET',`/api/projects/${pid}/hierarchy/reviews`); reviews = r.reviews || []; } catch(e){}

  const meta = intel._build_metadata || {};
  const sv = metrics.selected_version || {};
  const sr = metrics.selected_review || {};
  const ds = metrics.data_source || {};

  // Version / Review selectors
  const vOpts = versions.map(v => `<option value="${v.version_id}" ${v.version_id===ds.version?'selected':''}>${v.version_id} ${v.label||''} (${v.created_at?.slice(0,10)||''})</option>`).join('');
  const rOpts = reviews.map(r => `<option value="${r.review_id}" ${r.review_id===ds.review?'selected':''}>${r.review_id} – ${r.persona} (${r.created_at?.slice(0,10)||''})</option>`).join('');

  const selectorHtml = (versions.length || reviews.length) ? `<div class="card"><h2>Data Context</h2>
    <p style="font-size:11px;color:var(--text-dim);margin-bottom:8px">Metrics update based on selected version and review</p>
    <div class="flex">
      ${versions.length ? `<select id="dashVersion" onchange="updateDashMetrics()" style="min-width:180px"><option value="">Latest Version</option>${vOpts}</select>` : ''}
      ${reviews.length ? `<select id="dashReview" onchange="updateDashMetrics()" style="min-width:200px"><option value="">Latest Review</option>${rOpts}</select>` : ''}
    </div>
    <p style="font-size:10px;color:var(--text-dim);margin-top:6px">Showing: ${ds.version||'latest'} → ${ds.review||'latest'} | Phase: ${ds.phase||'–'}</p>
  </div>` : '';

  // Use hierarchy metrics if available, fallback to legacy
  const risks = metrics.risks_identified || meta.total_risks || 0;
  const constraints = metrics.constraints || meta.total_constraints || 0;
  const deps = metrics.dependencies || meta.total_dependencies || 0;
  const assumptions = metrics.assumptions || meta.total_assumptions || 0;
  const actions = metrics.action_items || meta.total_action_items || 0;
  const totalVersions = metrics.total_versions || versions.length;
  const totalReviews = metrics.total_reviews || 0;
  const gaps = metrics.gaps_identified || 0;
  const findings = metrics.total_findings || 0;

  // Trend visualization
  const trend = metrics.trend || [];
  let trendHtml = '';
  if (trend.length > 1) {
    trendHtml = `<div class="card"><h2>Trend (Last ${trend.length} Versions)</h2>
      <div style="display:flex;gap:12px;overflow-x:auto;padding:8px 0">
        ${trend.map(t => `<div style="text-align:center;min-width:70px">
          <div style="font-size:10px;color:var(--text-dim)">${t.version_id}</div>
          <div style="font-size:16px;font-weight:700;color:var(--accent)">${t.stats?.risks||0}</div>
          <div style="font-size:9px;color:var(--text-dim)">risks</div>
          <div style="font-size:9px;color:var(--text-dim)">${t.created_at?.slice(5,10)||''}</div>
        </div>`).join('')}
      </div></div>`;
  }

  return selectorHtml + `
    <div class="grid">
      <div class="stat"><div class="num">${risks}</div><div class="label">Risks</div></div>
      <div class="stat"><div class="num">${constraints}</div><div class="label">Constraints</div></div>
      <div class="stat"><div class="num">${deps}</div><div class="label">Dependencies</div></div>
      <div class="stat"><div class="num">${assumptions}</div><div class="label">Assumptions</div></div>
      <div class="stat"><div class="num">${totalVersions}</div><div class="label">Versions</div></div>
      <div class="stat"><div class="num">${totalReviews}</div><div class="label">Reviews</div></div>
    </div>
    ${findings ? `<div class="grid mt"><div class="stat"><div class="num">${findings}</div><div class="label">Findings</div></div><div class="stat"><div class="num">${gaps}</div><div class="label">Gaps</div></div></div>` : ''}
    <div class="card mt"><h2>Quick Actions</h2>
      <div class="flex mt">
        <button class="btn" onclick="switchTab('ingest')">Ingest Artefacts</button>
        <button class="btn btn-outline" onclick="buildContext()">Run Intelligence</button>
        <button class="btn btn-outline" onclick="switchTab('reviews')">Run Review</button>
        <button class="btn btn-outline" onclick="switchTab('versions')">Browse History</button>
      </div>
    </div>` + trendHtml +
    (intel.risks?.length ? `<div class="card"><h2>Top Risks</h2><ul class="items">${intel.risks.slice(0,5).map(r=>`<li>${escHtml(r)}</li>`).join('')}</ul></div>` : '') +
    (intel.action_items?.length ? `<div class="card"><h2>Action Items</h2><ul class="items">${intel.action_items.slice(0,5).map(a=>`<li>${escHtml(a)}</li>`).join('')}</ul></div>` : '');
}

async function updateDashMetrics() {
  const vEl = document.getElementById('dashVersion');
  const rEl = document.getElementById('dashReview');
  const vId = vEl ? vEl.value : '';
  const rId = rEl ? rEl.value : '';
  // Re-render dashboard with selected filters (store in state)
  state._dashVersion = vId;
  state._dashReview = rId;
  render();
}

function viewNoProject() {
  return `<div class="card"><h2>Getting Started</h2>
    <p style="color:var(--text-dim);margin-bottom:14px;font-size:13px">Create a project to begin. Upload documents, build intelligence, then run AI reviews.</p>
    <div class="form-row"><label>Project Name</label><input id="newName" placeholder="e.g. Cloud Migration Assessment"></div>
    <div class="form-row"><label>Description</label><input id="newDesc" placeholder="Optional description"></div>
    <button class="btn" onclick="createProject()">Create Project</button>
    <div id="createProjectError"></div>
    ${state.projects.length ? `<h3 class="mt">Existing Projects</h3><ul class="items">${state.projects.map(p=>`<li><a href="#" onclick="selectProject('${p.id}')" style="color:var(--accent)">${p.name}</a> <span class="tag">${p.phase}</span></li>`).join('')}</ul>` : ''}
  </div>`;
}
</script>

<script>
// ─── Ingest View (V3 Redesign: Upload + Paste Text + Category) ───
const ARTIFACT_CATEGORIES = [
  {value:'project_artefact', label:'Project Artefact', icon:'📋'},
  {value:'meetings_comms', label:'Meetings & Comms', icon:'📞'},
  {value:'delivery_notes', label:'Delivery Notes', icon:'📝'},
  {value:'client_context', label:'Client Context', icon:'🏢'},
  {value:'architecture_design', label:'Architecture & Design', icon:'🏗️'},
  {value:'external_data', label:'External Data', icon:'🌐'},
];

async function viewIngest() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;

  // Load artifacts (new v1 API)
  let artifacts = [];
  try { const r = await api('GET',`/api/v1/projects/${pid}/artifacts`); artifacts = r.artifacts || []; } catch(e){}

  // Also load legacy context for backward compatibility
  let legacyDocs = [];
  try { const ctx = await api('GET',`/api/projects/${pid}/context`); legacyDocs = ctx.documents || []; } catch(e){}

  const categoryOpts = ARTIFACT_CATEGORIES.map(c => `<option value="${c.value}">${c.icon} ${c.label}</option>`).join('');

  // Entry methods: Upload File | Paste Text | Legacy File Paths
  const entryHtml = `<div class="card"><h2>Add Artefact</h2>
    <p style="color:var(--text-dim);font-size:12px;margin-bottom:12px">Upload a file or paste text. Category is required for context classification.</p>
    <div style="display:flex;gap:4px;margin-bottom:12px">
      <button class="btn btn-sm" id="tabUpload" onclick="switchIngestTab('upload')" style="background:var(--accent)">Upload File</button>
      <button class="btn btn-sm btn-outline" id="tabPaste" onclick="switchIngestTab('paste')">Paste Text</button>
      <button class="btn btn-sm btn-outline" id="tabPaths" onclick="switchIngestTab('paths')">File Paths (Legacy)</button>
    </div>

    <!-- Upload File Tab -->
    <div id="ingestUpload">
      <div class="form-row"><label>Category (required)</label><select id="uploadCategory" onchange="renderMetadataFields('upload')">${categoryOpts}</select></div>
      <div id="uploadMetaFields"></div>
      <div class="form-row"><label>Title (optional)</label><input id="uploadTitle" placeholder="e.g. Client scope document"></div>
      <div class="form-row"><label>File</label>
        <input type="file" id="uploadFile" accept=".txt,.md,.csv,.eml,.json,.yaml,.yml,.pdf,.docx,.xlsx,.pptx"
          style="background:var(--surface2);padding:8px;border-radius:var(--radius);width:100%">
      </div>
      <button class="btn mt" onclick="doUploadArtifact()">Upload</button>
    </div>

    <!-- Paste Text Tab -->
    <div id="ingestPaste" style="display:none">
      <div class="form-row"><label>Category (required)</label><select id="pasteCategory" onchange="renderMetadataFields('paste')">${categoryOpts}</select></div>
      <div id="pasteMetaFields"></div>
      <div class="form-row"><label>Title (optional)</label><input id="pasteTitle" placeholder="e.g. Sprint 2 meeting notes"></div>
      <div class="form-row"><label>Text Content</label>
        <textarea id="pasteText" rows="6" placeholder="Paste your text content here..."></textarea>
      </div>
      <button class="btn mt" onclick="doPasteArtifact()">Save Text</button>
    </div>

    <!-- Legacy File Paths Tab -->
    <div id="ingestPaths" style="display:none">
      <p style="color:var(--text-dim);font-size:11px;margin-bottom:8px">Legacy: Enter file paths (one per line) relative to project root.</p>
      <div class="form-row"><label>File Paths</label>
        <textarea id="ingestPathsArea" rows="4" placeholder="sample_data/scope.txt&#10;sample_data/scope_cpg.txt"></textarea>
      </div>
      <button class="btn" onclick="doIngest()">Ingest Files</button>
    </div>

    <div id="ingestResult" class="mt"></div>
  </div>`;

  // Artifact Registry
  let registryHtml = '';
  if (artifacts.length || legacyDocs.length) {
    const totalCount = artifacts.length + legacyDocs.length;
    const includedCount = artifacts.filter(a => a.include).length + legacyDocs.length;

    registryHtml = `<div class="card"><h2>Artefact Registry (${totalCount})</h2>
      <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px">${includedCount} of ${totalCount} included in intelligence. Toggle to exclude/include.</p>
      <div class="flex" style="margin-bottom:10px">
        <button class="btn btn-sm btn-outline" onclick="processAllArtifacts()">Process All Included</button>
      </div>
      <div class="file-explorer">`;

    // New artifacts
    for (const a of artifacts) {
      const catInfo = ARTIFACT_CATEGORIES.find(c => c.value === a.category) || {icon:'📄', label:a.category};
      const toggleClass = a.include ? 'toggle-on' : 'toggle-off';
      const toggleLabel = a.include ? 'Included' : 'Excluded';
      const statusColor = a.status === 'processed' ? 'var(--accent2)' : a.status === 'failed' ? 'var(--danger)' : a.status === 'processing' ? 'var(--warn)' : 'var(--text-dim)';

      // Format metadata display
      const metaEntries = Object.entries(a.metadata || {});
      const metaHtml = metaEntries.length ? metaEntries.map(([k,v]) =>
        `<span style="font-size:10px;background:var(--surface2);padding:1px 6px;border-radius:8px;margin:1px">${k}: ${Array.isArray(v)?v.join(', '):v}</span>`
      ).join(' ') : '';

      registryHtml += `<div class="file-item">
        <div class="file-header" onclick="toggleFileExpand(this)">
          <span class="file-chevron">▶</span>
          <span class="file-icon">${catInfo.icon}</span>
          <span class="file-name">${escHtml(a.title || a.fileName || 'Untitled')}</span>
          <span class="tag">${catInfo.label}</span>
          <span class="tag" style="border-color:${statusColor};color:${statusColor}">${a.status}</span>
          <span style="font-size:10px;color:var(--text-dim)">${a.createdAt?.slice(0,10)||''}</span>
          <span class="file-toggle ${toggleClass}" onclick="event.stopPropagation();toggleArtifact('${a.artifactId}',${!a.include})">${toggleLabel}</span>
        </div>
        <div class="file-body">
          <div style="font-size:11px;color:var(--text-dim);padding:4px 0">
            <span>Type: ${a.type}</span> · <span>Category: ${a.category}</span>
            ${a.fileName ? ` · <span>File: ${escHtml(a.fileName)}</span>` : ''}
          </div>
          ${metaHtml ? `<div style="margin:4px 0;display:flex;flex-wrap:wrap;gap:3px">${metaHtml}</div>` : ''}
          <div class="flex mt">
            <button class="btn btn-sm btn-outline" onclick="processArtifact('${a.artifactId}')">Process</button>
            <button class="btn btn-sm btn-danger" onclick="deleteArtifact('${a.artifactId}')">Remove</button>
          </div>
        </div>
      </div>`;
    }

    // Legacy documents (backward compat)
    const toggles = {};
    try { const ctx = await api('GET',`/api/projects/${pid}/context`); Object.assign(toggles, ctx.file_toggles || {}); } catch(e){}
    for (const d of legacyDocs) {
      const fname = d.filename || d.metadata?.filename || '';
      const srcType = d.metadata?.source_type || 'unknown';
      const words = d.metadata?.word_count || 0;
      const sections = d.sections || [];
      const isActive = toggles[fname] !== false;
      const toggleClass = isActive ? 'toggle-on' : 'toggle-off';
      const toggleLabel = isActive ? 'Included' : 'Excluded';

      const sectionHtml = sections.length ? sections.map(s =>
        `<div class="file-section"><span class="section-title">${escHtml(s.title || s.heading || 'Section')}</span> <span style="color:var(--text-dim);font-size:10px">${(s.content||'').length} chars</span></div>`
      ).join('') : '<div style="font-size:11px;color:var(--text-dim);padding:4px 0">No section data</div>';

      registryHtml += `<div class="file-item">
        <div class="file-header" onclick="toggleFileExpand(this)">
          <span class="file-chevron">▶</span>
          <span class="file-icon">${srcType==='csv'?'📊':srcType==='email'?'📧':'📄'}</span>
          <span class="file-name">${escHtml(fname)}</span>
          <span class="tag">${srcType}</span>
          <span style="font-size:10px;color:var(--text-dim)">${words} words · ${sections.length} sections</span>
          <span class="file-toggle ${toggleClass}" onclick="event.stopPropagation();toggleFileActive('${escHtml(fname)}',${!isActive})">${toggleLabel}</span>
        </div>
        <div class="file-body">${sectionHtml}</div>
      </div>`;
    }

    registryHtml += `</div></div>`;
  }

  return entryHtml + registryHtml;
}

function switchIngestTab(tab) {
  document.getElementById('ingestUpload').style.display = tab==='upload' ? '' : 'none';
  document.getElementById('ingestPaste').style.display = tab==='paste' ? '' : 'none';
  document.getElementById('ingestPaths').style.display = tab==='paths' ? '' : 'none';
  // Update button styles

  else document.getElementById('tabPaste').style.background='';

// ─── Category Metadata Schema (mirrors backend CATEGORY_METADATA_SCHEMA) ───
const CATEGORY_META_SCHEMA = {
  project_artefact: [
    {name:'version', type:'string', label:'Version', required:false},
    {name:'owner', type:'string', label:'Owner', required:false},
  ],
  meetings_comms: [
    {name:'date', type:'date', label:'Date', required:false},
    {name:'participants', type:'array', label:'Participants (comma-separated)', required:false},
  ],
  delivery_notes: [
    {name:'sprint', type:'string', label:'Sprint / Iteration', required:false},
    {name:'date', type:'date', label:'Date', required:false},
  ],
  client_context: [
    {name:'source', type:'enum', label:'Source', required:true, options:['retrospective','historical','lessons_learned','other']},
    {name:'relevance', type:'enum', label:'Relevance', required:false, options:['delivery','operations','commercial','security','other']},
  ],
  architecture_design: [
    {name:'systemName', type:'string', label:'System Name', required:false},
    {name:'layer', type:'enum', label:'Layer', required:false, options:['frontend','backend','data','platform','integration','other']},
  ],
  external_data: [
    {name:'sourceUrl', type:'string', label:'Source URL', required:false},
    {name:'retrievedAt', type:'date', label:'Retrieved At', required:false},
  ],
};

function renderMetadataFields(prefix) {
  const catEl = document.getElementById(prefix + 'Category');
  const container = document.getElementById(prefix + 'MetaFields');
  if (!catEl || !container) return;
  const category = catEl.value;
  const fields = CATEGORY_META_SCHEMA[category] || [];
  if (!fields.length) { container.innerHTML = ''; return; }
  let html = '<div style="border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin:8px 0;background:var(--bg)"><p style="font-size:10px;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase">Context Fields</p>';
  for (const f of fields) {
    const reqMark = f.required ? ' <span style="color:var(--danger)">*</span>' : '';
    const fieldId = `${prefix}_meta_${f.name}`;
    if (f.type === 'enum') {
      const opts = f.options.map(o => `<option value="${o}">${o.replace(/_/g,' ')}</option>`).join('');
      html += `<div class="form-row"><label>${f.label}${reqMark}</label><select id="${fieldId}"><option value="">-- select --</option>${opts}</select></div>`;
    } else if (f.type === 'date') {
      html += `<div class="form-row"><label>${f.label}${reqMark}</label><input id="${fieldId}" type="date"></div>`;
    } else if (f.type === 'array') {
      html += `<div class="form-row"><label>${f.label}${reqMark}</label><input id="${fieldId}" placeholder="e.g. Alice, Bob, Charlie"></div>`;
    } else {
      html += `<div class="form-row"><label>${f.label}${reqMark}</label><input id="${fieldId}" placeholder="${f.label}"></div>`;
    }
  }
  html += '</div>';
  container.innerHTML = html;
}

function collectMetadata(prefix) {
  const catEl = document.getElementById(prefix + 'Category');
  if (!catEl) return {};
  const category = catEl.value;
  const fields = CATEGORY_META_SCHEMA[category] || [];
  const metadata = {};
  for (const f of fields) {
    const el = document.getElementById(`${prefix}_meta_${f.name}`);
    if (!el) continue;
    let val = el.value.trim();
    if (!val) continue;
    if (f.type === 'array') {
      metadata[f.name] = val.split(',').map(s => s.trim()).filter(Boolean);
    } else {
      metadata[f.name] = val;
    }
  }
  return metadata;
}

function validateMetadata(prefix) {
  const catEl = document.getElementById(prefix + 'Category');
  if (!catEl) return {valid:true, errors:[]};
  const category = catEl.value;
  const fields = CATEGORY_META_SCHEMA[category] || [];
  const errors = [];
  for (const f of fields) {
    if (!f.required) continue;
    const el = document.getElementById(`${prefix}_meta_${f.name}`);
    if (!el || !el.value.trim()) {
      errors.push(`${f.label} is required for category '${category.replace(/_/g,' ')}'`);
    }
  }
  return {valid: errors.length === 0, errors};
}

async function doUploadArtifact() {
  const pid = state.current.id;
  const fileInput = document.getElementById('uploadFile');
  const category = document.getElementById('uploadCategory').value;
  const title = document.getElementById('uploadTitle').value;
  const el = document.getElementById('ingestResult');

  if (!fileInput.files.length) { el.innerHTML = '<p style="color:var(--danger)">Please select a file</p>'; return; }
  if (!category) { el.innerHTML = '<p style="color:var(--danger)">Category is required</p>'; return; }

  // Validate metadata (required fields check)
  const {valid, errors} = validateMetadata('upload');
  if (!valid) { el.innerHTML = `<p style="color:var(--danger)">${errors.join('<br>')}</p>`; return; }

  const metadata = collectMetadata('upload');
  const file = fileInput.files[0];
  el.innerHTML = '<p style="color:var(--text-dim)">Uploading...</p>';

  // Use FormData for multipart upload
  const formData = new FormData();
  formData.append('file', file);
  formData.append('category', category);
  if (title) formData.append('title', title);
  if (Object.keys(metadata).length) formData.append('metadata', JSON.stringify(metadata));

  try {
    const resp = await fetch(`/api/v1/projects/${pid}/artifacts/upload`, { method: 'POST', body: formData });
    const r = await resp.json();
    if (r.artifact) {
      el.innerHTML = `<p style="color:var(--accent2)">Uploaded: ${escHtml(r.artifact.title || r.artifact.fileName)}</p>`;
      fileInput.value = '';
      document.getElementById('uploadTitle').value = '';
      setTimeout(() => render(), 800);
    } else {
      el.innerHTML = `<p style="color:var(--danger)">${r.error || 'Upload failed'}</p>`;
    }
  } catch(e) {
    el.innerHTML = `<p style="color:var(--danger)">Upload error: ${e.message}</p>`;
  }
}

async function doPasteArtifact() {
  const pid = state.current.id;

  if (!valid) { el.innerHTML = `<p style="color:var(--danger)">${errors.join('<br>')}</p>`; return; }

  const metadata = collectMetadata('paste');
  el.innerHTML = '<p style="color:var(--text-dim)">Saving...</p>';
  const r = await api('POST', `/api/v1/projects/${pid}/artifacts/text`, { category, title, text, metadata });

<script>
// ─── Versions View (V3: Collapsible Phase → Version → Review hierarchy) ───
async function viewVersions() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;

  // Load full hierarchy tree
  let hierarchy = {};
  try { hierarchy = await api('GET',`/api/projects/${pid}/hierarchy`); } catch(e){}
  const tree = hierarchy.tree || [];
  const totalV = hierarchy.total_versions || 0;
  const totalR = hierarchy.total_reviews || 0;

  if (!totalV) return `<div class="card empty"><p>No versions yet. Build intelligence to create the first version.</p>
    <button class="btn mt" onclick="buildContext()">Run Intelligence</button></div>`;

  // Build collapsible tree: Phase → Version → Review
  let treeHtml = '';
  for (const phase of tree) {
    const phaseVersions = phase.versions || [];
    if (!phaseVersions.length && !phase.is_current) continue;
    const phaseActive = phase.is_current ? ' style="border-left:3px solid var(--accent)"' : '';
    treeHtml += `<div class="card"${phaseActive}>
      <details ${phase.is_current ? 'open' : ''}>
        <summary style="cursor:pointer;font-size:13px;font-weight:600;color:${phase.is_current?'var(--accent)':'var(--text)'}">
          ${phase.label} <span class="tag">${phaseVersions.length} versions</span>
          ${phase.is_current ? '<span class="tag tag-ok">current</span>' : ''}
        </summary>
        <p style="font-size:11px;color:var(--text-dim);margin:4px 0 8px">${phase.description||''}</p>`;

    if (!phaseVersions.length) {
      treeHtml += `<p style="font-size:12px;color:var(--text-dim);padding:8px 0">No versions in this phase yet</p>`;
    } else {
      for (const ver of phaseVersions) {
        const verReviews = ver.reviews || [];
        treeHtml += `<details style="margin:6px 0;padding-left:12px;border-left:2px solid var(--border)">
          <summary style="cursor:pointer;font-size:12px">
            <strong>${ver.version_id}</strong> – ${ver.label||''}
            <span style="color:var(--text-dim);font-size:10px">${ver.created_at?.slice(0,10)||''}</span>
            <span class="tag">${ver.artifact_count||0} files</span>
            <span class="tag">${verReviews.length} reviews</span>
            ${ver.stats?.risks ? `<span style="font-size:10px;color:var(--warn)">${ver.stats.risks} risks</span>` : ''}
          </summary>
          <div style="padding:8px 0 4px 16px">
            <p style="font-size:11px;color:var(--text-dim)">Persona: ${ver.persona||'–'} | Backend: files_only</p>`;

        if (verReviews.length) {
          treeHtml += `<div style="margin-top:6px">`;
          for (const rev of verReviews) {
            treeHtml += `<div style="padding:6px 10px;margin:4px 0;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius)">
              <div class="flex" style="justify-content:space-between">
                <span style="font-size:11px;font-weight:600">${rev.review_id}</span>
                <span style="font-size:10px;color:var(--text-dim)">${rev.created_at?.slice(0,16)||''}</span>
              </div>
              <div style="font-size:11px;color:var(--text-dim);margin-top:3px">
                Persona: <strong>${rev.persona}</strong> | Backend: ${rev.ai_backend}
                | Findings: ${rev.total_findings||0}
              </div>
              ${rev.summary ? `<p style="font-size:11px;margin-top:3px">${escHtml(rev.summary.slice(0,100))}</p>` : ''}
              <button class="btn btn-sm btn-outline mt" onclick="viewReviewDetail('${rev.review_id}')">View Details</button>
            </div>`;
          }
          treeHtml += `</div>`;
        } else {
          treeHtml += `<p style="font-size:11px;color:var(--text-dim);margin-top:4px">No reviews for this version yet</p>`;
        }
        treeHtml += `</div></details>`;
      }
    }
    treeHtml += `</details></div>`;
  }

  // Compare Versions section
  let legacyVersions = [];
  try { const r = await api('GET',`/api/projects/${pid}/versions`); legacyVersions = r.versions || []; } catch(e){}
  const compareHtml = legacyVersions.length >= 2 ? `<div class="card"><h2>Compare Versions</h2>
    <div class="flex">
      <select id="cmpA">${legacyVersions.map(v=>`<option value="${v.version_id}">${v.version_id} ${v.label||''}</option>`).join('')}</select>
      <span style="color:var(--text-dim)">vs</span>
      <select id="cmpB">${legacyVersions.slice().reverse().map(v=>`<option value="${v.version_id}">${v.version_id} ${v.label||''}</option>`).join('')}</select>
      <button class="btn btn-sm" onclick="compareVersions()">Compare</button>
    </div><div id="cmpResult" class="mt"></div></div>` : '';

  return `<div class="card"><h2>Project History</h2>
    <p style="font-size:12px;color:var(--text-dim)">Navigate: Phase → Version → Review. ${totalV} versions, ${totalR} reviews.</p></div>`
    + treeHtml + compareHtml;
}

async function viewReviewDetail(reviewId) {
  const pid = state.current.id;
  const r = await api('GET',`/api/projects/${pid}/hierarchy/reviews/${reviewId}`);
  if (r.error) { alert(r.error); return; }

  const vc = r.version_context || {};
  let html = `<div class="card"><h2>Review: ${r.review_id}</h2>
    <div style="font-size:12px;margin-bottom:8px">
      <strong>Version:</strong> ${r.version_id} | <strong>Phase:</strong> ${r.phase_id}
      | <strong>Date:</strong> ${r.created_at?.slice(0,16)||''}
    </div>
    <div style="font-size:12px;margin-bottom:8px">
      <strong>Persona:</strong> ${r.persona} | <strong>Backend:</strong> ${r.ai_backend}
    </div>`;

  // Files included
  if (r.included_files?.length) {
    html += `<h3>Files Included</h3><div style="margin:4px 0">${r.included_files.map(f=>`<span class="tag tag-ok">${escHtml(f)}</span>`).join(' ')}</div>`;
  }
  if (r.categories?.length) {
    html += `<div style="margin:4px 0">Categories: ${r.categories.map(c=>`<span class="tag">${c}</span>`).join(' ')}</div>`;
  }

  // Findings
  for (const [s, items] of Object.entries(r.findings||{})) {
    if (items.length) html += `<div class="findings-section"><div class="title">${s.replace(/_/g,' ')}</div><ul class="items">${items.map(i=>`<li>${escHtml(i)}</li>`).join('')}</ul></div>`;
  }
  if (r.questions?.length) html += `<div class="findings-section"><div class="title">Questions</div><ul class="items">${r.questions.map(q=>`<li>? ${escHtml(q)}</li>`).join('')}</ul></div>`;

  // Prompt
  if (r.prompt_used) html += `<details class="collapsible"><summary>Prompt Used</summary><div class="prompt-box">${escHtml(r.prompt_used)}</div></details>`;
  if (r.custom_prompt) html += `<details class="collapsible"><summary>Custom Prompt</summary><div class="prompt-box">${escHtml(r.custom_prompt)}</div></details>`;

  html += `<button class="btn btn-sm mt" onclick="render()">← Back</button></div>`;
  document.getElementById('main').innerHTML = html;
}

async function compareVersions() {
  const a = document.getElementById('cmpA').value;
  const b = document.getElementById('cmpB').value;
  if (a===b) { document.getElementById('cmpResult').innerHTML='<p style="color:var(--warn)">Select different versions</p>'; return; }
  const r = await api('POST',`/api/projects/${state.current.id}/compare-versions`,{version_a:a,version_b:b});
  if (r.error) { document.getElementById('cmpResult').innerHTML=`<p style="color:var(--danger)">${r.error}</p>`; return; }
  const cats = r.categories || {};
  let html = '<div class="card mt"><h3>Changes: '+a+' → '+b+'</h3>';
  for (const [cat, data] of Object.entries(cats)) {
    const dir = data.net_change>0?'↑':data.net_change<0?'↓':'→';
    html += `<div style="margin:6px 0;font-size:12px"><strong>${cat}</strong> ${data.count_before}→${data.count_after} ${dir} (${data.net_change>=0?'+':''}${data.net_change})`;
    if (data.added?.length) html += data.added.slice(0,3).map(i=>`<div style="color:var(--accent2);margin-left:12px">+ ${i.slice(0,80)}</div>`).join('');
    if (data.removed?.length) html += data.removed.slice(0,3).map(i=>`<div style="color:var(--danger);margin-left:12px">- ${i.slice(0,80)}</div>`).join('');
    html += '</div>';
  }
  const s = r.summary||{};
  html += `<p class="mt" style="font-size:11px;color:var(--text-dim)">Trend: ${s.trend||'?'} | +${s.total_added||0} added, -${s.total_removed||0} removed</p></div>`;
  document.getElementById('cmpResult').innerHTML = html;
}
</script>

<script>
// ─── Reviews View ───
async function viewReviews() {

    </div>
    <div id="reviewResult" class="mt"></div></div>` +

async function runReview() {

  const custom = document.getElementById('customPrompt').value.trim();
  document.getElementById('reviewResult').innerHTML = '<p style="color:var(--text-dim)">Running review...</p>';
  const body = {project_id:state.current.id, persona, ai_backend:backend};
  if (custom) body.custom_prompt = custom;
  const r = await api('POST','/api/review', body);
  if (r.error) { document.getElementById('reviewResult').innerHTML=`<p style="color:var(--danger)">${r.error}</p>`; return; }
  let html = `<div class="card"><h3>${r.persona} <span class="tag">${r.ai_backend}</span></h3>
    <p style="font-size:11px;color:var(--text-dim)">${r.summary||''}</p>`;
  if (r.ai_metadata?.tokens_used) html += `<p style="font-size:11px;color:var(--accent2)">Tokens: ${r.ai_metadata.tokens_used} | Latency: ${r.ai_metadata.latency_ms}ms</p>`;
  for (const [s, items] of Object.entries(r.findings||{})) {
    if (items.length) html += `<div class="findings-section"><div class="title">${s.replace(/_/g,' ')}</div><ul class="items">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
  }
  if (r.questions?.length) html += `<div class="findings-section"><div class="title">Open Questions</div><ul class="items">${r.questions.map(q=>`<li>? ${q}</li>`).join('')}</ul></div>`;
  if (r.prompt_used) html += `<details class="collapsible"><summary>View Prompt Sent to AI</summary><div class="prompt-box">${escHtml(r.prompt_used)}</div></details>`;
  if (r.raw_output) html += `<details class="collapsible"><summary>View Raw AI Output</summary><div class="prompt-box">${escHtml(r.raw_output)}</div></details>`;
  html += '</div>';
  document.getElementById('reviewResult').innerHTML = html;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>

<script>
// ─── Phases View (V3: First-class hierarchy navigation, replaces old Proposals + Phases) ───
async function viewPhases() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;

  // Load hierarchy phases
  let phases = [];
  try { const r = await api('GET',`/api/projects/${pid}/hierarchy/phases`); phases = r.phases || []; } catch(e){}

  // Fallback: if no hierarchy phases, show default
  if (!phases.length) {
    phases = [
      {id:'pre-sales', label:'Pre-sales', order:1, description:'Client engagement, proposals, scoping', is_current:true, version_count:0, review_count:0},
      {id:'design', label:'Design', order:2, description:'Architecture, solution design, planning', is_current:false, version_count:0, review_count:0},
      {id:'delivery', label:'Delivery', order:3, description:'Execution, development, implementation', is_current:false, version_count:0, review_count:0},
      {id:'support', label:'Support', order:4, description:'Operations, maintenance, handover', is_current:false, version_count:0, review_count:0},
    ];
  }

  const current = phases.find(p => p.is_current) || phases[0];

  // Phase progression bar
  const phaseBar = phases.sort((a,b) => a.order - b.order).map(p => {
    const active = p.is_current;
    const passed = p.order < current.order;
    const style = active ? 'background:var(--accent);color:#000;font-weight:600' : passed ? 'background:var(--accent2);color:#000' : 'background:var(--surface2)';
    return `<span style="padding:6px 14px;border-radius:var(--radius);font-size:11px;${style};cursor:pointer" onclick="viewPhaseDetail('${p.id}')">${p.label}</span>`;
  }).join('<span style="color:var(--text-dim);margin:0 2px">→</span>');

  // Phase detail cards
  let phaseCards = '';
  for (const p of phases.sort((a,b) => a.order - b.order)) {
    const borderStyle = p.is_current ? 'border-left:3px solid var(--accent)' : '';
    phaseCards += `<div class="card" style="${borderStyle}">
      <div class="flex" style="justify-content:space-between">
        <h2 style="margin:0">${p.label} ${p.is_current ? '<span class="tag tag-ok">current</span>' : ''}</h2>
        <span style="font-size:10px;color:var(--text-dim)">${p.entered_at ? 'Since: '+p.entered_at.slice(0,10) : ''}</span>
      </div>
      <p style="font-size:12px;color:var(--text-dim);margin:4px 0">${p.description||''}</p>
      <div class="flex mt">
        <span class="tag">${p.version_count||0} versions</span>
        <span class="tag">${p.review_count||0} reviews</span>
      </div>
    </div>`;
  }

  // Phase transition
  const transitionHtml = `<div class="card"><h2>Transition Phase</h2>
    <div class="flex">
      <select id="nextPhaseH">${phases.filter(p=>!p.is_current).map(p=>`<option value="${p.id}">${p.label}</option>`).join('')}</select>
      <input id="phaseReasonH" placeholder="Reason for transition" style="flex:1">
      <button class="btn btn-sm" onclick="doHierarchyTransition()">Transition</button>
    </div><div id="phaseHResult" class="mt"></div></div>`;

  return `<div class="card"><h2>Project Lifecycle</h2>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:10px">Phases are first-class entities. Each phase contains versions and reviews.</p>
    <div class="flex mt">${phaseBar}</div></div>`
    + phaseCards + transitionHtml;
}

async function viewPhaseDetail(phaseId) {
  const pid = state.current.id;
  let versions = [];
  try { const r = await api('GET',`/api/projects/${pid}/hierarchy/versions`); versions = (r.versions||[]).filter(v=>v.phase_id===phaseId); } catch(e){}

  let html = `<div class="card"><h2>Phase: ${phaseId}</h2>
    <p style="font-size:12px;color:var(--text-dim)">${versions.length} versions in this phase</p></div>`;

  if (versions.length) {
    for (const v of versions) {
      html += `<div class="card"><div class="flex" style="justify-content:space-between">
        <strong>${v.version_id}</strong> <span style="font-size:11px;color:var(--text-dim)">${v.created_at?.slice(0,10)||''}</span>
      </div>
      <p style="font-size:11px;color:var(--text-dim)">${v.label||''} | ${v.artifact_count||0} files | ${v.review_count||0} reviews</p></div>`;
    }
  } else {
    html += `<div class="card empty"><p>No versions in this phase yet</p></div>`;
  }
  html += `<button class="btn btn-sm mt" onclick="render()">← Back to Phases</button>`;
  document.getElementById('main').innerHTML = html;
}

async function doHierarchyTransition() {
  const phase = document.getElementById('nextPhaseH').value;
  const reason = document.getElementById('phaseReasonH').value;
  const r = await api('POST',`/api/projects/${state.current.id}/hierarchy/phase`,{phase_id:phase, reason});
  if (r.error) { document.getElementById('phaseHResult').innerHTML=`<p style="color:var(--danger)">${r.error}</p>`; return; }
  document.getElementById('phaseHResult').innerHTML=`<p style="color:var(--accent2)">Transitioned to ${phase}</p>`;
  // Also update legacy phase
  await api('POST',`/api/projects/${state.current.id}/phase`,{new_phase:phase, reason});
  state.current.phase = phase;
  setTimeout(() => render(), 600);
}

// Legacy viewProposals redirects to Phases (Pre-sales)
async function viewProposals() { return viewPhases(); }
</script>

<script>
// ─── Settings View ───
async function viewSettings() {
  const r = await api('GET','/api/projects/all');
  state.allProjects = r.projects || state.projects;
  const backendHtml = state.backends.map(b =>
    `<div class="backend-chip ${b.available?'available':''}">${b.available?'●':'○'} <strong>${b.name}</strong><br><span style="font-size:10px">${b.display_name}</span></div>`
  ).join('');
  const projectActions = state.current ? `<div class="card"><h2>Project Actions</h2>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:10px">Current: <strong>${state.current.name}</strong> (${state.current.id})</p>
    <div class="flex">
      <button class="btn btn-sm btn-warn" onclick="archiveProject()">Archive Project</button>
      <button class="btn btn-sm btn-danger" onclick="deleteProject()">Delete Project</button>
    </div>
    <p style="font-size:10px;color:var(--text-dim);margin-top:8px">Both actions require PIN (default: 1234)</p></div>` : '';
  // Get admin config for project limit
  let maxProjects = 5;
  try { const cfg = await api('GET','/api/admin/config'); maxProjects = cfg.config?.max_active_projects || 5; } catch(e){}
  const activeCount = (state.allProjects || state.projects).filter(p => p.status !== 'archived' && p.status !== 'deleted').length;
  const limitWarning = activeCount >= maxProjects
    ? `<p style="color:var(--danger);font-size:12px;margin-bottom:8px">Limit reached: ${activeCount}/${maxProjects} active projects. Archive or delete a project, or contact admin to increase limit.</p>`
    : `<p style="font-size:11px;color:var(--text-dim);margin-bottom:8px">Active projects: ${activeCount}/${maxProjects}</p>`;
  return `<div class="card"><h2>Create New Project</h2>
    ${limitWarning}
    <div class="form-row"><label>Project Name</label><input id="newName" placeholder="Project name"></div>
    <div class="form-row"><label>Description</label><input id="newDesc" placeholder="Description"></div>
    <button class="btn" onclick="createProject()" ${activeCount >= maxProjects ? 'disabled style="opacity:0.5;cursor:not-allowed"' : ''}>Create</button>
    <div id="createProjectError"></div></div>
    ${projectActions}
    ${state.projects.length ? `<div class="card"><h2>All Projects</h2><ul class="items">${state.allProjects.map(p=>`<li><a href="#" onclick="selectProject('${p.id}')" style="color:var(--accent)">${p.name}</a> <span class="tag">${p.phase}</span> (${p.file_count} files) ${p.status==='archived'?'<span class="tag" style="border:1px solid var(--warn);color:var(--warn)">archived</span>':''}</li>`).join('')}</ul></div>` : ''}
    <div class="card"><h2>AI Backends Status</h2><div class="backend-grid">${backendHtml}</div>
      <p class="mt" style="font-size:11px;color:var(--text-dim)">Configure via environment variables:<br>
        GROQ_API_KEY (free) | OPENROUTER_API_KEY (free) | GEMINI_API_KEY | AWS credentials for Bedrock</p></div>`;
}

async function archiveProject() {
  if (!state.current) return;
  const pin = prompt('Enter PIN to archive this project:');
  if (!pin) return;
  const r = await api('POST', `/api/projects/${state.current.id}/archive`, {pin});
  if (r.error) { alert('Error: ' + r.error); return; }
  alert(r.message || 'Project archived');
  await loadProjects();
  state.current = state.projects[0] || null;
  state.tab = 'dashboard';
  render();
}

async function deleteProject() {
  if (!state.current) return;
  if (!confirm(`Permanently delete "${state.current.name}"? This cannot be undone.`)) return;
  const pin = prompt('Enter PIN to permanently delete:');
  if (!pin) return;
  const r = await api('POST', `/api/projects/${state.current.id}/delete`, {pin});
  if (r.error) { alert('Error: ' + r.error); return; }
  alert(r.message || 'Project deleted');
  await loadProjects();
  state.current = state.projects[0] || null;
  state.tab = 'dashboard';
  render();
}

// ─── Actions ───
async function createProject() {
  const name = document.getElementById('newName').value;
  const desc = document.getElementById('newDesc')?.value || '';
  if (!name) return;
  const r = await api('POST','/api/projects',{name, description:desc});
  if (r.project) { await loadProjects(); state.current = state.projects.find(p=>p.id===r.project.id)||r.project; state.tab='dashboard'; render(); }
  else if (r.error) {
    // Show inline error near the create button
    const errEl = document.getElementById('createProjectError');
    if (errEl) { errEl.innerHTML = `<p style="color:var(--danger);font-size:12px;margin-top:8px">${r.error}</p>`; }
    else { alert(r.error); }
  }
}

async function selectProject(id) {
  state.current = state.projects.find(x=>x.id===id) || state.current;
  state.tab = 'dashboard'; render();
}

async function buildContext() {
  if (!state.current) return;
  const label = prompt('Version label (optional):','');
  const r = await api('POST',`/api/projects/${state.current.id}/build-context`,label?{label}:{});
  if (r._build_metadata) { alert(`Built: ${r._build_metadata.total_risks||0} risks, ${r._build_metadata.total_constraints||0} constraints, ${r._build_metadata.total_dependencies||0} dependencies`); render(); }
  else if (r.error) alert(r.error);
}

async function loadProjects() {
  const r = await api('GET','/api/projects');
  state.projects = r.projects || [];
  if (!state.current && state.projects.length) state.current = state.projects[0];
}

async function loadBackends() {
  const r = await api('GET','/api/backends');
  state.backends = r.backends || [];
}

// ─── Init ───
(async () => { await Promise.all([loadProjects(), loadBackends()]); render(); })();
</script>

<script>
// ─── Admin View (V3) ───
async function viewAdmin() {
  let config = {}, health = {}, lifecycle = {}, suggestions = [];
  try { const r = await api('GET','/api/admin/config'); config = r.config || {}; } catch(e){}
  try { const r = await api('GET','/api/admin/health'); health = r.health || {}; } catch(e){}
  try { const r = await api('GET','/api/admin/lifecycle'); lifecycle = r.lifecycle || {}; } catch(e){}
  try { const r = await api('GET','/api/admin/auto-archive-suggestions'); suggestions = r.suggestions || []; } catch(e){}

  const lastRun = health.last_intelligence_run || {};
  const apiStatus = health.api_status || {};

  // System Health section
  let healthHtml = `<div class="card"><h2>System Health</h2>
    <h3>Last Intelligence Run</h3>
    <div style="font-size:12px;padding:6px 0">`;
  if (lastRun.status === 'never_run') {
    healthHtml += `<span style="color:var(--text-dim)">No intelligence runs recorded yet</span>`;
  } else {
    const statusColor = lastRun.success ? 'var(--accent2)' : 'var(--danger)';
    healthHtml += `<span style="color:${statusColor}">${lastRun.success?'Success':'Failed'}</span>
      – ${lastRun.project_name||''} (${lastRun.version_id||''})
      <span style="color:var(--text-dim);margin-left:8px">${lastRun.timestamp?.slice(0,16)||''}</span>
      ${lastRun.duration_ms ? `<span class="tag">${Math.round(lastRun.duration_ms)}ms</span>` : ''}`;
    if (lastRun.error) healthHtml += `<div style="color:var(--danger);margin-top:4px">${lastRun.error}</div>`;
  }
  healthHtml += `</div><h3>API Connectivity</h3><div class="backend-grid">`;
  for (const [name, info] of Object.entries(apiStatus)) {
    const configured = info.configured;
    healthHtml += `<div class="backend-chip ${configured?'available':''}">${configured?'●':'○'} <strong>${name}</strong><br><span style="font-size:10px">${configured?'Configured':'Not configured'}</span></div>`;
  }
  healthHtml += `</div></div>`;

  // Config section
  let configHtml = `<div class="card"><h2>Configuration</h2>
    <div class="form-row"><label>Max Active Projects</label><input id="cfgMaxProjects" type="number" value="${config.max_active_projects||5}" style="width:80px"></div>
    <div class="form-row"><label>Default Persona</label>
      <select id="cfgPersona" style="width:200px">
        <option value="solution_architect" ${config.default_persona==='solution_architect'?'selected':''}>Solution Architect</option>
        <option value="delivery_manager" ${config.default_persona==='delivery_manager'?'selected':''}>Delivery Manager</option>
        <option value="product_owner" ${config.default_persona==='product_owner'?'selected':''}>Product Owner</option>
        <option value="resource_manager" ${config.default_persona==='resource_manager'?'selected':''}>Resource Manager</option>
      </select></div>
    <div class="form-row"><label>Default Phase</label>
      <select id="cfgPhase" style="width:200px">
        <option value="discovery" ${config.default_phase==='discovery'?'selected':''}>Discovery</option>
        <option value="proposal" ${config.default_phase==='proposal'?'selected':''}>Proposal</option>
        <option value="planning" ${config.default_phase==='planning'?'selected':''}>Planning</option>
        <option value="execution" ${config.default_phase==='execution'?'selected':''}>Execution</option>
        <option value="review" ${config.default_phase==='review'?'selected':''}>Review</option>
      </select></div>
    <div class="form-row"><label>Admin PIN</label><input id="cfgPin" type="password" value="${config.admin_pin||'1234'}" style="width:120px"></div>
    <h3>API Keys</h3>
    <div class="form-row"><label>Groq API Key</label><input id="cfgGroq" placeholder="${config.api_keys?.groq||'Not set'}" type="password"></div>
    <div class="form-row"><label>OpenRouter API Key</label><input id="cfgOpenRouter" placeholder="${config.api_keys?.openrouter||'Not set'}" type="password"></div>
    <div class="form-row"><label>Gemini API Key</label><input id="cfgGemini" placeholder="${config.api_keys?.gemini||'Not set'}" type="password"></div>
    <button class="btn mt" onclick="saveAdminConfig()">Save Configuration</button>
    <div id="configResult" class="mt"></div></div>`;

  // Lifecycle logs section
  let lifecycleHtml = `<div class="card"><h2>Project Lifecycle Logs</h2>`;
  const archived = lifecycle.archived || [];
  const deleted = lifecycle.deleted || [];
  if (archived.length) {
    lifecycleHtml += `<h3>Archived Projects (${archived.length}/${lifecycle.max_entries||5})</h3><ul class="items">`;
    for (const a of archived) {
      const canRestore = a.restore_allowed !== false;
      lifecycleHtml += `<li><strong>${a.name}</strong> (${a.project_id}) – ${a.archived_at?.slice(0,16)||''}
        ${canRestore ? `<button class="btn btn-sm btn-outline" onclick="restoreProject('${a.project_id}')" style="margin-left:8px">Restore</button>` : '<span class="tag">Restored</span>'}
      </li>`;
    }
    lifecycleHtml += `</ul>`;
  } else {
    lifecycleHtml += `<p style="color:var(--text-dim);font-size:12px">No archived projects</p>`;
  }
  if (deleted.length) {
    lifecycleHtml += `<h3>Deleted Projects (${deleted.length}/${lifecycle.max_entries||5})</h3><ul class="items">`;
    for (const d of deleted) {
      lifecycleHtml += `<li><strong>${d.name}</strong> (${d.project_id}) – Deleted ${d.deleted_at?.slice(0,16)||''} <span style="font-size:10px;color:var(--text-dim)">${(d.file_metadata||[]).length} files</span></li>`;
    }
    lifecycleHtml += `</ul>`;
  }
  lifecycleHtml += `</div>`;

  // Auto-archive suggestions
  let suggestHtml = '';
  if (suggestions.length) {
    suggestHtml = `<div class="card"><h2>Auto-Archive Suggestions</h2><ul class="items">`;
    for (const s of suggestions) {
      suggestHtml += `<li><strong>${s.name}</strong> – Inactive ${s.inactive_days} days (threshold: ${s.threshold_days})
        <button class="btn btn-sm btn-warn" onclick="archiveProject('${s.project_id}')" style="margin-left:8px">Archive</button></li>`;
    }
    suggestHtml += `</ul></div>`;
  }

  return healthHtml + configHtml + lifecycleHtml + suggestHtml;
}

async function saveAdminConfig() {
  const updates = {
    max_active_projects: parseInt(document.getElementById('cfgMaxProjects').value) || 5,
    default_persona: document.getElementById('cfgPersona').value,
    default_phase: document.getElementById('cfgPhase').value,
    admin_pin: document.getElementById('cfgPin').value,
    api_keys: {}
  };
  const groq = document.getElementById('cfgGroq').value;
  const openrouter = document.getElementById('cfgOpenRouter').value;
  const gemini = document.getElementById('cfgGemini').value;
  if (groq) updates.api_keys.groq = groq;
  if (openrouter) updates.api_keys.openrouter = openrouter;
  if (gemini) updates.api_keys.gemini = gemini;

  const r = await api('POST', '/api/admin/config', updates);
  if (r.config) {
    document.getElementById('configResult').innerHTML = '<p style="color:var(--accent2)">Configuration saved</p>';
  } else {
    document.getElementById('configResult').innerHTML = `<p style="color:var(--danger)">${r.error||'Save failed'}</p>`;
  }
}

async function restoreProject(projectId) {
  const pin = prompt('Enter PIN to restore:');
  if (!pin) return;
  const r = await api('POST', `/api/projects/${projectId}/restore`, {pin});
  if (r.error) { alert('Error: ' + r.error); return; }
  alert(r.message || 'Project restored');
  await loadProjects();
  render();
}
</script>

<script>
// ─── Enhanced Reviews View (V3: File Visibility) ───
// Override the reviews view to include file visibility per version
const _originalViewReviews = viewReviews;
viewReviews = async function() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;
  const personas = await api('POST','/api/personas');
  const history = await api('GET',`/api/projects/${pid}/reviews`);
  const reviews = history.reviews || [];
  const backendOpts = state.backends.map(b=>`<option value="${b.name}">${b.display_name||b.name} ${b.available?'':'(not configured)'}</option>`).join('');

  // File Visibility section (V3)
  let fileVisHtml = '';
  try {
    const ctx = await api('GET',`/api/projects/${pid}/context`);
    const docs = ctx.documents || [];
    const toggles = ctx.file_toggles || {};
    if (docs.length) {
      const activeCount = docs.filter(d => toggles[(d.filename||d.metadata?.filename||'')] !== false).length;
      fileVisHtml = `<div class="card"><h2>File Visibility (Current Version)</h2>
        <p style="font-size:11px;color:var(--text-dim);margin-bottom:8px">${activeCount} of ${docs.length} files included. Files are frozen per version for reproducibility.</p>
        <div style="max-height:200px;overflow-y:auto">`;
      for (const d of docs) {
        const fname = d.filename || d.metadata?.filename || '';
        const isActive = toggles[fname] !== false;
        const icon = isActive ? '●' : '○';
        const color = isActive ? 'var(--accent2)' : 'var(--text-dim)';
        fileVisHtml += `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px">
          <span style="color:${color}">${icon}</span>
          <span>${escHtml(fname)}</span>
          <span style="margin-left:auto;font-size:10px;color:${color}">${isActive?'ON':'OFF'}</span>
          <span class="file-toggle ${isActive?'toggle-on':'toggle-off'}" onclick="toggleFileActive('${escHtml(fname)}',${!isActive})">${isActive?'Included':'Excluded'}</span>
        </div>`;
      }
      fileVisHtml += `</div></div>`;
    }
  } catch(e) {}

  // Run Intelligence button (explicit trigger, V3)
  const runIntelHtml = `<div class="card"><h2>Run Intelligence</h2>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Explicit action: builds intelligence from active files. Creates a versioned snapshot.</p>
    <div class="flex">
      <button class="btn" onclick="buildContext()">Run Intelligence</button>
      <button class="btn btn-outline" onclick="runDeepDive()">Deep Dive Analysis</button>
    </div><div id="deepDiveResult" class="mt"></div></div>`;

  return fileVisHtml + runIntelHtml + `<div class="card"><h2>Run Persona Review</h2>
    <div class="flex">
      <select id="personaSelect">${(personas.personas||[]).map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select>
      <select id="backendSelect">${backendOpts}</select>
      <button class="btn" onclick="runReview()">Run Review</button>
    </div>
    <div class="form-row mt"><label>Custom Prompt (optional – additional context for AI)</label>
      <textarea id="customPrompt" rows="3" placeholder="e.g. Budget is capped at 500K. Must use only AWS services. Team has 3 senior engineers."></textarea>
    </div>
    <div id="reviewResult" class="mt"></div></div>` +
    (reviews.length ? `<div class="card"><h2>Review History (${reviews.length})</h2><ul class="items">${reviews.map(r=>`<li><strong>${r.persona}</strong> ${r.timestamp?.slice(0,16)||''} <span class="tag">${r.ai_backend}</span> ${r.total_findings||0} findings</li>`).join('')}</ul></div>` : '');
};

async function runDeepDive() {
  if (!state.current) return;
  const el = document.getElementById('deepDiveResult');
  el.innerHTML = '<p style="color:var(--text-dim)">Running Deep Dive analysis...</p>';
  const persona = document.getElementById('personaSelect')?.value || '';
  const custom = document.getElementById('customPrompt')?.value || '';
  const r = await api('POST', `/api/projects/${state.current.id}/deep-dive`, {persona, custom_prompt: custom});
  if (r.error) { el.innerHTML = `<p style="color:var(--danger)">${r.error}</p>`; return; }

  // Store deep dive result in state for feedback actions
  state.lastDeepDive = r;

  const dd = r.deep_dive || {};
  const sv = r.scope_validation || {};
  let html = `<div class="card"><h3>Deep Dive Results</h3>
    <p style="font-size:11px;color:var(--text-dim)">Scope completeness: ${Math.round((sv.completeness_score||0)*100)}% | Toggle items to include in prompt</p>`;

  let itemIdx = 0;

  if (dd.missing_areas?.length) {
    html += `<div class="findings-section"><div class="title">Missing Areas</div><ul class="items" style="list-style:none">`;
    for (const m of dd.missing_areas) {
      html += `<li style="display:flex;align-items:center;gap:6px">
        <input type="checkbox" class="dd-item" data-section="missing" data-idx="${itemIdx}" checked>
        <span class="tag tag-${m.severity==='high'?'off':'ok'}">${m.severity}</span> ${escHtml(m.area)}: ${escHtml(m.suggestion)}</li>`;
      itemIdx++;
    }
    html += `</ul></div>`;
  }
  if (dd.risk_flags?.length) {
    html += `<div class="findings-section"><div class="title">Risk Flags</div><ul class="items" style="list-style:none">`;
    for (const f of dd.risk_flags.slice(0,10)) {
      html += `<li style="display:flex;align-items:center;gap:6px">
        <input type="checkbox" class="dd-item" data-section="risk" data-idx="${itemIdx}" checked>
        <span class="tag">${f.severity}</span> ${escHtml(f.flag)}</li>`;
      itemIdx++;
    }
    html += `</ul></div>`;
  }
  if (dd.clarification_questions?.length) {
    html += `<div class="findings-section"><div class="title">Clarification Questions</div><ul class="items" style="list-style:none">`;
    for (const q of dd.clarification_questions) {
      html += `<li style="display:flex;align-items:center;gap:6px">
        <input type="checkbox" class="dd-item" data-section="question" data-idx="${itemIdx}" checked>
        ? ${escHtml(q)}</li>`;
      itemIdx++;
    }
    html += `</ul></div>`;
  }
  if (dd.suggested_additions?.length) {
    html += `<div class="findings-section"><div class="title">Suggested Additions to Scope</div><ul class="items" style="list-style:none">`;
    for (const s of dd.suggested_additions) {
      html += `<li style="display:flex;align-items:center;gap:6px">
        <input type="checkbox" class="dd-item" data-section="suggestion" data-idx="${itemIdx}" checked>
        <span class="tag">${s.priority}</span> [${s.category}] ${escHtml(s.suggestion)}</li>`;
      itemIdx++;
    }
    html += `</ul></div>`;
  }
  html += `<div class="flex mt">
    <button class="btn btn-sm" onclick="acceptAllSuggestions()">Accept All</button>
    <button class="btn btn-sm btn-outline" onclick="addSelectedToPrompt()">Add Selected to Prompt</button>
    <button class="btn btn-sm btn-outline" onclick="toggleAllDDItems(true)">Select All</button>
    <button class="btn btn-sm btn-outline" onclick="toggleAllDDItems(false)">Deselect All</button>
  </div><div id="ddFeedbackResult" class="mt"></div>`;
  html += `</div>`;
  el.innerHTML = html;
}

function toggleAllDDItems(checked) {
  document.querySelectorAll('.dd-item').forEach(cb => cb.checked = checked);
}

function _getSelectedDDItems() {
  const dd = state.lastDeepDive?.deep_dive || {};
  const allItems = [
    ...(dd.missing_areas||[]).map(m => `[Missing] ${m.area}: ${m.suggestion}`),
    ...(dd.risk_flags||[]).slice(0,10).map(f => `[Risk] ${f.flag}`),
    ...(dd.clarification_questions||[]).map(q => `[Question] ${q}`),
    ...(dd.suggested_additions||[]).map(s => `[Suggestion] ${s.suggestion}`),
  ];
  const selected = [];
  document.querySelectorAll('.dd-item').forEach((cb, i) => {
    if (cb.checked && allItems[i]) selected.push(allItems[i]);
  });
  return selected;
}

async function acceptAllSuggestions() {
  if (!state.current) return;
  const items = _getSelectedDDItems();
  if (!items.length) { alert('No items selected'); return; }
  const el = document.getElementById('ddFeedbackResult');
  el.innerHTML = '<p style="color:var(--text-dim)">Applying feedback...</p>';
  const r = await api('POST', `/api/projects/${state.current.id}/deep-dive/feedback`, {accepted: items});
  if (r.error) { el.innerHTML = `<p style="color:var(--danger)">${r.error}</p>`; return; }
  el.innerHTML = `<p style="color:var(--accent2)">Accepted ${r.accepted_count} items</p>`;
}

async function addSelectedToPrompt() {
  if (!state.current) return;
  const items = _getSelectedDDItems();
  if (!items.length) { alert('No items selected'); return; }
  const el = document.getElementById('ddFeedbackResult');
  el.innerHTML = '<p style="color:var(--text-dim)">Adding to prompt...</p>';
  const r = await api('POST', `/api/projects/${state.current.id}/deep-dive/feedback`, {added_to_prompt: items});
  if (r.error) { el.innerHTML = `<p style="color:var(--danger)">${r.error}</p>`; return; }
  el.innerHTML = `<p style="color:var(--accent2)">Added ${r.added_to_prompt_count} items to prompt</p>`;
  // Also append to custom prompt textarea if visible
  const ta = document.getElementById('customPrompt');
  if (ta) { ta.value = (ta.value ? ta.value + '\n' : '') + items.join('\n'); }
}

// Old feedback functions removed – replaced by toggle-based versions above
</script>

<script>
// ─── Init ───
(async () => { await Promise.all([loadProjects(), loadBackends()]); render(); })();
</script>
