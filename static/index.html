    </div>`;
  }
  // S4-02: Missing Areas section
  const missingCats = r.missing_categories || [];
  if (missingCats.length) {
    html += `<div class="card" style="margin-top:8px;border-top:2px solid var(--text-dim)">
      <div class="flex-between mb">
        <div class="card-title" style="font-size:12px"><span class="icon">🕳️</span>Missing Areas</div>
      </div>
      <div class="flex gap-sm" style="flex-wrap:wrap;margin-bottom:6px">
        ${missingCats.map(c => `<span class="tag" style="color:var(--text-dim)">${escHtml(c)}</span>`).join('')}
      </div>
      <p class="fs11 c-dim">These areas had no findings — consider addressing them in the next review.</p>
    </div>`;
  }
  // S5-01/S5-03: Decision Points section
  const decisionPoints = r.decision_points || [];
  if (decisionPoints.length) {
    html += `<div class="card" style="margin-top:8px;border-top:2px solid var(--accent)">
      <div class="flex-between mb">
        <div class="card-title" style="font-size:12px"><span class="icon">🎯</span>Decision Points <span class="tag" style="background:var(--accent);color:#000">${decisionPoints.length}</span></div>
      </div>
      ${decisionPoints.map(dp => `<div class="findings-item" style="font-size:12px;display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap">
        <span class="tag" style="font-size:9px">${escHtml(dp.category||'')}</span>
        <select style="font-size:9px;padding:1px 4px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);color:var(--text)" onchange="updateDecisionStatus('${escHtml(r.review_id)}','${escHtml(dp.id||'')}',this.value)">
          ${['open','addressed','validated','rejected'].map(s=>`<option value="${s}"${dp.status===s?' selected':''}>${s}</option>`).join('')}
        </select>
        <span style="flex:1">${escHtml(dp.text||'')}</span>
      </div>`).join('')}
      <p class="fs11 c-dim" style="margin-top:6px">Decisions that must be made before this review can be finalised.</p>
    </div>`;
  }
  // S6-02: What Changed — fetch real diff when predecessor exists
  if(r.previous_review_id){
    let diffHtml = '';
    try {
      const diff = await api('GET', `/api/projects/${pid}/hierarchy/reviews/${r.review_id}/diff`);
      if (diff && !diff.error) {
        function _diffSection(label, icon, data) {
          if (!data) return '';
          const newItems = data.new || [];
          const resolved = data.resolved || [];
          const unchanged = data.unchanged || 0;
          if (!newItems.length && !resolved.length && !unchanged) return '';
          const rows = [
            ...newItems.map(i => `<div class="diff-added">${escHtml((i.text||i.category||String(i)).slice(0,120))}</div>`),
            ...resolved.map(i => `<div class="diff-removed">${escHtml((i.text||i.category||String(i)).slice(0,120))}</div>`),
          ].join('') || `<p class="fs11 c-dim" style="padding:2px 0">No changes</p>`;
          const badge = newItems.length
            ? `<span class="diff-trend up">+${newItems.length}</span>`
            : resolved.length
              ? `<span class="diff-trend down">−${resolved.length}</span>`
              : `<span class="diff-trend same">~</span>`;
          return `<details class="mb8">
            <summary class="diff-cat-header">
              <span>${icon}</span><strong style="font-size:12px">${label}</strong>
              ${badge}
              <span class="diff-count" style="margin-left:auto">${unchanged} unchanged</span>
            </summary>
            <div class="diff-cat-body">${rows}</div>
          </details>`;
        }
        diffHtml = _diffSection('Findings', '📋', diff.findings)
                 + _diffSection('Weaknesses', '⚠️', diff.weaknesses)
                 + _diffSection('Decision Points', '🎯', diff.decision_points);
      }
    } catch(e) {}
    html+=`<div class="card diff-card" style="margin-top:8px">
      <div class="flex-between mb">
        <div class="card-title" style="font-size:12px"><span class="icon">🔄</span>What Changed from ${escHtml(r.previous_review_id)}</div>
      </div>
      ${diffHtml || '<p class="fs11 c-dim">Diff unavailable.</p>'}
    </div>`;
  }
  // S3-03: Tighten button — pre-populates previousReviewId and switches to Reviews tab
  html+=`<div style="margin-top:8px">
    <button class="btn btn-sm btn-outline" onclick="
      const el=document.getElementById('previousReviewId');
      if(el)el.value='${escHtml(r.review_id)}';
      state.tab='reviews';render();
    ">🔁 Tighten with SME Questions</button>
  </div>`;
  html+=`</div>`;
  document.getElementById('main').innerHTML=html;
}

// S5-03: Update decision point status via API
async function updateDecisionStatus(reviewId, decisionId, status) {
  if (!state.current) return;
  const pid = state.current.id;
  try {
    await api('POST', `/api/projects/${pid}/hierarchy/reviews/${reviewId}/decision/${decisionId}/status`, { status });
  } catch(e) {
    console.error('Failed to update decision status', e);
  }
}

// S6-01: Update weakness status via API
async function updateWeaknessStatus(reviewId, weaknessId, status) {
  if (!state.current) return;
  const pid = state.current.id;
  try {
    await api('POST', `/api/projects/${pid}/hierarchy/reviews/${reviewId}/weakness/${weaknessId}/status`, { status });
  } catch(e) {
    console.error('Failed to update weakness status', e);
  }
}
</script>

<script>
// REVIEWS VIEW
async function viewReviews(){
  if(!state.current)return viewNoProject();
  // S2-01: initialise injected questions state (preserved across re-renders within tab)
  if(!state._injectedQuestions)state._injectedQuestions=[];
  const pid=state.current.id;
  // Use GET; server also accepts POST at /api/personas for backwards-compat
  const personas=await api('GET','/api/personas');
  const backendOpts=state.backends.map(b=>`<option value="${b.name}">${escHtml(b.display_name||b.name)}${b.available?'':' (not configured)'}</option>`).join('');

  let hierarchy={};
  try{hierarchy=await api('GET',`/api/projects/${pid}/hierarchy`);}catch(e){}
  const tree=hierarchy.tree||[];

  let versionsWithReviews=[];
  for(const phase of tree){
    for(const ver of(phase.versions||[])){
      if((ver.reviews||[]).length>0)versionsWithReviews.push({...ver,phase_label:phase.label});
    }
  }

  // S1-01: if a version is scoped in Dashboard, show only that version's reviews
  if(state._dashVersion){
    versionsWithReviews=versionsWithReviews.filter(v=>v.version_id===state._dashVersion);
  }

  // Sort reviews
  const sort=state._reviewSort||'newest';
  const sortBar=`<div class="sort-bar">
    <span>Sort:</span>
    <button class="sort-btn ${sort==='newest'?'active':''}" onclick="setReviewSort('newest')">Newest First</button>
    <button class="sort-btn ${sort==='oldest'?'active':''}" onclick="setReviewSort('oldest')">Oldest First</button>
    <button class="sort-btn ${sort==='most-findings'?'active':''}" onclick="setReviewSort('most-findings')">Most Findings</button>
  </div>`;

  // Build role checkboxes grouped by persona group
  const allRoles=personas.personas||personas.roles||[];
  const groupMap={};
  for(const r of allRoles){
    const g=r.group_name||r.group_id||'Other';
    (groupMap[g]=groupMap[g]||[]).push(r);
  }
  // Compact chip grid: one small chip per role, title tooltip for description
  const roleGrid=`<div style="display:flex;flex-wrap:wrap;gap:5px">`+
    allRoles.map(r=>`<label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;
        cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:20px;
        background:var(--surface2);user-select:none;white-space:nowrap"
        title="${escHtml(r.purpose||r.group_name||'')}">
        <input type="checkbox" class="role-check" value="${escHtml(r.id)}"
          onchange="_onRoleCheck(this)" style="accent-color:var(--accent);width:11px;height:11px">
        ${escHtml(r.name)}
      </label>`).join('')+`</div>`;

  const runCard=`<div class="card">
    <div class="card-title mb"><span class="icon">🔍</span>Run Persona Review</div>

    <div class="form-row">
      <label style="display:flex;align-items:baseline;gap:6px">
        Roles
        <span id="roleCountBadge" class="fs10 c-muted">(select up to 3)</span>
      </label>
      <div style="margin-top:6px">${roleGrid}</div>
    </div>

    <div class="mt8">
      <label class="fs10 c-dim">AI Backend</label>
      <select id="backendSelect" style="width:100%;margin-top:3px;background:var(--surface2);
        border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;
        color:var(--text);font-size:12px">${backendOpts}</select>
    </div>

    <div class="mt8">
      <button class="btn btn-outline" onclick="runDeepDive()" title="Generate targeted SME questions before running the review" style="margin-bottom:8px">
        🔬 Ask SME Questions
      </button>
      <p style="font-size:10px;color:var(--text-muted);margin-bottom:10px">
        💡 Workflow: Select role(s) → <strong>Ask SME Questions</strong> → tick questions →
        <strong>Add to Prompt</strong> → add notes → <strong>Run Review</strong>
      </p>
    </div>

    <!-- S2-01: Three-section prompt builder -->
    <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:4px">
      <!-- Section 1: Baseline prompt (collapsed read-only preview) -->
      <details id="baselinePromptSection" style="border-bottom:1px solid var(--border)">
        <summary style="list-style:none;cursor:pointer;padding:7px 10px;background:var(--surface2);
          display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text-dim)">
          <span class="chevron">▶</span>
          <span>① Baseline Persona Prompt</span>
          <span class="tag" style="font-size:9px;margin-left:auto">read-only</span>
        </summary>
        <div id="baselinePromptPreview" style="padding:8px 10px;font-size:11px;color:var(--text-muted);
          font-family:monospace;white-space:pre-wrap;background:var(--bg);max-height:120px;overflow-y:auto">
          Select a role above to preview the baseline prompt.
        </div>
      </details>

      <!-- Section 2: Injected SME questions -->
      <div style="border-bottom:1px solid var(--border);padding:8px 10px;background:var(--surface)">
        <div style="font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:6px">
          ② Injected Questions
          <span id="injectedCount" class="tag" style="font-size:9px;margin-left:4px">0</span>
        </div>
        <div id="injectedQuestions" style="display:flex;flex-wrap:wrap;gap:5px;min-height:24px">
          <span style="font-size:11px;color:var(--text-muted);font-style:italic">
            No questions added yet — use Ask SME Questions above.
          </span>
        </div>
      </div>

      <!-- Section 3: User notes (free text) -->
      <div style="padding:8px 10px;background:var(--surface)">
        <label style="font-size:11px;font-weight:600;color:var(--text-dim);display:block;margin-bottom:4px">
          ③ Additional Notes <span class="fs10 c-muted">(optional constraints, context)</span>
        </label>
        <textarea id="userNotes" rows="2"
          placeholder="e.g. Budget capped at £500K. AWS only. 3 senior engineers available."
          style="width:100%;background:var(--surface2);border:1px solid var(--border);
            border-radius:var(--radius);color:var(--text);font-size:12px;padding:6px 8px;
            resize:vertical"></textarea>
      </div>
    </div>

    <input type="hidden" id="previousReviewId" value="">
    <div class="flex gap-sm mt8">
      <button class="btn" onclick="runReview()">▶ Run Review</button>
    </div>
    <div id="deepDiveResult" class="mt"></div>
    <div id="reviewResult" class="mt"></div>
  </div>`;

  let listHtml='';
  if(versionsWithReviews.length){
    listHtml=`<div class="card">
      <div class="flex-between mb">
        <div class="card-title"><span class="icon">📜</span>Review History${state._dashVersion?` <span class="tag tag-blue" style="font-size:10px">v: ${escHtml(state._dashVersion)}</span>`:''}</div>
        <div class="flex gap-sm">
          ${state._dashVersion?`<button class="btn btn-xs btn-ghost" onclick="state._dashVersion='';render()">✕ All versions</button>`:''}
          <button class="btn btn-sm btn-ghost" id="revHistToggle"
            onclick="toggleExpandSection('#main .rev-hist-detail','revHistToggle')">Expand All</button>
          <button class="btn btn-sm btn-ghost" onclick="render()">↻ Refresh</button>
        </div>
      </div>
      ${sortBar}`;

    for(const ver of versionsWithReviews){
      let revs=[...(ver.reviews||[])];
      if(sort==='oldest')revs.sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||''));
      else if(sort==='most-findings')revs.sort((a,b)=>(b.total_findings||0)-(a.total_findings||0));
      else revs.sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
      const activeId=ver.active_review_id||'';

      listHtml+=`<details class="rev-hist-detail" open style="border-left:2px solid var(--border);padding-left:10px;margin:8px 0">
        <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--radius)"
          onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
          <span class="chevron">▶</span>
          <strong style="font-size:12px">${escHtml(ver.version_id)}</strong>
          ${ver.label?`<span style="color:var(--text-dim);font-size:12px">– ${escHtml(ver.label)}</span>`:''}
          <span class="tag">${escHtml(ver.phase_label||'')}</span>
          <span class="tag tag-blue">${revs.length} reviews</span>
        </summary>`;

      for(const rev of revs){
        const rid=rev.review_id||'';if(!rid)continue;
        const isActive=rid===activeId;
        // S2-03: Baseline vs Customised badge
        const pbs=rev.prompt_builder_state;
        const isCustomised=pbs&&((pbs.injected_questions||[]).length>0||(pbs.user_notes||'').trim().length>0);
        const promptBadge=isCustomised
          ?`<span class="tag tag-purple" style="font-size:9px">Customised</span>`
          :`<span class="tag" style="font-size:9px">Baseline</span>`;
        listHtml+=`<details style="margin:4px 0;background:var(--bg);border:1px solid ${isActive?'var(--accent)':'var(--border)'};border-radius:var(--radius);overflow:hidden">
          <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;gap:7px;padding:7px 10px"
            onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
            <span class="chevron">▶</span>
            <span class="tag" style="font-size:10px;padding:1px 6px;font-weight:700;background:var(--surface3)">R${rev.iteration_number||'?'}</span>
            <strong style="font-size:11px">${rid}</strong>
            ${isActive?'<span class="tag tag-green">active</span>':''}
            <span class="tag tag-purple">${escHtml(rev.persona||'–')}</span>
            <span class="tag">${escHtml(rev.ai_backend||'files_only')}</span>
            ${promptBadge}
            ${rev.total_findings?`<span class="tag tag-yellow">${rev.total_findings} findings</span>`:''}
            <span style="font-size:10px;color:var(--text-muted);margin-left:auto">${relativeTime(rev.created_at)} · ${fmtDateShort(rev.created_at)}</span>
          </summary>
          <div style="padding:8px 10px 10px;border-top:1px solid var(--border)">
            ${rev.summary?`<p style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${escHtml(rev.summary.slice(0,180))}</p>`:''}
            ${(()=>{
              const score=rev.completeness_score||0;
              const qs=rev.quality_status||'pending';
              // Human-readable status labels
              const qLabel=qs==='complete'?'Final':qs==='interim'?'In Progress':'Draft';
              const qBadge=qs==='complete'?'tag-green':qs==='interim'?'tag-yellow':'';
              // S1-05: score demoted — small inline badge only, no dominant progress bar
              const scoreColor=score>=70?'var(--green)':score>=40?'var(--yellow)':'var(--red)';
              return`<div class="flex gap-sm mb8" style="align-items:center;flex-wrap:wrap">
                <span class="tag ${qBadge}" style="font-size:10px">${qLabel}</span>
                <span style="font-size:10px;color:${scoreColor};background:var(--surface3);padding:1px 6px;border-radius:10px">${score}%</span>
                ${rev.completed_by?`<span class="fs10 c-muted">by ${escHtml(rev.completed_by)}</span>`:''}
              </div>`;
            })()}
            <div class="flex gap-sm">
              <button class="btn btn-sm btn-outline" onclick="viewReviewDetail('${rid}')">Full Details</button>
              ${!isActive?`<button class="btn btn-sm btn-ghost" onclick="setActiveReview('${ver.version_id}','${rid}')">Set Active</button>`:''}
              ${(rev.quality_status||'pending')==='pending'?`
                <button class="btn btn-sm btn-ghost" title="Work in progress — ready for further edits" onclick="openMarkComplete('${rid}','interim')">Mark as Draft</button>
                <button class="btn btn-sm btn-ghost" title="Ready for proposal generation" onclick="openMarkComplete('${rid}','complete')">Mark as Final</button>`
              :(rev.quality_status==='interim'?`<button class="btn btn-sm btn-ghost" title="Ready for proposal generation" onclick="openMarkComplete('${rid}','complete')">Mark as Final</button>`:
                `<span style="font-size:10px;color:var(--green)">✓ Final</span>`)
              }
              <button class="btn btn-sm btn-red" onclick="deleteReview('${rid}')">Delete</button>
            </div>
            <div id="markComplete_${rid}" style="display:none;margin-top:8px;padding:8px 10px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border)">
              <label class="fs11 c-dim">Your name</label>
              <div class="flex gap-sm mt-sm">
                <input id="completedBy_${rid}" placeholder="Your name" style="flex:1">
                <button class="btn btn-sm btn-ghost" onclick="submitMarkComplete('${rid}','interim')">Save as Draft</button>
                <button class="btn btn-sm btn-green" onclick="submitMarkComplete('${rid}','complete')">Mark as Final</button>
                <button class="btn btn-xs btn-ghost" onclick="document.getElementById('markComplete_${rid}').style.display='none'">✕</button>
              </div>
            </div>
          </div>
        </details>`;
      }
      listHtml+=`</details>`;
    }
    listHtml+=`</div>`;
  }
  return runCard+listHtml;
}

function setReviewSort(s){state._reviewSort=s;render();}

// ── Role checkbox helpers ──────────────────────────────────────────────────
function _getSelectedRoles(){
  return [...document.querySelectorAll('.role-check:checked')].map(c=>c.value);
}
function _onRoleCheck(chk){
  const checked=[...document.querySelectorAll('.role-check:checked')];
  const badge=document.getElementById('roleCountBadge');
  if(checked.length>3){chk.checked=false;toast('Maximum 3 roles per review','err');return;}
  if(badge)badge.textContent=`(${checked.length} selected — max 3)`;
  // S2-01: update baseline prompt preview
  const roles=checked.map(c=>c.value);
  _getBaselinePrompt(roles).then(text=>{
    const el=document.getElementById('baselinePromptPreview');
    if(el)el.textContent=text;
  });
}

// ── Review runner ─────────────────────────────────────────────────────────
async function runReview(){
  const roles=_getSelectedRoles();
  if(!roles.length){toast('Select at least one role','err');return;}
  const backend=document.getElementById('backendSelect')?.value||'files_only';

  // S2-01: assemble prompt from builder state
  const injected=state._injectedQuestions||[];
  const userNotes=(document.getElementById('userNotes')?.value||'').trim();
  const parts=[];
  if(injected.length)parts.push(injected.join('\n'));
  if(userNotes)parts.push(userNotes);
  const custom=parts.join('\n\n');

  // S2-02: structured prompt builder state for persistence
  const promptBuilderState={
    injected_questions:[...injected],
    user_notes:userNotes,
  };

  const el=document.getElementById('reviewResult');
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Running review…</span>';

  // S3-03: include chain link when a predecessor review is set
  const previousReviewId=(document.getElementById('previousReviewId')?.value||'').trim();
  const body={project_id:state.current.id,roles,ai_backend:backend,prompt_builder_state:promptBuilderState};
  if(custom)body.custom_prompt=custom;
  if(previousReviewId)body.previous_review_id=previousReviewId;
  const r=await api('POST','/api/review',body);
  if(r.error){el.innerHTML=`<p style="color:var(--red)">${escHtml(r.error)}</p>`;return;}
  // Clear prompt builder state after a successful review submission
  state._injectedQuestions=[];
  _renderInjectedQuestions();
  const notesEl=document.getElementById('userNotes');
  if(notesEl)notesEl.value='';
  const prevEl=document.getElementById('previousReviewId');
  if(prevEl)prevEl.value='';

  const roleTag=`<span class="tag tag-purple">${escHtml((r.roles||[r.persona]).join(' / '))}</span>`;
  let html=`<div class="card">
    <div class="flex-between mb">
      <div class="card-title"><span class="icon">✅</span>Review Results</div>
      <div class="flex gap-sm">${roleTag}<span class="tag">${escHtml(r.ai_backend||'files_only')}</span>
      ${r.ai_metadata?.tokens_used?`<span class="tag tag-green">${r.ai_metadata.tokens_used} tokens</span>`:''}</div>
    </div>
    ${r.summary?`<p style="font-size:12px;color:var(--text-dim);margin-bottom:10px">${escHtml(r.summary)}</p>`:''}`;

  if(r.findings_by_role&&Object.keys(r.findings_by_role).length){
    for(const[roleLabel,roleData]of Object.entries(r.findings_by_role)){
      if(roleData.error)continue;
      html+=`<details open style="border-left:3px solid var(--accent);padding-left:10px;margin-bottom:8px">
        <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;gap:7px;padding:6px 0">
          <span class="chevron">▶</span><span class="tag tag-purple">${escHtml(roleLabel)}</span>
        </summary><div style="padding-top:6px">`;
      for(const[sec,items]of Object.entries(roleData.findings||{})){
        if(!Array.isArray(items)||!items.length)continue;
        html+=`<details open><summary class="collapse-header" style="list-style:none;margin-bottom:2px">
            <span class="chevron">▶</span>
            <strong style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">${escHtml(sec.replace(/_/g,' '))}</strong>
            <span class="tag" style="margin-left:4px">${items.length}</span>
          </summary>
          <div class="collapse-body" style="padding-left:12px">
            ${items.map(i=>`<div class="findings-item">${escHtml(String(i))}</div>`).join('')}
          </div></details>`;
      }
      html+=`</div></details>`;
    }
  } else {
    for(const[s,items]of Object.entries(r.findings||{})){
      if(!Array.isArray(items)||!items.length)continue;
      html+=`<details open><summary class="collapse-header" style="list-style:none;margin-bottom:4px">
          <span class="chevron">▶</span>
          <strong style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">${escHtml(s.replace(/_/g,' '))}</strong>
          <span class="tag" style="margin-left:4px">${items.length}</span>
        </summary>
        <div class="collapse-body" style="padding-left:12px">
          ${items.map(i=>`<div class="findings-item">${escHtml(String(i))}</div>`).join('')}
        </div></details>`;
    }
  }

  const actions=r.recommended_actions||r.recommendations||[];
  if(actions.length){
    html+=`<details open><summary class="collapse-header" style="list-style:none;margin:4px 0">
      <span class="chevron">▶</span>
      <strong style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">Recommended Actions</strong>
      <span class="tag" style="margin-left:4px">${actions.length}</span>
    </summary>
    <div class="collapse-body" style="padding-left:12px">
      ${actions.map(a=>`<div class="findings-item">→ ${escHtml(String(a))}</div>`).join('')}
    </div></details>`;
  }
  if(r.questions?.length){
    html+=`<details open><summary class="collapse-header" style="list-style:none;margin:4px 0">
      <span class="chevron">▶</span>
      <strong style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">Open Questions</strong>
      <span class="tag" style="margin-left:4px">${r.questions.length}</span>
    </summary>
    <div class="collapse-body" style="padding-left:12px">
      ${r.questions.map(q=>`<div class="findings-item">❓ ${escHtml(q)}</div>`).join('')}
    </div></details>`;
  }
  if(r.prompt_used)html+=`<details class="mt8"><summary class="collapse-header" class="no-ls">
    <span class="chevron">▶</span><span class="fs12 c-accent">View Prompt(s)</span>
    </summary><div class="prompt-box">${escHtml(r.prompt_used)}</div></details>`;
  if(r.raw_output)html+=`<details style="margin-top:4px"><summary class="collapse-header" class="no-ls">
    <span class="chevron">▶</span><span class="fs12 c-accent">Raw AI Output</span>
    </summary><div class="prompt-box">${escHtml(r.raw_output)}</div></details>`;
  html+=`</div>`;
  el.innerHTML=html;
}
</script>

<script>
// DEEP DIVE  –  SME Questions workflow
async function runDeepDive(){
  if(!state.current)return;
  const el=document.getElementById('deepDiveResult');
  // Guard: require at least one role selected
  const roles=_getSelectedRoles();
  if(!roles.length){
    el.innerHTML=`<p style="color:var(--red);font-size:12px">⚠ Select at least one role before generating SME questions.</p>`;
    toast('Select at least one role first','err');
    return;
  }
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Generating SME questions…</span>';
  const custom=document.getElementById('userNotes')?.value||'';
  const backend=document.getElementById('backendSelect')?.value||'files_only';
  const allRoles=roles;
  let mergedGroups=[],mergedQuestions=[],mergedPct=0;
  for(const persona of allRoles){
    const r=await api('POST',`/api/projects/${state.current.id}/deep-dive`,
      {persona,custom_prompt:custom,ai_backend:backend});
    if(r.error)continue;
    // Tag each group with the role it came from
    (r.question_groups||[]).forEach(g=>{
      mergedGroups.push({...g,category:`[${persona}] ${g.category}`});
    });
    mergedQuestions.push(...(r.all_questions||[]).map(q=>`[${persona}] ${q}`));
    mergedPct=Math.max(mergedPct,r.scope_completeness||0);
  }
  const r={question_groups:mergedGroups,all_questions:mergedQuestions,
    scope_completeness:mergedPct,ai_mode:backend!=='files_only',ai_backend:backend,
    error:mergedGroups.length===0?'No questions generated':undefined};
  if(r.error){el.innerHTML=`<p style="color:var(--red)">${escHtml(r.error)}</p>`;return;}
  state.lastDeepDive=r;
  state.lastDeepDive.roles=allRoles;
  const groups=r.question_groups||[];
  const allQ=r.all_questions||[];
  const pct=r.scope_completeness??0;
  const pctTag=pct>=70?'tag-green':pct>=40?'tag-yellow':'tag-red';
  const srcLabel=r.ai_mode
    ?`✨ AI (${escHtml(r.ai_backend)}) — questions tailored to this project`
    :'🔍 Heuristic — select an AI backend for project-specific questions';
  state._ddAllItems=allQ;
  let globalIdx=0;

  function ddGroup(grp){
    const sectionId=`grp_${globalIdx}`;
    const rows=(grp.questions||[]).map(q=>{
      const i=globalIdx++;
      // S5-02: q may be a dict {question, decision_point_id, decision_point_text}
      const qText = (typeof q === 'object' && q !== null) ? (q.question||'') : String(q);
      const dpText = (typeof q === 'object' && q !== null) ? (q.decision_point_text||null) : null;
      const dpLine = dpText
        ? `<div style="font-size:9px;color:var(--text-dim);margin-top:2px;padding-left:2px">→ Decision: ${escHtml(dpText)}</div>`
        : '';
      return`<div class="dd-row" data-idx="${i}" data-section="${sectionId}"
          data-decision-id="${(typeof q==='object'&&q)?escHtml(q.decision_point_id||''):''}"
          data-decision-text="${(typeof q==='object'&&q)?escHtml(q.decision_point_text||''):''}"
          onclick="toggleDDRow(this)">
        <span class="dd-row-check-icon" id="dd-chk-${i}">✓</span>
        <span class="dd-row-content" style="flex:1">❓ ${escHtml(qText)}${dpLine}</span>
      </div>`;
    }).join('');
    return`<details open class="mb8">
      <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;
        padding:9px 12px;background:var(--surface2);border-radius:var(--radius)"
        onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background='var(--surface2)'">
        <span class="chevron" style="font-size:9px">▶</span>
        <span>${escHtml(grp.icon||'❓')}</span>
        <strong style="font-size:12px">${escHtml(grp.category)}</strong>
        <span class="tag tag-blue" style="margin-left:2px">${(grp.questions||[]).length}</span>
        <span class="dd-sec-count" id="ddsec_${sectionId}" style="font-size:11px;color:var(--text-muted);margin-left:auto">
          ${(grp.questions||[]).length} selected
        </span>
      </summary>
      <div style="padding:4px 0 0">${rows}</div>
    </details>`;
  }

  let html=`<div class="card" id="ddResultCard">
    <div class="flex-between mb">
      <div class="card-title"><span class="icon">🔬</span>SME Questions — ${escHtml(allRoles.join(' + '))}</div>
      <span class="tag ${pctTag}">Scope ${pct}%</span>
    </div>
    <p style="font-size:11px;color:var(--text-muted);margin-bottom:10px">${srcLabel}</p>`;

  html+=(groups.length
    ? groups.map(ddGroup).join('')
    : `<p style="color:var(--text-dim);font-size:12px">No questions generated. Run Intelligence first, or select an AI backend.</p>`);

  html+=`<div class="dd-sticky-bar">
    <span id="ddTotalCount" style="font-size:11px;font-weight:600;color:var(--text-dim)">
      ${allQ.length} of ${allQ.length} selected
    </span>
    <button class="btn btn-sm btn-outline" onclick="addSelectedToPrompt()">📋 Add to Prompt</button>
    <button class="btn btn-sm btn-ghost" onclick="toggleAllDDRows(true)">Select All</button>
    <button class="btn btn-sm btn-ghost" onclick="toggleAllDDRows(false)">Deselect All</button>
  </div>
  <div id="ddFeedbackResult"></div></div>`;
  el.innerHTML=html;
  _refreshDDTotals();
}

function toggleDDRow(rowEl){
  const sel=!rowEl.classList.contains('dd-row-deselected');
  if(sel){rowEl.classList.add('dd-row-deselected');rowEl.classList.remove('dd-row-selected');}
  else{rowEl.classList.remove('dd-row-deselected');rowEl.classList.add('dd-row-selected');}
  _refreshDDSectionCount(rowEl.dataset.section);_refreshDDTotals();
}
function toggleAllDDRows(select){
  document.querySelectorAll('.dd-row').forEach(row=>{
    if(select){row.classList.remove('dd-row-deselected');row.classList.add('dd-row-selected');}
    else{row.classList.add('dd-row-deselected');row.classList.remove('dd-row-selected');}
  });
  document.querySelectorAll('[id^="ddsec_"]').forEach(el=>{
    _refreshDDSectionCount(el.id.replace('ddsec_',''));
  });
  _refreshDDTotals();
}
function _refreshDDSectionCount(sectionId){
  const rows=document.querySelectorAll(`.dd-row[data-section="${sectionId}"]`);
  const sel=[...rows].filter(r=>!r.classList.contains('dd-row-deselected')).length;
  const el=document.getElementById(`ddsec_${sectionId}`);
  if(el)el.textContent=`${sel} selected`;
}
function _refreshDDTotals(){
  const all=document.querySelectorAll('.dd-row');
  const sel=[...all].filter(r=>!r.classList.contains('dd-row-deselected')).length;
  const tot=document.getElementById('ddTotalCount');
  if(tot)tot.textContent=`${sel} of ${all.length} selected`;
}
function _getSelectedDDItems(){
  const allItems=state._ddAllItems||[];
  const sel=[];
  document.querySelectorAll('.dd-row').forEach(row=>{
    if(!row.classList.contains('dd-row-deselected')){
      const i=parseInt(row.dataset.idx,10);
      if(allItems[i])sel.push(allItems[i]);
    }
  });
  return sel;
}
async function addSelectedToPrompt(){
  const items=_getSelectedDDItems();
  if(!items.length){toast('No questions selected','err');return;}
  // S2-01: strip role prefix tags and push into state._injectedQuestions (not textarea)
  const cleaned=items.map(q=>q.replace(/^\[[^\]]+\]\s*/,''));
  if(!state._injectedQuestions)state._injectedQuestions=[];
  for(const q of cleaned){
    if(!state._injectedQuestions.includes(q))state._injectedQuestions.push(q);
  }
  // S5-02: persist decision_mappings into prompt_builder_state
  if(!state._promptBuilderState)state._promptBuilderState={};
  if(!state._promptBuilderState.decision_mappings)state._promptBuilderState.decision_mappings={};
  document.querySelectorAll('.dd-row').forEach(row=>{
    if(!row.classList.contains('dd-row-deselected')){
      const dpId=row.dataset.decisionId||'';
      const dpText=row.dataset.decisionText||'';
      if(dpId){
        const qIdx=parseInt(row.dataset.idx,10);
        const rawQ=(state._ddAllItems||[])[qIdx]||'';
        const cleanQ=rawQ.replace(/^\[[^\]]+\]\s*/,'');
        state._promptBuilderState.decision_mappings[cleanQ]={decision_point_id:dpId,decision_point_text:dpText};
      }
    }
  });
  _renderInjectedQuestions();
  toast(`Added ${cleaned.length} question(s) to prompt — now click Run Review`);
  document.getElementById('ddFeedbackResult').innerHTML=
    `<p style="color:var(--green);font-size:12px">✓ Added ${cleaned.length} question(s). Click <strong>Run Review</strong>.</p>`;
}
async function acceptAllSuggestions(){await addSelectedToPrompt();}

// S2-01: Render injected question chips and update counter badge
function _renderInjectedQuestions(){
  const container=document.getElementById('injectedQuestions');
  const countEl=document.getElementById('injectedCount');
  const qs=state._injectedQuestions||[];
  if(countEl)countEl.textContent=qs.length;
  if(!container)return;
  if(!qs.length){
    container.innerHTML='<span style="font-size:11px;color:var(--text-muted);font-style:italic">No questions added yet — use Ask SME Questions above.</span>';
    return;
  }
  container.innerHTML=qs.map((q,i)=>`
    <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;
      padding:3px 8px;border:1px solid var(--accent-dim);border-radius:20px;
      background:var(--surface2);max-width:340px">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px"
        title="${escHtml(q)}">${escHtml(q.slice(0,80))}${q.length>80?'…':''}</span>
      <button onclick="_removeInjectedQuestion(${i})" style="background:none;border:none;
        color:var(--text-muted);cursor:pointer;padding:0;font-size:12px;line-height:1"
        title="Remove">✕</button>
    </span>`).join('');
}

// S2-01: Remove a single injected question chip
function _removeInjectedQuestion(idx){
  if(!state._injectedQuestions)return;
  state._injectedQuestions.splice(idx,1);
  _renderInjectedQuestions();
}

// S2-01: Populate baseline prompt preview when a role is selected.
// Shows the actual prompt_template (admin override > YAML default) from /api/personas.
async function _getBaselinePrompt(roles){
  if(!roles||!roles.length)return'Select a role above to preview the baseline prompt.';
  try{
    const personas=await api('GET','/api/personas');
    const allRoles=personas.personas||personas.roles||[];
    // Collect unique groups for the selected roles (preserving selection order)
    const seenGroups=new Set();
    const lines=[];
    for(const role of roles){
      const p=allRoles.find(r=>r.id===role||r.name===role);
      if(p&&!seenGroups.has(p.group_id)){
        seenGroups.add(p.group_id);
        const template=(p.prompt_template||'').trim();
        if(template){
          lines.push(template);
        }else{
          // Fallback: show purpose line when no prompt_template available
          const label=p.name||role;
          const group=p.group_name||'';
          const purpose=p.purpose||'';
          lines.push(`[${label}${group?' · '+group:''}]${purpose?' '+purpose:''}`);
        }
      }
    }
    return lines.length?lines.join('\n\n---\n\n'):'No baseline prompt available for selected roles.';
  }catch(e){
    return'Could not load baseline prompt.';
  }
}
</script>

<script>
// DIAGRAMS VIEW
async function viewDiagrams(){
  if(!state.current)return viewNoProject();
  const pid=state.current.id;

  // Check if intelligence is built
  let intel={};
  try{const r=await api('GET',`/api/projects/${pid}/intelligence`);intel=r.intelligence||r;}catch(e){}
  const hasIntel=!!(intel.risks||intel.scope||intel.dependencies);

  // Load list of already-generated diagrams
  let existing=[];
  try{const r=await api('GET',`/api/projects/${pid}/diagrams`);existing=r.diagrams||[];}catch(e){}

  // Load versions + reviews for context selector
  let allVersions=[];
  try{const r=await api('GET',`/api/projects/${pid}/hierarchy/versions`);allVersions=r.versions||[];}catch(e){}

  const selDV=state._diagVersion||'';
  const selDR=state._diagReview||'';

  // Reviews available for selected version
  let diagReviews=[];
  if(selDV){
    try{const r=await api('GET',`/api/projects/${pid}/hierarchy/versions/${selDV}`);diagReviews=r.reviews||[];}catch(e){}
  }

  const TYPES=[
    {key:'dependency_map',   label:'Dependency Map',   icon:'🔗',
     desc:'Dependency nodes with edges to related risks and constraints. Relationships drawn from shared keywords.'},
    {key:'risk_heatmap',     label:'Risk Heatmap',     icon:'🔴',
     desc:'Risks plotted on a 3×3 Impact vs Likelihood grid, colour-coded by severity.'},
    {key:'scope_overview',   label:'Scope Overview',   icon:'📄',
     desc:'One swimlane per category showing all extracted items — a single-page project summary.'},
  ];

  const existingKeys=new Set(existing.map(d=>d.diagram_type));

  if(!hasIntel){
    return`<div class="card"><div class="empty">
      <div class="empty-icon">📐</div>
      <p>No intelligence built yet. Run Intelligence first, then generate diagrams.</p>
      <button class="btn mt" onclick="goToBuildIntelligence()">🔨 Go to Build Intelligence</button>
    </div></div>`;
  }

  // Context selector card — built with string concat to avoid triple-nested template literals
  const vOpts=allVersions.map(v=>'<option value="'+v.version_id+'" '+(v.version_id===selDV?'selected':'')+'>'
    +escHtml(v.version_id)+(v.label?' \u2013 '+escHtml(v.label):'')+' ('+fmtDateShort(v.created_at)+')</option>').join('');
  const rOpts=diagReviews.map(r=>'<option value="'+r.review_id+'" '+(r.review_id===selDR?'selected':'')+'>'
    +r.review_id+' \u2013 '+escHtml(r.persona||'')+' ('+fmtDateShort(r.created_at)+')</option>').join('');
  let ctxNote='';
  if(selDR){ctxNote='<p style="font-size:11px;color:var(--accent);margin-top:6px">Diagrams include findings from review <strong>'+escHtml(selDR)+'</strong> merged with base intelligence.</p>';}
  else if(selDV){ctxNote='<p style="font-size:11px;color:var(--text-dim);margin-top:6px">Scoped to version <strong>'+escHtml(selDV)+'</strong>. Select a review to include its findings.</p>';}
  let selectorHtml='';
  if(allVersions.length){
    let reviewSel='';
    if(selDV){
      reviewSel='<div style="display:flex;flex-direction:column;gap:3px;flex:1;min-width:180px">'
        +'<label style="font-size:11px;color:var(--text-dim)">Review</label>'
        +'<select onchange="onDiagReviewChange(this.value)" style="width:100%">'
        +'<option value="">No review (base only)</option>'+rOpts
        +'</select></div>';
    }
    selectorHtml='<div class="flex" style="flex-wrap:wrap;gap:10px;align-items:flex-end">'
      +'<div style="display:flex;flex-direction:column;gap:3px;flex:1;min-width:160px">'
      +'<label style="font-size:11px;color:var(--text-dim)">Version</label>'
      +'<select onchange="onDiagVersionChange(this.value)" style="width:100%">'
      +'<option value="">Latest (base intelligence)</option>'+vOpts
      +'</select></div>'
      +reviewSel
      +'</div>';
  }

  const ctxCard='<div class="card">'
    +'<div class="flex-between mb">'
    +'<div class="card-title"><span class="icon">&#128208;</span>Diagram Generator</div>'
    +'<button class="btn btn-sm btn-outline" onclick="generateAllDiagrams()">&#9889; Generate All</button>'
    +'</div>'
    +'<p style="font-size:12px;color:var(--text-dim);margin-bottom:10px">'
    +'Diagrams are scoped to a version + review. Select context below then generate or refresh.'
    +' Open in <a href="https://app.diagrams.net" target="_blank" style="color:var(--accent)">diagrams.net</a>.'
    +'</p>'
    +selectorHtml
    +ctxNote
    +'</div>';

  let html=ctxCard;

  for(const t of TYPES){
    const isReady=existingKeys.has(t.key);
    html+=`<div class="card">
      <div class="flex-between mb">
        <div>
          <div style="font-size:14px;font-weight:600">${t.icon} ${escHtml(t.label)}</div>
          <p style="font-size:12px;color:var(--text-dim);margin:4px 0 0">${escHtml(t.desc)}</p>
        </div>
        <span class="tag ${isReady?'tag-green':'tag-yellow'}">${isReady?'Ready':'Not generated'}</span>
      </div>
      <div class="flex gap-sm">
        <button class="btn btn-sm" id="gen-${t.key}"
          onclick="generateDiagram('${t.key}')">
          ${isReady?'🔄 Regenerate':'⚡ Generate'}
        </button>
        ${isReady?`<button class="btn btn-sm btn-outline"
          onclick="downloadDiagram('${t.key}','${t.label}')">
          ⬇ Download .drawio
        </button>`:''}
      </div>
      <div id="diag-status-${t.key}" style="margin-top:8px;font-size:11px;color:var(--text-dim)"></div>
    </div>`;
  }

  return html;
}

function onDiagVersionChange(vid){
  state._diagVersion=vid;
  state._diagReview='';
  render();
}

function onDiagReviewChange(rid){
  state._diagReview=rid;
  // Auto-select the version that owns this review if unset (shouldn't happen, but guard)
  render();
}

async function generateDiagram(dtype){
  if(!state.current)return;
  const pid=state.current.id;
  const btn=document.getElementById(`gen-${dtype}`);
  const status=document.getElementById(`diag-status-${dtype}`);
  if(btn){btn.disabled=true;btn.textContent='⏳ Generating…';}
  if(status)status.textContent='';
  // Pass version/review context so backend merges review findings
  const body={};
  if(state._diagVersion)body.version_id=state._diagVersion;
  if(state._diagReview)body.review_id=state._diagReview;
  try{
    const r=await api('POST',`/api/projects/${pid}/diagrams/${dtype}/generate`,body);
    if(r.error){
      if(status)status.textContent=`Error: ${r.error}`;
      if(btn){btn.disabled=false;btn.textContent=btn.textContent.includes('Regenerate')?'🔄 Regenerate':'⚡ Generate';}
    }else{
      toast(`${dtype.replace(/_/g,' ')} generated (${(r.size_bytes/1024).toFixed(1)} KB)`);
      render();
    }
  }catch(e){
    if(status)status.textContent='Generation failed.';
    if(btn){btn.disabled=false;btn.textContent='⚡ Generate';}
  }
}

async function generateAllDiagrams(){
  const types=['dependency_map','risk_heatmap','scope_overview'];
  for(const t of types)await generateDiagram(t);
}

async function downloadDiagram(dtype,label){
  if(!state.current)return;
  const pid=state.current.id;
  try{
    const resp=await fetch(`/api/projects/${pid}/diagrams/${dtype}`);
    if(!resp.ok){toast('Download failed','err');return;}
    const xml=await resp.text();
    const blob=new Blob([xml],{type:'application/xml'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`${dtype}.drawio`;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    toast(`Downloaded ${label}.drawio`);
  }catch(e){toast('Download error','err');}
}

// PHASES VIEW
async function viewPhases(){
  if(!state.current)return viewNoProject();
  const pid=state.current.id;
  let phases=[];
  try{const r=await api('GET',`/api/projects/${pid}/hierarchy/phases`);phases=r.phases||[];}catch(e){}
  if(!phases.length){
    phases=[
      {id:'pre-sales',label:'Pre-sales',order:1,description:'Client engagement, proposals, scoping',is_current:true,version_count:0,review_count:0},
      {id:'design',label:'Design',order:2,description:'Architecture, solution design, planning',is_current:false,version_count:0,review_count:0},
      {id:'delivery',label:'Delivery',order:3,description:'Execution, development, implementation',is_current:false,version_count:0,review_count:0},
      {id:'support',label:'Support',order:4,description:'Operations, maintenance, handover',is_current:false,version_count:0,review_count:0},
    ];
  }
  const sorted=phases.sort((a,b)=>a.order-b.order);
  const current=sorted.find(p=>p.is_current)||sorted[0];

  const bar=sorted.map(p=>{
    const done=p.order<current.order;
    const cls=p.is_current?'current':done?'done':'pending';
    return`<div class="phase-step ${cls}" onclick="viewPhaseDetail('${p.id}')" title="${escHtml(p.description)}">${escHtml(p.label)}</div>`;
  }).join('');

  let cards='';
  for(const p of sorted){
    const borderStyle=p.is_current?'border-left:3px solid var(--accent)':'';
    cards+=`<div class="card" style="${borderStyle}">
      <div class="flex-between mb">
        <div class="card-title" style="margin:0">
          <span class="icon">${p.is_current?'🟢':'⚪'}</span> ${escHtml(p.label)}
          ${p.is_current?'<span class="tag tag-green" style="margin-left:4px">current</span>':''}
        </div>
        ${p.entered_at?`<span class="fs10 c-muted">Since ${fmtDateShort(p.entered_at)}</span>`:''}
      </div>
      <p style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${escHtml(p.description||'')}</p>
      <div class="flex gap-sm">
        <span class="tag tag-blue">${p.version_count||0} versions</span>
        <span class="tag">${p.review_count||0} reviews</span>
        ${!p.is_current?`<button class="btn btn-xs btn-outline" class="ml-auto"
          onclick="doHierarchyTransition('${p.id}')">Transition Here</button>`:''}
      </div>
    </div>`;
  }

  const trans=`<div class="card">
    <div class="card-title mb"><span class="icon">🔄</span>Transition Phase</div>
    <div class="flex gap-sm">
      <select id="nextPhaseH">${phases.filter(p=>!p.is_current).map(p=>`<option value="${p.id}">${escHtml(p.label)}</option>`).join('')}</select>
      <input id="phaseReasonH" placeholder="Reason (optional)" style="flex:1">
      <button class="btn btn-sm" onclick="doHierarchyTransition()">Transition</button>
    </div>
    <div id="phaseHResult" class="mt"></div>
  </div>`;

  return`<div class="card">
    <div class="card-title mb"><span class="icon">🗂️</span>Project Lifecycle</div>
    <p class="card-subtitle">Each phase contains versions and reviews. Click a phase to view its content.</p>
    <div class="phase-bar">${bar}</div>
  </div>`+cards+trans;
}

async function viewPhaseDetail(phaseId){
  const pid=state.current.id;
  let versions=[];
  try{const r=await api('GET',`/api/projects/${pid}/hierarchy/versions`);versions=(r.versions||[]).filter(v=>v.phase_id===phaseId);}catch(e){}
  let html=`<div class="card">
    <div class="flex-between mb">
      <div class="card-title"><span class="icon">🗂️</span>Phase: ${escHtml(phaseId)}</div>
      <button class="btn btn-sm btn-ghost" onclick="render()">← Back</button>
    </div>
    <p class="card-subtitle">${versions.length} versions in this phase</p>`;
  if(versions.length){
    for(const v of versions){
      html+=`<div class="card" style="background:var(--surface2)">
        <div class="flex-between">
          <strong>${escHtml(v.version_id)}</strong>
          <span class="fs10 c-muted">${fmtDateShort(v.created_at)}</span>
        </div>
        <p class="fs11 c-dim">${escHtml(v.label||'')} · ${v.artifact_count||0} files · ${v.review_count||0} reviews</p>
      </div>`;
    }
  }else{html+=`<p style="color:var(--text-muted);font-size:12px;padding:10px 0">No versions in this phase yet.</p>`;}
  html+=`</div>`;
  document.getElementById('main').innerHTML=html;
}

async function doHierarchyTransition(phaseIdOverride){
  const phase=phaseIdOverride||document.getElementById('nextPhaseH').value;
  const reason=document.getElementById('phaseReasonH')?.value||'';
  const r=await api('POST',`/api/projects/${state.current.id}/hierarchy/phase`,{phase_id:phase,reason});
  if(r.error){toast(r.error,'err');return;}
  toast(`Transitioned to ${phase}`);
  await api('POST',`/api/projects/${state.current.id}/phase`,{new_phase:phase,reason});
  state.current.phase=phase;
  setTimeout(()=>render(),600);
}
</script>

<script>

        <button class="btn" onclick="submitCaptureFeedback()">💾 Save Feedback</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('captureFbForm').style.display='none'">Cancel</button>
      </div>
      <div id="captureFbResult" class="mt"></div>
    </div>
  </div>`;

  const createProposalForm=`<div id="createProposalForm" style="display:none">
    <div class="card" style="border:1px solid var(--green-dim)">
      <div class="card-title mb"><span class="icon">📋</span>Create Proposal
        <span class="tag tag-blue" style="margin-left:6px">DS-10</span></div>
      <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px">
        A proposal is generated from a <strong>Version</strong> + its <strong>Active Review</strong>.
        Both are required before proceeding.
      </p>
      <!-- Step 1: Source selection -->
      <p class="card-section" style="margin-top:0">Step 1 — Select Source</p>
      <div class="form-row"><label>Intelligence Version <span style="color:var(--red)">*</span></label>
        <select id="propVersionSelect" onchange="onPropVersionChange()" style="width:100%">
          <option value="">— select a version —</option>
        </select></div>
