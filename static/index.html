<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Delivery Accelerator</title>
<style>
:root {
  --bg: #0f1419; --surface: #1a2332; --surface2: #243447;
  --border: #2d4055; --text: #e6edf3; --text-dim: #8b949e;
  --accent: #58a6ff; --accent2: #3fb950; --warn: #d29922; --danger: #f85149;
  --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5; }
header { background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display:flex; align-items:center; gap:16px; }
header h1 { font-size: 18px; font-weight: 600; }
header .phase-badge { background: var(--accent); color:#000; padding:2px 10px;
  border-radius: 12px; font-size: 12px; font-weight: 600; }
nav { display:flex; gap:4px; margin-left:auto; }
nav button { background:transparent; color:var(--text-dim); border:none;
  padding:8px 14px; border-radius:var(--radius); cursor:pointer; font-size:13px; }
nav button:hover, nav button.active { background:var(--surface2); color:var(--accent); }
main { max-width:1100px; margin:0 auto; padding:24px; }
.card { background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:20px; margin-bottom:16px; }
.card h2 { font-size:15px; margin-bottom:12px; color:var(--accent); }
.card h3 { font-size:13px; margin:12px 0 6px; color:var(--text-dim); }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; }
.stat { text-align:center; padding:12px; background:var(--surface2); border-radius:var(--radius); }
.stat .num { font-size:28px; font-weight:700; color:var(--accent); }
.stat .label { font-size:11px; color:var(--text-dim); text-transform:uppercase; }
ul.items { list-style:none; }
ul.items li { padding:6px 0; border-bottom:1px solid var(--border); font-size:13px; }
ul.items li:last-child { border:none; }
.btn { background:var(--accent); color:#000; border:none; padding:8px 16px;
  border-radius:var(--radius); cursor:pointer; font-size:13px; font-weight:600; }
.btn:hover { opacity:0.85; }
.btn-outline { background:transparent; color:var(--accent); border:1px solid var(--accent); }
.btn-sm { padding:4px 10px; font-size:12px; }
.btn-warn { background:var(--warn); }
.btn-danger { background:var(--danger); }
input,select,textarea { background:var(--surface2); border:1px solid var(--border);
  color:var(--text); padding:8px 12px; border-radius:var(--radius); font-size:13px; width:100%; }
textarea { resize:vertical; min-height:60px; }
.form-row { margin-bottom:12px; }
.form-row label { display:block; font-size:12px; color:var(--text-dim); margin-bottom:4px; }
.flex { display:flex; gap:8px; align-items:center; }
.mt { margin-top:12px; }
.empty { text-align:center; padding:40px; color:var(--text-dim); }
.tag { display:inline-block; background:var(--surface2); padding:2px 8px;
  border-radius:10px; font-size:11px; margin:2px; }
.tag-risk { border:1px solid var(--danger); color:var(--danger); }
.tag-constraint { border:1px solid var(--warn); color:var(--warn); }
.tag-action { border:1px solid var(--accent2); color:var(--accent2); }
.findings-section { margin:8px 0; }
.findings-section .title { font-size:12px; font-weight:600; color:var(--text-dim); margin-bottom:4px; }
.findings-section li { font-size:12px; padding:3px 0; }
</style>
</head>
<body>
<div id="app">
  <header id="header"></header>
  <main id="main"></main>
</div>
<script>
// ─── API Helper ───
const API = '';
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  return r.json();
}

// ─── State ───
let state = { projects: [], current: null, tab: 'dashboard' };

// ─── Navigation ───
const TABS = ['dashboard','ingest','intelligence','reviews','proposals','phases'];

function renderHeader() {
  const proj = state.current;
  const name = proj ? proj.name : 'No Project';
  const phase = proj ? proj.phase : '';
  document.getElementById('header').innerHTML = `
    <h1>Accelerator</h1>
    ${phase ? `<span class="phase-badge">${phase}</span>` : ''}
    <span style="color:var(--text-dim);font-size:13px">${name}</span>
    <nav>${TABS.map(t=>`<button class="${state.tab===t?'active':''}" onclick="switchTab('${t}')">${t}</button>`).join('')}
      <button onclick="switchTab('settings')">+</button>
    </nav>`;
}

function switchTab(tab) { state.tab = tab; render(); }

async function render() {
  renderHeader();
  const main = document.getElementById('main');
  switch(state.tab) {
    case 'dashboard': main.innerHTML = await viewDashboard(); break;
    case 'ingest': main.innerHTML = await viewIngest(); break;
    case 'intelligence': main.innerHTML = await viewIntelligence(); break;
    case 'reviews': main.innerHTML = await viewReviews(); break;
    case 'proposals': main.innerHTML = await viewProposals(); break;
    case 'phases': main.innerHTML = await viewPhases(); break;
    case 'settings': main.innerHTML = viewSettings(); break;
  }
}

// ─── Dashboard View ───
async function viewDashboard() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;
  let intel = {}, versions = [];
  try { intel = await api('GET',`/api/projects/${pid}/intelligence`); } catch(e){}
  try { const r = await api('GET',`/api/projects/${pid}/versions`); versions = r.versions||[]; } catch(e){}
  const i = intel.intelligence || intel;
  const meta = i._build_metadata || {};
  return `
    <div class="grid">
      <div class="stat"><div class="num">${meta.total_risks||0}</div><div class="label">Risks</div></div>
      <div class="stat"><div class="num">${meta.total_constraints||0}</div><div class="label">Constraints</div></div>
      <div class="stat"><div class="num">${meta.total_dependencies||0}</div><div class="label">Dependencies</div></div>
      <div class="stat"><div class="num">${meta.total_assumptions||0}</div><div class="label">Assumptions</div></div>
      <div class="stat"><div class="num">${meta.total_action_items||0}</div><div class="label">Action Items</div></div>
      <div class="stat"><div class="num">${versions.length}</div><div class="label">Versions</div></div>
    </div>
    <div class="card mt">
      <h2>Quick Actions</h2>
      <div class="flex mt">
        <button class="btn" onclick="switchTab('ingest')">Ingest Files</button>
        <button class="btn btn-outline" onclick="buildContext()">Build Intelligence</button>
        <button class="btn btn-outline" onclick="switchTab('reviews')">Run Review</button>
      </div>
    </div>
    ${i.risks ? `<div class="card"><h2>Top Risks</h2><ul class="items">${(i.risks||[]).slice(0,5).map(r=>`<li>${r}</li>`).join('')}</ul></div>` : ''}
    ${i.action_items?.length ? `<div class="card"><h2>Action Items</h2><ul class="items">${i.action_items.slice(0,5).map(a=>`<li>${a}</li>`).join('')}</ul></div>` : ''}`;
}

function viewNoProject() {
  return `<div class="card"><h2>Getting Started</h2>
    <p style="color:var(--text-dim);margin-bottom:16px">Create a project or select an existing one.</p>
    <div class="form-row"><label>Project Name</label><input id="newName" placeholder="e.g. Cloud Migration"></div>
    <div class="form-row"><label>Description</label><input id="newDesc" placeholder="Optional description"></div>
    <button class="btn" onclick="createProject()">Create Project</button>
    ${state.projects.length ? `<h3 class="mt">Existing Projects</h3><ul class="items">${state.projects.map(p=>`<li><a href="#" onclick="selectProject('${p.id}')" style="color:var(--accent)">${p.name}</a> <span class="tag">${p.phase}</span></li>`).join('')}</ul>` : ''}
  </div>`;
}

// ─── Ingest View ───
async function viewIngest() {
  if (!state.current) return viewNoProject();
  return `<div class="card"><h2>Ingest Documents</h2>
    <p style="color:var(--text-dim);font-size:13px;margin-bottom:12px">Enter file paths (one per line) relative to project root.</p>
    <div class="form-row"><label>File Paths</label>
      <textarea id="ingestPaths" rows="5" placeholder="sample_data/sample_artefact.md&#10;sample_data/sample_email.txt&#10;sample_data/scope.txt"></textarea>
    </div>
    <button class="btn" onclick="doIngest()">Ingest Files</button>
    <div id="ingestResult" class="mt"></div></div>`;
}

async function doIngest() {
  const paths = document.getElementById('ingestPaths').value.split('\\n').map(p=>p.trim()).filter(Boolean);
  if (!paths.length) return;
  const r = await api('POST','/api/ingest',{project_id:state.current.id,file_paths:paths});
  let html = `<div class="card"><h3>Ingested: ${r.ingested||0} file(s)</h3>`;
  if (r.documents) html += `<ul class="items">${r.documents.map(d=>`<li>${d.filename} (${d.source_type}, ${d.sections} sections)</li>`).join('')}</ul>`;
  if (r.errors?.length) html += `<p style="color:var(--danger)">${r.errors.map(e=>e.error).join('<br>')}</p>`;
  html += '</div>';
  document.getElementById('ingestResult').innerHTML = html;
}

// ─── Intelligence View ───
async function viewIntelligence() {
  if (!state.current) return viewNoProject();
  const data = await api('GET',`/api/projects/${state.current.id}/intelligence`);
  const i = data.intelligence || data;
  if (!i.risks && !i.constraints) return `<div class="card empty"><p>No intelligence yet.</p><button class="btn mt" onclick="buildContext()">Build Now</button></div>`;
  const cats = ['risks','assumptions','dependencies','constraints','action_items'];
  return `<div class="card"><h2>Intelligence</h2><div class="flex"><button class="btn btn-sm btn-outline" onclick="buildContext()">Rebuild</button></div></div>` +
    cats.map(c => { const items = i[c]||[]; if(!items.length) return '';
      return `<div class="card"><h2>${c.replace(/_/g,' ').replace(/\\b\\w/g,l=>l.toUpperCase())} (${items.length})</h2><ul class="items">${items.map(x=>`<li>${typeof x==='object'?(x.description||JSON.stringify(x)):x}</li>`).join('')}</ul></div>`;
    }).join('') + (i.scope?`<div class="card"><h2>Scope</h2><p style="font-size:13px;white-space:pre-wrap">${i.scope.slice(0,1000)}</p></div>`:'');
}

// ─── Reviews View ───
async function viewReviews() {
  if (!state.current) return viewNoProject();
  const personas = await api('POST','/api/personas');
  const history = await api('GET',`/api/projects/${state.current.id}/reviews`);
  const reviews = history.reviews || [];
  return `<div class="card"><h2>Run Persona Review</h2>
    <div class="flex">
      <select id="personaSelect">${(personas.personas||[]).map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select>
      <select id="backendSelect"><option value="files_only">Files Only</option><option value="ollama">Ollama</option><option value="bedrock">Bedrock</option></select>
      <button class="btn" onclick="runReview()">Run</button></div>
    <div id="reviewResult" class="mt"></div></div>` +
    (reviews.length ? `<div class="card"><h2>History (${reviews.length})</h2><ul class="items">${reviews.map(r=>`<li><strong>${r.persona}</strong> ${r.timestamp?.slice(0,16)} (${r.ai_backend}) – ${r.total_findings} findings</li>`).join('')}</ul></div>` : '');
}

async function runReview() {
  const persona = document.getElementById('personaSelect').value;
  const backend = document.getElementById('backendSelect').value;
  document.getElementById('reviewResult').innerHTML = '<p style="color:var(--text-dim)">Running...</p>';
  const r = await api('POST','/api/review',{project_id:state.current.id,persona,ai_backend:backend});
  let html = `<div class="card"><h3>${r.persona}</h3><p style="font-size:12px;color:var(--text-dim)">${r.summary||''}</p>`;
  for (const [s, items] of Object.entries(r.findings||{})) {
    if (items.length) html += `<div class="findings-section"><div class="title">${s.replace(/_/g,' ')}</div><ul class="items">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
  }
  if (r.questions?.length) html += `<div class="findings-section"><div class="title">Questions</div><ul class="items">${r.questions.map(q=>`<li>? ${q}</li>`).join('')}</ul></div>`;
  html += '</div>';
  document.getElementById('reviewResult').innerHTML = html;
}

// ─── Proposals View ───
async function viewProposals() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;
  let proposal = null;
  try { proposal = await api('GET',`/api/projects/${pid}/proposal`); } catch(e){}
  if (!proposal || proposal.error) {
    return `<div class="card"><h2>Create Proposal</h2>
      <div class="form-row"><label>Proposal Name</label><input id="propName" placeholder="Cloud Migration Proposal"></div>
      <div class="form-row"><label>Client</label><input id="propClient" placeholder="Client name"></div>
      <div class="form-row"><label>Notes</label><textarea id="propNotes" placeholder="Initial notes"></textarea></div>
      <button class="btn" onclick="createProposal()">Create</button></div>`;
  }
  const versions = proposal.versions || [];
  return `<div class="card"><h2>${proposal.proposal_name}</h2>
    <p style="font-size:13px;color:var(--text-dim)">Client: ${proposal.client||'-'} | Versions: ${proposal.total_versions} | Current: ${proposal.current_version}</p>
    <button class="btn btn-sm btn-outline mt" onclick="addProposalVersion()">+ Add Version</button></div>
    <div class="card"><h2>Versions</h2><ul class="items">${versions.map(v=>`<li><strong>${v.version_id}</strong> ${v.label} <span class="tag">${v.status}</span> ${v.created_at?.slice(0,16)||''}</li>`).join('')}</ul></div>`;
}

async function createProposal() {
  const name = document.getElementById('propName').value;
  const client = document.getElementById('propClient').value;
  const notes = document.getElementById('propNotes').value;
  if (!name) return;
  await api('POST',`/api/projects/${state.current.id}/proposal`,{name,client,notes});
  render();
}

async function addProposalVersion() {
  const label = prompt('Version label:','Revised');
  const changes = prompt('What changed:','');
  if (!label) return;
  await api('POST',`/api/projects/${state.current.id}/proposal/version`,{label,changes});
  render();
}

// ─── Phases View ───
async function viewPhases() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;
  const phases = ['discovery','proposal','planning','execution','review'];
  const current = state.current.phase || 'discovery';
  let history = [];
  try { const r = await api('GET',`/api/projects/${pid}/phase-history`); history = r.history||[]; } catch(e){}
  const phaseBar = phases.map(p => {
    const active = p === current;
    const passed = phases.indexOf(p) < phases.indexOf(current);
    const cls = active ? 'background:var(--accent);color:#000' : passed ? 'background:var(--accent2);color:#000' : '';
    return `<span style="padding:6px 14px;border-radius:var(--radius);font-size:12px;${cls}">${p}</span>`;
  }).join(' → ');
  return `<div class="card"><h2>Project Phase</h2><div class="flex mt">${phaseBar}</div>
    <div class="flex mt"><select id="nextPhase">${phases.filter(p=>p!==current).map(p=>`<option value="${p}">${p}</option>`).join('')}</select>
    <input id="phaseReason" placeholder="Reason" style="flex:1">
    <button class="btn btn-sm" onclick="doTransition()">Transition</button></div>
    <div id="phaseResult" class="mt"></div></div>` +
    (history.length ? `<div class="card"><h2>Phase History</h2><ul class="items">${history.map(h=>`<li><strong>${h.phase}</strong> – ${h.entered_at?.slice(0,16)} ${h.duration?'('+h.duration+')':''} ${h.is_current?'← current':''} ${h.reason?'– '+h.reason:''}</li>`).join('')}</ul></div>` : '');
}

async function doTransition() {
  const phase = document.getElementById('nextPhase').value;
  const reason = document.getElementById('phaseReason').value;
  const r = await api('POST',`/api/projects/${state.current.id}/phase`,{new_phase:phase,reason});
  if (r.error) { document.getElementById('phaseResult').innerHTML=`<p style="color:var(--danger)">${r.error}</p>`; return; }
  state.current.phase = phase;
  render();
}

// ─── Settings View ───
function viewSettings() {
  return `<div class="card"><h2>Projects</h2>
    <div class="form-row"><label>Project Name</label><input id="newName" placeholder="New project name"></div>
    <div class="form-row"><label>Description</label><input id="newDesc" placeholder="Description"></div>
    <button class="btn" onclick="createProject()">Create Project</button></div>` +
    (state.projects.length ? `<div class="card"><h2>Select Project</h2><ul class="items">${state.projects.map(p=>`<li><a href="#" onclick="selectProject('${p.id}')" style="color:var(--accent)">${p.name}</a> <span class="tag">${p.phase}</span> (${p.file_count} files)</li>`).join('')}</ul></div>` : '');
}

// ─── Actions ───
async function createProject() {
  const name = document.getElementById('newName').value;
  const desc = document.getElementById('newDesc')?.value || '';
  if (!name) return;
  const r = await api('POST','/api/projects',{name,description:desc});
  if (r.project) { state.current = r.project; await loadProjects(); state.tab='dashboard'; render(); }
}

async function selectProject(id) {
  const p = state.projects.find(x=>x.id===id);
  if (p) { state.current = p; state.tab='dashboard'; render(); }
}

async function buildContext() {
  if (!state.current) return;
  const label = prompt('Version label (optional):','');
  const r = await api('POST',`/api/projects/${state.current.id}/build-context`,label?{label}:{});
  if (r._build_metadata) { alert(`Built: ${r._build_metadata.total_risks} risks, ${r._build_metadata.total_constraints} constraints`); render(); }
  else if (r.error) alert(r.error);
}

async function loadProjects() {
  const r = await api('GET','/api/projects');
  state.projects = r.projects || [];
  if (!state.current && state.projects.length) state.current = state.projects[0];
}

// ─── Init ───
(async () => { await loadProjects(); render(); })();
</script>
</body>
</html>
