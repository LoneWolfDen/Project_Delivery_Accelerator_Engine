        <select id="propReviewSelect" style="width:100%">
          <option value="">— select active review —</option>
        </select>
        <p id="propReviewGateMsg" style="font-size:11px;margin-top:3px"></p>
      </div>
      <!-- Step 2: Metadata -->
      <p class="card-section">Step 2 — Proposal Details</p>
      <div class="form-row"><label>Proposal Name <span style="color:var(--red)">*</span></label>
        <input id="propName" placeholder="e.g. AWS Cloud Migration Proposal"></div>
      <div class="form-row"><label>Client Name</label>
        <input id="propClient" placeholder="e.g. Acme Financial Services"></div>
      <div class="form-row"><label>AI Backend for Document Generation</label>
        <select id="propBackend" style="width:100%">
          ${(state.backends||[]).map(b=>`<option value="${b.name}">${escHtml(b.display_name||b.name)}${b.available?'':' (unavailable)'}</option>`).join('')}
        </select></div>
      <div class="form-row"><label>Initial Notes</label>
        <textarea id="propNotes" rows="2" placeholder="Initial submission after discovery call."></textarea></div>
      <div class="flex gap-sm mt">
        <button class="btn btn-green" onclick="submitCreateProposal()">Create + Generate Document</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('createProposalForm').style.display='none'">Cancel</button>
      </div>
      <div id="createProposalResult" class="mt"></div>
    </div>
  </div>`;

  const addVersionForm=`<div id="addVersionForm" style="display:none">
    <div class="card" style="border:1px solid var(--purple)">
      <div class="card-title mb"><span class="icon">➕</span>Add Proposal Version</div>
      <div class="form-row"><label>Based on Intelligence Version <span style="color:var(--red)">*</span></label>
        <select id="verVersionSelect" style="width:100%">
          <option value="">— select version —</option>
        </select></div>
      <div class="form-row"><label>Active Review <span style="color:var(--red)">*</span></label>
        <select id="verReviewSelect" style="width:100%">
          <option value="">— select review —</option>
        </select></div>
      <div class="form-row"><label>Label</label>
        <input id="verLabel" placeholder="e.g. Post-feedback revision"></div>
      <div class="form-row"><label>What changed from previous version?</label>
        <textarea id="verChanges" rows="2" placeholder="Extended Phase 1 timeline, removed re-platform scope."></textarea></div>
      <div class="form-row"><label>Notes</label>
        <textarea id="verNotes" rows="2" placeholder="Revised proposal addressing client timeline concern."></textarea></div>
      <div class="flex gap-sm mt">
        <button class="btn" onclick="submitAddVersion()">Add Version + Generate Document</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('addVersionForm').style.display='none'">Cancel</button>
      </div>
      <div id="addVersionResult" class="mt"></div>
    </div>
  </div>`;

  const shareForm=`<div id="shareForm" style="display:none">
    <div class="card" style="border:1px solid var(--accent)">
      <div class="card-title mb"><span class="icon">🔗</span>Generate Client Share Link</div>
      <input type="hidden" id="shareVerIdHidden">
      <div class="form-row"><label>Link expires after (days)</label>
        <input id="shareExpiry" type="number" value="7" style="width:80px"></div>
      <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px">
        Sends the client a secure one-time link to a feedback form. Their response is logged automatically.
      </p>
      <button class="btn" onclick="submitGenerateShare()">Generate Link</button>
      <button class="btn btn-ghost btn-sm" style="margin-left:8px" onclick="document.getElementById('shareForm').style.display='none'">Cancel</button>
      <div id="shareResult" class="mt"></div>
    </div>
  </div>`;

  // ── Reviews redirect card ────────────────────────────────
  // Reviews are created from the Reviews tab. This card provides context
  // and a single clear entry point — no duplicate review runner here.
  // Build runReviewCard without nested template literals (redirect-only card, no role/backend selectors)
  let _rrcLastSpan='';
  let _rrcSnapshot='';
  let _rrcBody='<p style="font-size:12px;color:var(--text-muted);margin-bottom:10px">No review run yet for this project.</p>';
  if(activeReview){
    _rrcLastSpan='<span class="fs11 c-muted">Last: '+escHtml(activeReview.persona||'')+' · '+fmtDateShort(activeReview.created_at)+'</span>';
    const _rrcSumP=activeReview.summary
      ?('<p style="font-size:12px;color:var(--text-dim);margin-bottom:8px">'+escHtml((activeReview.summary||'').slice(0,300))+((activeReview.summary||'').length>300?'&#8230;':'')+'</p>')
      :'';
    _rrcSnapshot='<details style="margin-bottom:10px">'
      +'<summary class="collapse-header" style="list-style:none;margin:0 0 0 0;border-radius:var(--radius)">'
      +'<span class="chevron">▶</span>'
      +'<span style="font-size:12px">Last review snapshot</span>'
      +'<span class="tag tag-blue" style="margin-left:6px">'+escHtml(activeReview.persona||'')+'</span>'
      +'<span class="tag" style="margin-left:4px">'+(activeReview.total_findings||0)+' findings</span>'
      +'</summary>'
      +'<div class="collapse-body">'+_rrcSumP
      +'<button class="btn btn-xs btn-ghost" onclick="openCaptureFeedback(\'\',\''+activeReview.review_id+'\')">+ Log Feedback on this Review</button>'
      +'</div></details>';
    const _rrcBodySumP=activeReview.summary
      ?('<p style="font-size:11px;color:var(--text-dim);margin-bottom:8px">'+escHtml((activeReview.summary||'').slice(0,200))+((activeReview.summary||'').length>200?'&hellip;':'')+'</p>')
      :'';
    _rrcBody=_rrcBodySumP
      +'<button class="btn btn-xs btn-ghost" onclick="openCaptureFeedback(\'\',\''+activeReview.review_id+'\')">+ Log Feedback on this Review</button>';
  }
  const runReviewCard='<div class="card" style="border-top:2px solid var(--accent)">'
    +'<div class="flex-between mb">'
    +'<div class="card-title"><span class="icon">▶</span>Run Pre-Sales Review</div>'
    +_rrcLastSpan
    +'</div>'
    +'<p style="font-size:12px;color:var(--text-dim);margin-bottom:10px">'
    +'Reviews are run from the <strong>Reviews tab</strong>. Once complete, upload client feedback '
    +'as an artefact and run a follow-up review — captured feedback is automatically injected '
    +'into the next review prompt.'
    +'</p>'
    +_rrcSnapshot
    +_rrcBody
    +'<div class="mt-sm"><button class="btn btn-outline" onclick="switchTab(\'reviews\')">→ Go to Reviews Tab</button></div>'
    +'</div>';

  // ── Stop Condition + Finalise (DS-12) ─────────────────────
  let stopCard='';
  {
    let sc={ready:false,blockers:[],critical_open:[],unresolved_count:0};
    try{sc=await api('GET',`/api/projects/${pid}/presales/stop-condition`);}catch(e){}
    const isReady=sc.ready;
    const isFinalised=curVer&&curVer.lock_status==='soft_locked';
    if(isFinalised){
      stopCard=`<div class="card" style="border:1px solid var(--green-dim);background:rgba(63,185,80,.04)">
        <div class="flex-between">
          <div class="card-title" style="color:var(--green)"><span class="icon">🔒</span>Pre-Sales Finalised</div>
          <span class="tag tag-green">locked</span>
        </div>
        <p style="font-size:12px;color:var(--text-dim);margin-top:6px">
          This proposal version is soft-locked. The project has moved to the Design phase.
          Any changes require an override reason.
        </p>
      </div>`;
    } else {
      const blockerHtml=(sc.blockers||[]).map(b=>`<li style="color:var(--red)">${escHtml(b)}</li>`).join('');
      const critHtml=(sc.critical_open||[]).map(c=>`
        <div style="padding:5px 8px;background:rgba(248,81,73,.06);border:1px solid var(--red);
          border-radius:var(--radius);margin-bottom:4px;font-size:11px">
          <span class="tag tag-red" style="margin-right:6px">${escHtml(c.category||'?')}</span>
          ${c.mapped_to?('<span class="tag" style="margin-right:6px">'+c.mapped_to+'</span>'):''}
          ${escHtml(c.text)}
          <label style="float:right;font-size:10px;cursor:pointer;display:flex;align-items:center;gap:4px">
            <input type="checkbox" onchange="overrideCritical('${c.item_id}',this.checked)"
              style="accent-color:var(--accent)">
            not critical
          </label>
        </div>`).join('');
      const _scBlockerSection=(!isReady&&blockerHtml)
        ?('<ul class="items" style="margin-bottom:10px">'+blockerHtml+'</ul>')
        :'';
      const _scCritSection=sc.unresolved_count>0
        ?('<div style="margin-bottom:10px">'
          +'<p style="font-size:11px;color:var(--red);font-weight:600;margin-bottom:6px">⚠ '+sc.unresolved_count+' critical item(s) must be resolved:</p>'
          +critHtml
          +'<p style="font-size:10px;color:var(--text-muted);margin-top:4px">Tick "not critical" to override individual items (PM decision).</p>'
          +'</div>')
        :'';
      const _scReadyMsg=isReady
        ?'<p style="font-size:12px;color:var(--green);margin-bottom:10px">✓ All conditions met. Ready to finalise the pre-sales phase.</p>'
        :'';
      stopCard=`<div class="card" style="border:2px solid ${isReady?'var(--green-dim)':'var(--border2)'}">
        <div class="flex-between mb">
          <div class="card-title"><span class="icon">${isReady?'✅':'🔵'}</span>Readiness Check</div>
          <span class="tag ${isReady?'tag-green':'tag-yellow'}">${isReady?'Ready to Finalise':'Not Ready'}</span>
        </div>
        ${_scBlockerSection}
        ${_scCritSection}
        ${_scReadyMsg}
        <div id="finaliseForm" style="${isReady?'':'margin-top:8px'}">
          <div class="flex gap-sm" style="align-items:flex-end;flex-wrap:wrap">
            <div style="display:flex;flex-direction:column;gap:3px;flex:1;min-width:160px">
              <label class="fs11 c-dim">Decision owner <span style="color:var(--red)">*</span></label>
              <input id="finaliseDecidedBy" placeholder="Your name">
            </div>
            <div style="display:flex;flex-direction:column;gap:3px;flex:2;min-width:200px">
              <label class="fs11 c-dim">Reason ${!isReady?'(required for override)':''}</label>
              <input id="finaliseReason" placeholder="${isReady?'Optional':'Required — explain why proceeding despite open items'}">
            </div>
            <button class="btn ${isReady?'btn-green':'btn-yellow'}"
              onclick="submitFinalise(${!isReady})"
              title="${!isReady?'Force finalise despite open conditions':'Finalise pre-sales phase'}">
              ${isReady?'🔒 Finalise Pre-Sales':'⚠ Force Finalise'}
            </button>
          </div>
          <div id="finaliseResult" class="mt"></div>
        </div>
      </div>`;
    }
  }

  // ── HTML order: forms first so DOM elements exist before buttons fire ──
  return createProposalForm+summaryCard+versionsCard+docCard+addVersionForm+runReviewCard+actionsCard+reviewCard+captureFeedbackForm+shareForm+stopCard+fbCard;
}

// ── Pre-sales action helpers ─────────────────────────────────

function showCreateProposal(){
  const pid=state.current.id;
  document.getElementById('createProposalForm').style.display='';
  document.getElementById('createProposalForm').scrollIntoView({behavior:'smooth'});
  // Populate version selector when form opens
  api('GET',`/api/projects/${pid}/hierarchy/versions`).then(r=>{
    const sel=document.getElementById('propVersionSelect');
    if(sel){
      sel.innerHTML='<option value="">— select a version —</option>'
        +(r.versions||[]).map(v=>`<option value="${v.version_id}">${v.version_id} – ${escHtml(v.label||'')} (${fmtDateShort(v.created_at)})</option>`).join('');
    }
  });
}

async function submitCreateProposal(){
  const pid=state.current.id;
  const name=document.getElementById('propName').value.trim();
  const client=document.getElementById('propClient').value.trim();
  const notes=document.getElementById('propNotes').value.trim();
  const hierarchy_version_id=document.getElementById('propVersionSelect')?.value||'';
  const active_review_id=document.getElementById('propReviewSelect')?.value||'';
  const ai_backend=document.getElementById('propBackend')?.value||'files_only';
  const el=document.getElementById('createProposalResult');
  if(!name){el.innerHTML='<p style="color:var(--red)">Name required</p>';return;}
  if(!hierarchy_version_id){el.innerHTML='<p style="color:var(--red)">Select an Intelligence Version</p>';return;}
  if(!active_review_id){el.innerHTML='<p style="color:var(--red)">Select an Active Review</p>';return;}
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Creating + generating document…</span>';
  // Step 1: Create proposal
  const r=await api('POST',`/api/projects/${pid}/proposal`,
    {proposal_name:name,client,notes,hierarchy_version_id,review_id:active_review_id});
  if(r.error){el.innerHTML=`<p style="color:var(--red)">${r.error}</p>`;return;}
  // Step 2: Generate document
  const proposal_ver_id=r.current_version||((r.versions||[])[0]||{}).version_id||'';
  if(proposal_ver_id){
    await api('POST',`/api/projects/${pid}/proposal/generate`,
      {proposal_ver_id,hierarchy_version_id,review_id:active_review_id,ai_backend});
  }
  toast('Proposal created');setTimeout(()=>render(),600);
}

async function onPropVersionChange(){
  const pid=state.current.id;
  const vid=document.getElementById('propVersionSelect')?.value||'';
  const reviewRow=document.getElementById('propReviewRow');
  const reviewSel=document.getElementById('propReviewSelect');
  const gateMsg=document.getElementById('propReviewGateMsg');
  if(!vid){if(reviewRow)reviewRow.style.display='none';return;}
  if(reviewRow)reviewRow.style.display='';
  // Load reviews for this version
  try{
    const r=await api('GET',`/api/projects/${pid}/hierarchy/versions/${vid}`);
    const reviews=r.reviews||[];
    if(reviewSel){
      reviewSel.innerHTML='<option value="">— select review —</option>'
        + reviews.map(rv=>`<option value="${rv.review_id}">${rv.review_id} – ${escHtml(rv.persona||'')} · ${rv.quality_status||'pending'} (${rv.completeness_score||0}%)</option>`).join('');
    }
    // Auto-select active_review_id
    const activeId=r.version?.active_review_id||r.active_review_id||'';
    if(activeId&&reviewSel)reviewSel.value=activeId;
    if(reviewSel)_onPropReviewChange(reviewSel.value,reviews,gateMsg);
  }catch(e){}
}

function _onPropReviewChange(rid,reviews,gateMsg){
  if(!gateMsg)return;
  const rev=(reviews||[]).find(r=>r.review_id===rid);
  if(!rev){gateMsg.innerHTML='';return;}
  const qs=rev.quality_status||'pending';
  const score=rev.completeness_score||0;
  if(qs==='pending'){
    gateMsg.innerHTML=`<span style="color:var(--yellow)">⚠ Review is pending (${score}%). Mark it complete/interim in the Reviews tab first, or proceed anyway.</span>`;
  }else{
    gateMsg.innerHTML=`<span style="color:var(--green)">✓ Review ${qs} (${score}%)</span>`;
  }
}

async function submitAddVersion(){
  const pid=state.current.id;
  const hierarchy_version_id=document.getElementById('verVersionSelect')?.value||'';
  const active_review_id=document.getElementById('verReviewSelect')?.value||'';
  const label=document.getElementById('verLabel').value.trim();
  const changes=document.getElementById('verChanges').value.trim();
  const notes=document.getElementById('verNotes').value.trim();
  const el=document.getElementById('addVersionResult');
  if(!hierarchy_version_id){el.innerHTML='<p style="color:var(--red)">Select an Intelligence Version</p>';return;}
  if(!active_review_id){el.innerHTML='<p style="color:var(--red)">Select a Review</p>';return;}
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Adding version…</span>';
  const r=await api('POST',`/api/projects/${pid}/proposal/version`,
    {label,changes,notes,hierarchy_version_id,review_id:active_review_id});
  if(r.error){el.innerHTML=`<p style="color:var(--red)">${r.error}</p>`;return;}
  // Generate document for new version
  const proposal_ver_id=r.version_id||'';
  if(proposal_ver_id){
    await api('POST',`/api/projects/${pid}/proposal/generate`,
      {proposal_ver_id,hierarchy_version_id,review_id:active_review_id,ai_backend:'files_only'});
  }
  toast(`Version ${r.version_id||''} added`);setTimeout(()=>render(),600);
}

async function regenerateDoc(proposalVerId,reviewId){
  const pid=state.current.id;
  const elId=proposalVerId?`docGenResult`:`docGenResult`;
  const el=document.getElementById('docGenResult');
  if(el)el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Generating document…</span>';
  // Load current version to get hierarchy_version_id
  const proposal=await api('GET',`/api/projects/${pid}/proposal`);
  const versions=proposal?.versions||[];
  const ver=versions.find(v=>v.version_id===proposalVerId)||{};
  const hvid=ver.hierarchy_version_id||'';
  const rid=reviewId||ver.active_review_id||'';
  if(!hvid||!rid){toast('Version or review ID missing — cannot generate','err');return;}
  const r=await api('POST',`/api/projects/${pid}/proposal/generate`,
    {proposal_ver_id:proposalVerId,hierarchy_version_id:hvid,review_id:rid,ai_backend:'files_only'});
  if(r.error){toast(r.error,'err');return;}
  toast('Document generated');setTimeout(()=>render(),600);
}

function openAddProposalVersion(){
  const pid=state.current.id;
  const el=document.getElementById('addVersionForm');
  if(!el)return;
  el.style.display='';
  el.scrollIntoView({behavior:'smooth'});
  // Populate version selector
  api('GET',`/api/projects/${pid}/hierarchy/versions`).then(r=>{
    const sel=document.getElementById('verVersionSelect');
    if(sel){
      sel.innerHTML='<option value="">— select version —</option>'
        +(r.versions||[]).map(v=>`<option value="${v.version_id}">${v.version_id} – ${escHtml(v.label||'')} (${fmtDateShort(v.created_at)})</option>`).join('');
    }
  });
}

async function updateProposalStatus(versionId,newStatus){
  const pid=state.current.id;
  // Uses dedicated status route — POST /api/projects/{id}/proposal/version/{versionId}/status
  const r=await api('POST',`/api/projects/${pid}/proposal/version/${versionId}/status`,{status:newStatus});
  if(!r.error)toast(`Status → ${newStatus.replace(/_/g,' ')}`);
  else toast(r.error,'err');
  setTimeout(()=>render(),400);
}

function openCaptureFeedback(proposalVerId='',reviewId=''){
  document.getElementById('fbProposalVerId').value=proposalVerId;
  document.getElementById('fbReviewId').value=reviewId;
  // S6-03: populate version_id from current dashboard scope
  const versionIdEl=document.getElementById('fbVersionId');
  if(versionIdEl) versionIdEl.value=state._dashVersion||'';
  document.getElementById('captureFbForm').style.display='';
  document.getElementById('captureFbForm').scrollIntoView({behavior:'smooth',block:'center'});
}

async function submitCaptureFeedback(){
  const pid=state.current.id;
  const el=document.getElementById('captureFbResult');
  // DS-11: collect structured feedback_items from tagger panel
  const items=_collectFbItems();
  const body={
    proposal_ver_id:document.getElementById('fbProposalVerId').value,
    review_id:document.getElementById('fbReviewId').value,
    version_id:document.getElementById('fbVersionId')?.value||'',
    source:document.getElementById('fbSource').value,
    responder_name:document.getElementById('fbName').value,
    responder_email:document.getElementById('fbEmail').value,
    feedback_items:items,
    raw_text:document.getElementById('fbRawText')?.value||'',
    notes:document.getElementById('fbNotes').value,
    next_action:document.getElementById('fbNextAction').value,
  };
  if(!items.length&&!body.notes){el.innerHTML='<p style="color:var(--red)">Add at least one feedback item or a note</p>';return;}
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Saving…</span>';
  const r=await api('POST',`/api/projects/${pid}/presales/feedback`,body);
  if(r.feedback){
    toast(`Feedback saved — ${items.length} item(s) will be injected into next review`);
    document.getElementById('captureFbForm').style.display='none';
    setTimeout(()=>render(),600);
  }else el.innerHTML=`<p style="color:var(--red)">${r.error||'Failed'}</p>`;
}

// ── DS-11 Hybrid Tagger helpers ───────────────────────────────

const _CAT_COLORS={accepted:'var(--green)',rejected:'var(--red)',change_requested:'var(--yellow)',concerns:'var(--accent)'};
const _CAT_ICONS={accepted:'✓',rejected:'✗',change_requested:'↻',concerns:'?'};
const _MAP_OPTIONS=['','risk','gap','scope_change','constraint','assumption'];
const _CONF_OPTIONS=['high','medium','low'];

async function classifyFeedback(){
  const pid=state.current.id;
  const raw=document.getElementById('fbRawText')?.value||'';
  const backend=document.getElementById('fbClassifyBackend')?.value||'files_only';
  if(!raw.trim()){toast('Paste some feedback text first','err');return;}
  const panel=document.getElementById('fbTaggerPanel');
  panel.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Classifying…</span>';
  const r=await api('POST',`/api/projects/${pid}/presales/feedback/classify`,{raw_text:raw,ai_backend:backend});
  if(r.error){panel.innerHTML=`<p style="color:var(--red)">${r.error}</p>`;return;}
  _renderTaggerItems(r.items||[]);
}

function _renderTaggerItems(items){
  const panel=document.getElementById('fbTaggerPanel');
  const countEl=document.getElementById('fbItemCount');
  if(!items.length){panel.innerHTML='<p style="font-size:11px;color:var(--text-muted);padding:8px;text-align:center">No items</p>';return;}
  if(countEl)countEl.textContent=`(${items.length})`;
  panel.innerHTML=items.map((item,i)=>{
    const c=item.category||'concerns';
    const col=_CAT_COLORS[c]||'var(--text-dim)';
    const ic=_CAT_ICONS[c]||'·';
    const crit=item.is_critical?'<span style="color:var(--red);font-size:10px;font-weight:700">⚠ CRITICAL</span>':'';
    return`<div style="padding:6px 8px;margin-bottom:6px;border:1px solid ${item.is_critical?'var(--red)':'var(--border)'};
      border-radius:var(--radius);background:var(--surface2)" id="fbitem_${i}">
      <div style="font-size:12px;color:var(--text);margin-bottom:5px">${escHtml(item.text)} ${crit}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:4px;align-items:center">
        <select onchange="_updateFbItem(${i},'category',this.value)" style="font-size:10px;padding:2px 4px">
          ${['accepted','rejected','change_requested','concerns'].map(cat=>
            `<option value="${cat}" ${cat===c?'selected':''}>${_CAT_ICONS[cat]} ${cat.replace(/_/g,' ')}</option>`).join('')}
        </select>
        <select onchange="_updateFbItem(${i},'mapped_to',this.value)" style="font-size:10px;padding:2px 4px">
          ${_MAP_OPTIONS.map(m=>`<option value="${m}" ${m===(item.mapped_to||'')?'selected':''}>${m||'— none —'}</option>`).join('')}
        </select>
        <select onchange="_updateFbItem(${i},'confidence',this.value)" style="font-size:10px;padding:2px 4px">
          ${_CONF_OPTIONS.map(cf=>`<option value="${cf}" ${cf===(item.confidence||'medium')?'selected':''}>${cf}</option>`).join('')}
        </select>
        <button class="btn btn-xs btn-red" style="padding:2px 6px" onclick="_removeFbItem(${i})">✕</button>
      </div>
    </div>`;
  }).join('');
  // Store items in state for collection
  window._fbItems=items;
}

function _updateFbItem(idx,field,val){
  if(!window._fbItems)return;
  window._fbItems[idx][field]=val||null;
  // Re-apply auto-flag
  const item=window._fbItems[idx];
  item.is_critical=(item.category==='change_requested'&&['scope_change','risk'].includes(item.mapped_to))
    ||(item.category==='rejected'&&['scope_change','constraint'].includes(item.mapped_to));
  // Refresh just the critical indicator
  const div=document.getElementById('fbitem_'+idx);
  if(div){
    div.style.borderColor=item.is_critical?'var(--red)':'var(--border)';
    const first=div.querySelector('div');
    if(first){const c=first.querySelectorAll('span[style*="CRITICAL"]');c.forEach(n=>n.remove());
      if(item.is_critical){const s=document.createElement('span');
        s.style.cssText='color:var(--red);font-size:10px;font-weight:700';s.textContent='⚠ CRITICAL';first.appendChild(s);}}
  }
}

function _removeFbItem(idx){
  if(!window._fbItems)return;
  window._fbItems.splice(idx,1);
  _renderTaggerItems(window._fbItems);
}

function addManualFbItem(){
  if(!window._fbItems)window._fbItems=[];
  window._fbItems.push({
    item_id:'fi_'+Math.random().toString(36).slice(2,10),
    text:'New item — edit text above',category:'concerns',
    mapped_to:null,confidence:'medium',status:'new',is_critical:false,addressed_in_version:null
  });
  // Prompt for text
  const text=prompt('Enter feedback item text:');
  if(!text){window._fbItems.pop();return;}
  window._fbItems[window._fbItems.length-1].text=text;
  _renderTaggerItems(window._fbItems);
}

function _collectFbItems(){
  return(window._fbItems||[]).map(item=>({
    item_id:item.item_id||('fi_'+Math.random().toString(36).slice(2,10)),
    text:item.text||'',
    category:item.category||'concerns',
    mapped_to:item.mapped_to||null,
    confidence:item.confidence||'medium',
    status:'new',
    is_critical:!!item.is_critical,
    addressed_in_version:null,
    created_at:new Date().toISOString(),
  }));
}

async function actionFeedback(feedbackId,newStatus){
  const pid=state.current.id;
  const r=await api('POST',`/api/projects/${pid}/presales/feedback/${feedbackId}/action`,{status:newStatus});
  if(r.feedback){toast(`Marked ${newStatus}`);setTimeout(()=>render(),400);}
  else toast(r.error||'Failed','err');
}

async function submitFinalise(force){
  const pid=state.current.id;
  const decidedBy=(document.getElementById('finaliseDecidedBy')?.value||'').trim();
  const reason=(document.getElementById('finaliseReason')?.value||'').trim();
  const el=document.getElementById('finaliseResult');
  if(!decidedBy){el.innerHTML='<p style="color:var(--red)">Decision owner name is required</p>';return;}
  if(force&&!reason){el.innerHTML='<p style="color:var(--red)">Reason is required when force-finalising</p>';return;}
  if(!force&&!confirm('Finalise the pre-sales phase? This will:\n• Accept the current proposal version\n• Soft-lock it\n• Freeze all feedback\n• Transition project to Design phase'))return;
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Finalising…</span>';
  const r=await api('POST',`/api/projects/${pid}/presales/finalise`,
    {decided_by:decidedBy,reason,force:!!force});
  if(r.error){
    el.innerHTML=`<div style="color:var(--red);font-size:12px">
      <strong>${r.error}</strong>
      ${(r.blockers||[]).map(b=>`<p style="margin-top:4px">• ${escHtml(b)}</p>`).join('')}
    </div>`;
    return;
  }
  toast('Pre-sales finalised ✓ — project transitioned to Design phase');
  setTimeout(()=>render(),800);
}

async function overrideCritical(itemId, notCritical){
  // PM override: mark a feedback item as not-critical
  // Find the item in DB and update is_critical
  // This is a client-side optimistic update; the real enforcement is in stop condition
  toast(notCritical?`Item marked not-critical (will not block finalisation)`:`Item re-flagged as critical`);
  // Re-check stop condition
  const pid=state.current.id;
  const sc=await api('GET',`/api/projects/${pid}/presales/stop-condition`);
  if(sc.ready)toast('✓ All conditions now met — ready to finalise','ok');
}

function openShareLink(proposalVerId){
  document.getElementById('shareVerIdHidden').value=proposalVerId;
  document.getElementById('shareForm').style.display='';
  document.getElementById('shareResult').innerHTML='';
  document.getElementById('shareForm').scrollIntoView({behavior:'smooth',block:'center'});
}

async function submitGenerateShare(){
  const pid=state.current.id;
  const verId=document.getElementById('shareVerIdHidden').value;
  const days=parseInt(document.getElementById('shareExpiry').value)||7;
  const el=document.getElementById('shareResult');
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Generating…</span>';
  const r=await api('POST',`/api/projects/${pid}/presales/share`,{proposal_ver_id:verId,expires_days:days});
  if(r.token){
    const url=window.location.origin+`/feedback?token=${r.token}`;
    el.innerHTML=`
      <div style="margin-top:8px;padding:10px 12px;background:var(--surface2);border:1px solid var(--green-dim);border-radius:var(--radius)">
        <p style="font-size:11px;color:var(--green);font-weight:600;margin-bottom:6px">✓ Share link generated (expires in ${days} day${days!==1?'s':''})</p>
        <div style="display:flex;gap:6px;align-items:center">
          <input id="shareLinkInput" value="${escHtml(url)}" style="flex:1;font-size:11px;font-family:monospace" readonly>
          <button class="btn btn-xs btn-outline" onclick="copyShareLink()">Copy</button>
        </div>
        <p style="font-size:10px;color:var(--text-muted);margin-top:6px">
          Send this link to the client. Their feedback will be logged automatically and injected into the next review.
        </p>
      </div>`;
  }else{
    el.innerHTML=`<p style="color:var(--red)">${r.error||'Failed'}</p>`;
  }
}

function copyShareLink(){
  const el=document.getElementById('shareLinkInput');
  if(el){el.select();document.execCommand('copy');toast('Link copied');}
}
</script>

<script>
// ADMIN VIEW
async function viewAdmin(){
  let config={},health={},lifecycle={},suggestions=[];
  try{const r=await api('GET','/api/admin/config');config=r.config||{};}catch(e){}
  try{const r=await api('GET','/api/admin/health');health=r.health||{};}catch(e){}

    <p class="card-section">API Connectivity</p>
    <div class="backend-grid">${Object.entries(apiStatus).map(([n,i])=>`<div class="backend-chip ${i.configured?'ok':''}">

    </div>`).join('')}</div>

  const sqlOn=config.sqlite_write_enabled!==false;
  const fileOn=config.file_write_enabled!==false;

  const storageCard=`<div class="card">

    </p>
    <div style="display:flex;flex-direction:column;gap:10px">
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 12px;

        <div>
          <div style="font-size:12px;font-weight:600;color:var(--text)">✅ Write to SQLite
            ${sqlOn?'<span class="tag tag-green" style="margin-left:4px">active</span>':'<span class="tag" style="margin-left:4px">disabled</span>'}
          </div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:2px">
            Structured data (projects, versions, reviews, artifacts, proposals, feedback) stored in
            <code style="font-size:10px;background:var(--surface3);padding:1px 5px;border-radius:3px">projects_data/accelerator.db</code>
          </div>
        </div>
      </label>
      <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 12px;
        border:1px solid ${fileOn?'var(--accent-dim)':'var(--border)'};border-radius:var(--radius);
        background:${fileOn?'rgba(88,166,255,.06)':'var(--surface2)'};transition:all .15s">
        <input type="checkbox" id="cfgFileWrite" ${fileOn?'checked':''} style="width:15px;height:15px;margin-top:1px;flex-shrink:0;accent-color:var(--accent)">
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--text)">📄 Write to JSON files
            ${fileOn?'<span class="tag tag-blue" style="margin-left:4px">active</span>':'<span class="tag" style="margin-left:4px">disabled</span>'}
          </div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:2px">
            Mirrors all data to <code style="font-size:10px;background:var(--surface3);padding:1px 5px;border-radius:3px">projects.json</code>,
            <code style="font-size:10px;background:var(--surface3);padding:1px 5px;border-radius:3px">artifacts.json</code>,
            hierarchy and proposal JSON files alongside the database.
          </div>
        </div>
      </label>
    </div>
    <div style="margin-top:10px;padding:8px 12px;border-radius:var(--radius);
      background:${sqlOn&&fileOn?'rgba(63,185,80,.06)':sqlOn?'rgba(88,166,255,.06)':'rgba(210,153,34,.08)'};
      border:1px solid ${sqlOn&&fileOn?'var(--green-dim)':sqlOn?'var(--accent-dim)':'var(--yellow)'}">
      <span style="font-size:11px;font-weight:600;color:${sqlOn&&fileOn?'var(--green)':sqlOn?'var(--accent)':'var(--yellow)'}">
        ${sqlOn&&fileOn?'⚡ Dual-write mode — SQLite + JSON files (recommended)':
          sqlOn?'🗄️ SQLite-only mode':
          fileOn?'📄 File-only mode (legacy)':
          '⚠️ Warning: both stores disabled — data will not be persisted'}
      </span>
    </div>
    <p style="font-size:10px;color:var(--text-muted);margin-top:8px">
      Changing storage mode takes effect immediately on next write. Restart not required.
      Re-run <code>python scripts/seed_sqlite.py</code> to populate the SQLite DB with fresh test data.
    </p>
  </div>`;

  const configCard=`<div class="card">
    <div class="card-title mb"><span class="icon">⚙️</span>Configuration</div>
    <div class="form-group">
      <div class="form-row" style="flex:0 0 120px"><label>Max Active Projects</label>
        <input id="cfgMaxP" type="number" value="${config.max_active_projects||5}" style="width:80px"></div>
      <div class="form-row" style="flex:1"><label>Default Persona</label>
        <select id="cfgPersona" style="width:100%">
          ${['solution_architect','delivery_manager','product_owner','resource_manager'].map(p=>`<option value="${p}" ${config.default_persona===p?'selected':''}>${p.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</option>`).join('')}
        </select></div>
      <div class="form-row" style="flex:0 0 120px"><label>Admin PIN</label>
        <input id="cfgPin" type="password" placeholder="Set via ADMIN_PIN env var" style="width:120px"></div>
    </div>
    <p class="card-section">API Keys</p>
    <div class="form-group">
      <div class="form-row" style="flex:1"><label>Groq</label><input id="cfgGroq" type="password" placeholder="${config.api_keys?.groq?'Configured':'Not set'}"></div>

  const archived=lifecycle.archived||[];

  const lifecycleCard=`<div class="card">
    <div class="card-title mb"><span class="icon">📁</span>Project Lifecycle Logs</div>
    ${archived.length?('<p class="card-section">Archived ('+archived.length+')</p>'
      +'<ul class="items">'+archived.map(a=>'<li><strong>'+escHtml(a.name)+'</strong> — '+fmtDateShort(a.archived_at)
        +(a.restore_allowed!==false?`<button class="btn btn-xs btn-outline" style="margin-left:8px" onclick="restoreProject('${a.project_id}')">Restore</button>`:'<span class="tag" style="margin-left:6px">Restored</span>')
        +'</li>').join('')+'</ul>'):'<p style="color:var(--text-muted);font-size:12px">No archived projects.</p>'}
    ${deleted.length?('<p class="card-section">Deleted ('+deleted.length+')</p>'
      +'<ul class="items">'+deleted.map(d=>'<li><strong>'+escHtml(d.name)+'</strong> — Deleted '+fmtDateShort(d.deleted_at)+'</li>').join('')+'</ul>'):''}
  </div>`;

  const suggestCard=suggestions.length?`<div class="card">
    <div class="card-title mb"><span class="icon">💡</span>Auto-Archive Suggestions</div>
    <ul class="items">${suggestions.map(s=>`<li><strong>${escHtml(s.name)}</strong> – inactive ${s.inactive_days} days
      <button class="btn btn-xs btn-yellow" style="margin-left:8px" onclick="archiveProject('${s.project_id}')">Archive</button></li>`).join('')}</ul>
  </div>`:'';

  // ── Persona Prompts card ───────────────────────────────────────────────────
  // Load all roles once; each unique group gets one editable textarea.
  // Pre-populate from config.persona_prompts (admin override) if set,
  // otherwise fall back to the YAML prompt_template via /api/personas.
  let personaPromptsCard='';
  try{
    const personasResp=await api('GET','/api/personas');
    const allRoles=personasResp.personas||personasResp.roles||[];
    const savedPrompts=config.persona_prompts||{};

    // Collect unique groups preserving first-seen order
    const seenGroups=new Map();
    for(const r of allRoles){
      if(r.group_id&&!seenGroups.has(r.group_id)){
        seenGroups.set(r.group_id,{
          group_id:r.group_id,
          group_name:r.group_name||r.group_id,
          roles:(allRoles.filter(x=>x.group_id===r.group_id).map(x=>x.name)),
          prompt_template:r.prompt_template||'',

      }
    }

    const groupRows=[...seenGroups.values()].map(g=>{
      const hasOverride=!!(savedPrompts[g.group_id]&&savedPrompts[g.group_id].trim());

          data-group-id="${g.group_id}"
          data-yaml-default="${escHtml(g.prompt_template)}"
          placeholder="Enter custom base prompt for this persona group…"
        >${escHtml(currentVal)}</textarea>
      </div>`;
    }).join('');

    personaPromptsCard=`<div class="card">
      <div class="card-title mb"><span class="icon">✏️</span>Persona Base Prompts
        <span class="tag tag-blue" style="margin-left:6px;font-size:10px">Admin editable</span>
      </div>
      <p style="font-size:12px;color:var(--text-dim);margin-bottom:14px">

    </div>`;
  }catch(e){
    personaPromptsCard='';
  }

  return healthCard+storageCard+configCard+personaPromptsCard+lifecycleCard+suggestCard;
}

async function saveAdminConfig(){
  const up={
    max_active_projects:parseInt(document.getElementById('cfgMaxP').value)||5,
    default_persona:document.getElementById('cfgPersona').value,
    admin_pin:document.getElementById('cfgPin').value,
    sqlite_write_enabled:document.getElementById('cfgSqlite')?.checked!==false,
    file_write_enabled:document.getElementById('cfgFileWrite')?.checked!==false,
    api_keys:{}
  };
  const g=document.getElementById('cfgGroq').value;
  const o=document.getElementById('cfgOR').value;
  const gm=document.getElementById('cfgGemini').value;
  if(g)up.api_keys.groq=g;
  if(o)up.api_keys.openrouter=o;
  if(gm)up.api_keys.gemini=gm;
  const r=await api('POST','/api/admin/config',up);
  if(r.config){toast('Configuration saved');document.getElementById('configResult').innerHTML=`<p style="color:var(--green)">✓ Saved</p>`;}
  else{toast(r.error||'Save failed','err');}
}

// Save all persona prompt overrides from the textareas
async function savePersonaPrompts(){
  const tas=document.querySelectorAll('textarea[data-group-id]');
  if(!tas.length){toast('No prompt editors found','err');return;}
  const persona_prompts={};
  for(const ta of tas){
    const gid=ta.dataset.groupId||ta.getAttribute('data-group-id');
    const yamlDefault=ta.dataset.yamlDefault||ta.getAttribute('data-yaml-default')||'';
    const val=ta.value;
    // Only store when the value differs from the YAML default (non-empty override)
    if(val.trim()&&val.trim()!==yamlDefault.trim()){
      persona_prompts[gid]=val;
    }else{
      // null signals the backend to remove the override (restore YAML default)
      persona_prompts[gid]=null;
    }
  }
  const r=await api('POST','/api/admin/config',{persona_prompts});
  const el=document.getElementById('personaPromptsResult');
  if(r.config){
    toast('Persona prompts saved');
    if(el)el.innerHTML='<p style="color:var(--green);font-size:12px">✓ Saved — changes apply on next review run.</p>';
    // Refresh admin view to update Custom / YAML default badges
    setTimeout(()=>render(),800);
  }else{
    toast(r.error||'Save failed','err');
    if(el)el.innerHTML=`<p style="color:var(--red);font-size:12px">${escHtml(r.error||'Save failed')}</p>`;
  }
}

// Reset a single persona group prompt to its YAML default
function resetPersonaPrompt(groupId){
  const ta=document.getElementById('pp_'+groupId);
  if(!ta)return;
  const yamlDefault=ta.dataset.yamlDefault||ta.getAttribute('data-yaml-default')||'';
  ta.value=yamlDefault;
  ta.style.borderColor='var(--border)';
  toast('Reset to YAML default — click Save Persona Prompts to persist');
}

async function restoreProject(pid){
  const pin=prompt('Enter PIN to restore:');
  if(!pin)return;
  const r=await api('POST',`/api/projects/${pid}/restore`,{pin});
  if(r.error){toast(r.error,'err');return;}
  toast(r.message||'Project restored');
  await loadProjects();render();
}
</script>

  </div>`;

  const actCard=state.current?`<div class="card">
    <div class="card-title mb"><span class="icon">🗑️</span>Project Actions</div>
    <p class="card-subtitle">Current: <strong>${escHtml(state.current.name)}</strong> (${state.current.id})</p>
    <div class="flex gap-sm">
      <button class="btn btn-sm btn-yellow" onclick="archiveProject()">Archive Project</button>
      <button class="btn btn-sm btn-red" onclick="deleteProject()">Delete Project</button>
    </div>
    <p style="font-size:10px;color:var(--text-muted);margin-top:6px">Requires admin PIN (set via <code>ADMIN_PIN</code> env var)</p>
  </div>`:'';

  const allCard=(state.allProjects||[]).length?`<div class="card">
    <div class="card-title mb"><span class="icon">📂</span>All Projects</div>
    <ul class="items">${(state.allProjects||[]).map(p=>`<li>
      <a href="#" onclick="selectProject('${p.id}')">${escHtml(p.name)}</a>
      <span class="tag" style="margin-left:4px">${p.phase||'–'}</span>
      <span class="fs10 c-muted">${p.file_count} files</span>
      ${p.status==='archived'?'<span class="tag tag-yellow" style="margin-left:4px">archived</span>':''}
    </li>`).join('')}</ul>
  </div>`:'';

  const bkCard=`<div class="card">
    <div class="card-title mb"><span class="icon">🤖</span>AI Backends</div>
    <div class="backend-grid">${state.backends.map(b=>`<div class="backend-chip ${b.available?'ok':''}">
      ${b.available?'●':'○'} <strong>${b.name}</strong><br><span style="font-size:10px">${escHtml(b.display_name||b.name)}</span>
    </div>`).join('')}</div>
    <p style="font-size:11px;color:var(--text-muted);margin-top:8px">
      Set via env vars: GROQ_API_KEY · OPENROUTER_API_KEY · GEMINI_API_KEY · AWS credentials
    </p>
  </div>`;

  return createCard+actCard+allCard+bkCard;
}

async function archiveProject(pid){
  const id=pid||state.current?.id;if(!id)return;
  const pin=prompt('Enter PIN to archive:');if(!pin)return;
  const r=await api('POST',`/api/projects/${id}/archive`,{pin});
  if(r.error){toast(r.error,'err');return;}
  toast(r.message||'Archived');
  await loadProjects();state.current=state.projects[0]||null;state.tab='dashboard';render();
}
async function deleteProject(){
  if(!state.current)return;
  if(!confirm(`Permanently delete "${state.current.name}"?`))return;
  const pin=prompt('Enter PIN to delete:');if(!pin)return;
  const r=await api('POST',`/api/projects/${state.current.id}/delete`,{pin});
  if(r.error){toast(r.error,'err');return;}
  toast(r.message||'Deleted');
  await loadProjects();state.current=state.projects[0]||null;state.tab='dashboard';render();
}

// SHARED ACTIONS
async function createProject(){
  const name=document.getElementById('newName').value.trim();
  const desc=document.getElementById('newDesc')?.value||'';
  if(!name)return;
  const r=await api('POST','/api/projects',{name,description:desc});
  if(r.project){
    await loadProjects();state.current=state.projects.find(p=>p.id===r.project.id)||r.project;
    state.tab='dashboard';toast(`Project "${name}" created`);render();
  }else if(r.error){
    const el=document.getElementById('createProjectError');
    if(el)el.innerHTML=`<p style="color:var(--red);font-size:12px;margin-top:6px">${escHtml(r.error)}</p>`;
    else toast(r.error,'err');
  }
}

async function selectProject(id){
  state.current=state.projects.find(x=>x.id===id)||state.current;
  // Persist selection so page reload restores the same project
  try{localStorage.setItem('pdae_current_project_id',state.current.id);}catch(e){}
  // Reset dashboard context so a new project starts clean
  state._dashVersion='';state._dashReview='';
  state.tab='dashboard';render();
}

// Navigate to Ingest tab and scroll to the Build Intelligence card.
// Used by any button outside the Ingest tab that wants to trigger intelligence building,
// so that the user can review included artefacts and select the extraction backend first.
function goToBuildIntelligence(){
  switchTab('ingest');
  // After render, scroll to the Build Intelligence card which has a known card-title text
  setTimeout(()=>{
    const cards=document.querySelectorAll('.card');
    for(const c of cards){
      const title=c.querySelector('.card-title');
      if(title&&title.textContent.includes('Build Intelligence')){
        c.scrollIntoView({behavior:'smooth',block:'start'});
        break;
      }
    }
  },150);
}

async function buildContext(){
  if(!state.current)return;
  let nextNum=1;
  try{const r=await api('GET',`/api/projects/${state.current.id}/hierarchy/versions`);nextNum=(r.versions||[]).length+1;}catch(e){}
  const label=prompt(`Label this version (optional, max 20 chars).\nWill create: v${nextNum} – [label]`,'');
  if(label===null)return;
  const trimmed=(label||'').trim().slice(0,20);

  // Always read the backend from the dropdown when it exists; fall back to project setting
  const sel=document.getElementById('intelBackendSelect');
  const selectedBackend=sel?sel.value:(state.current.ai_backend||'files_only');

  const payload={};
  if(trimmed)payload.label=trimmed;
  payload.ai_backend=selectedBackend;  // always send so server uses exactly what user chose

  const r=await api('POST',`/api/projects/${state.current.id}/build-context`,payload);
  if(r._build_metadata){
    const meta=r._build_metadata;
    const aiTag=meta.ai_enriched?` ✨ AI (${meta.ai_backend})`:'';
    toast(`Built v${nextNum}${aiTag}: ${meta.total_risks||0} risks, ${meta.total_constraints||0} constraints`);
    render();
  }else if(r.error){toast(r.error,'err');}
}

// Rebuild: reuse the currently selected backend without prompting for a label
async function rebuildContext(){
  if(!state.current)return;
  const sel=document.getElementById('intelBackendSelect');
  const selectedBackend=sel?sel.value:(state.current.ai_backend||'files_only');
  const payload={ai_backend:selectedBackend};
  const r=await api('POST',`/api/projects/${state.current.id}/build-context`,payload);
  if(r._build_metadata){
    const meta=r._build_metadata;
    const aiTag=meta.ai_enriched?` ✨ AI (${meta.ai_backend})`:'';
    toast(`Rebuilt${aiTag}: ${meta.total_risks||0} risks, ${meta.total_constraints||0} constraints`);
    render();
  }else if(r.error){toast(r.error,'err');}
}

async function loadProjects(){
  const r=await api('GET','/api/projects');
  state.projects=r.projects||[];
  if(!state.current&&state.projects.length){
    // Restore last selected project from localStorage; fall back to first in list
    let restoredId=null;
    try{restoredId=localStorage.getItem('pdae_current_project_id');}catch(e){}
    const found=restoredId&&state.projects.find(x=>x.id===restoredId);
    state.current=found||state.projects[0];
  }
}
async function loadBackends(){
  const r=await api('GET','/api/backends');
  state.backends=r.backends||[];
}

// ─── Bootstrap ───────────────────────────────────────────────
async function loadAppInfo(){
  try{
    const h=await api('GET','/api/health');
    if(h.app){state.appName=h.app;document.title=h.app;}
  }catch(e){}
}
(async()=>{await Promise.all([loadProjects(),loadBackends(),loadAppInfo()]);render();})();
</script>
</body>
