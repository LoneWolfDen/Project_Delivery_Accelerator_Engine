<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contexta – Project Delivery Accelerator</title>
<style>
/* ─── Design Tokens ─────────────────────────────────────────── */
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #21262d;
  --surface3: #30363d;
  --border:   #30363d;
  --border2:  #484f58;
  --text:     #e6edf3;
  --text-dim: #8b949e;
  --text-muted: #6e7681;
  --accent:   #58a6ff;
  --accent-dim:#1f6feb;
  --green:    #3fb950;
  --green-dim:#238636;
  --yellow:   #d29922;
  --red:      #f85149;
  --purple:   #bc8cff;
  --radius:   6px;
  --radius-lg:10px;
  --shadow:   0 4px 16px rgba(0,0,0,0.4);
  --transition: 0.15s ease;
}
</style>
</head>
<body>
<div id="app">
  <header id="header"></header>
  <main id="main"></main>
</div>

<style>
/* ─── Reset & Base ──────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;font-size:13px;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ─── Header ────────────────────────────────────────────────── */
header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  min-height:48px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.5);}
.logo{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;letter-spacing:-.3px;}
.logo span{color:var(--accent);}
.phase-badge{background:var(--accent-dim);color:var(--accent);padding:2px 10px;
  border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.proj-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:5px 10px;border-radius:var(--radius);font-size:12px;cursor:pointer;}
.proj-select:focus{outline:none;border-color:var(--accent);}
nav{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap;}
nav button{background:transparent;color:var(--text-dim);border:none;padding:6px 11px;
  border-radius:var(--radius);cursor:pointer;font-size:12px;font-weight:500;
  transition:background var(--transition),color var(--transition);}
nav button:hover{background:var(--surface2);color:var(--text);}
nav button.active{background:var(--surface2);color:var(--accent);}

/* ─── Layout ────────────────────────────────────────────────── */
main{max-width:1080px;margin:0 auto;padding:20px 16px;}

/* ─── Cards ─────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px 18px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;}
.card-title .icon{font-size:15px;}
.card-subtitle{font-size:11px;color:var(--text-dim);margin-bottom:10px;}
.card-section{font-size:11px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.6px;margin:10px 0 5px;}

/* ─── Stat Grid ─────────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;}
.stat{background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:12px 14px;text-align:center;
  cursor:pointer;transition:border-color var(--transition),background var(--transition);}
.stat:hover{border-color:var(--accent);background:var(--surface3);}
.stat .num{font-size:26px;font-weight:700;color:var(--accent);line-height:1.2;}
.stat .lbl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.stat.green .num{color:var(--green);}
.stat.yellow .num{color:var(--yellow);}
.stat.red .num{color:var(--red);}
.stat.purple .num{color:var(--purple);}
</style>

<style>
/* ─── Buttons ───────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;background:var(--accent);
  color:#000;border:none;padding:6px 14px;border-radius:var(--radius);
  cursor:pointer;font-size:12px;font-weight:600;transition:opacity var(--transition);}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-xs{padding:2px 8px;font-size:10px;border-radius:4px;}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent);}
.btn-outline:hover{background:rgba(88,166,255,.08);}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--border2);}
.btn-green{background:var(--green-dim);color:#fff;}
.btn-yellow{background:var(--yellow);color:#000;}
.btn-red{background:var(--red);color:#fff;}
.btn-icon{padding:5px 7px;background:transparent;border:1px solid var(--border);
  color:var(--text-dim);border-radius:var(--radius);cursor:pointer;font-size:12px;
  transition:all var(--transition);}
.btn-icon:hover{border-color:var(--accent);color:var(--accent);}

/* ─── Forms ─────────────────────────────────────────────────── */
input,select,textarea{background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:6px 10px;border-radius:var(--radius);font-size:12px;width:100%;
  transition:border-color var(--transition);}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
input::placeholder,textarea::placeholder{color:var(--text-muted);}
select{width:auto;min-width:130px;cursor:pointer;}
textarea{resize:vertical;min-height:60px;font-family:inherit;line-height:1.5;}
.form-row{margin-bottom:10px;}
.form-row label{display:block;font-size:11px;color:var(--text-dim);
  margin-bottom:4px;font-weight:500;}
.form-group{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}

/* ─── Tags & Badges ─────────────────────────────────────────── */
.tag{display:inline-block;padding:1px 8px;border-radius:20px;font-size:10px;
  font-weight:500;border:1px solid var(--border2);color:var(--text-dim);white-space:nowrap;}
.tag-green{border-color:var(--green-dim);color:var(--green);background:rgba(63,185,80,.08);}
.tag-blue{border-color:var(--accent-dim);color:var(--accent);background:rgba(88,166,255,.08);}
.tag-yellow{border-color:var(--yellow);color:var(--yellow);background:rgba(210,153,34,.08);}
.tag-red{border-color:var(--red);color:var(--red);background:rgba(248,81,73,.08);}
.tag-purple{border-color:var(--purple);color:var(--purple);background:rgba(188,140,255,.08);}

/* ─── Items List ────────────────────────────────────────────── */
ul.items{list-style:none;}
ul.items li{padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;
  color:var(--text-dim);}
ul.items li:last-child{border:none;}
ul.items li::before{content:'›';color:var(--text-muted);margin-right:6px;}

/* ─── Flex helpers ──────────────────────────────────────────── */
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
.mt{margin-top:10px;}
.mt-sm{margin-top:6px;}
.mb{margin-bottom:10px;}
.gap-sm{gap:5px;}

/* ─── Empty state ───────────────────────────────────────────── */
.empty{text-align:center;padding:40px 20px;color:var(--text-dim);}
.empty .empty-icon{font-size:36px;margin-bottom:10px;opacity:.5;}
.empty p{font-size:13px;margin-bottom:14px;}
</style>

<style>
/* ─── Collapsible / Details ─────────────────────────────────── */
details>summary{cursor:pointer;user-select:none;list-style:none;}
details>summary::-webkit-details-marker{display:none;}
.collapse-header{display:flex;align-items:center;gap:8px;padding:10px 12px;
  border-radius:var(--radius);background:var(--surface2);cursor:pointer;
  transition:background var(--transition);}
.collapse-header:hover{background:var(--surface3);}
.chevron{font-size:9px;color:var(--text-muted);transition:transform .2s;display:inline-block;}
details[open] .chevron{transform:rotate(90deg);}
.collapse-body{padding:10px 0 4px;}

/* ─── File Explorer ─────────────────────────────────────────── */
.file-explorer{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.file-item{border-bottom:1px solid var(--border);}
.file-item:last-child{border-bottom:none;}
.file-header{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;
  font-size:12px;transition:background var(--transition);}
.file-header:hover{background:var(--surface2);}
.file-chevron{font-size:9px;color:var(--text-muted);transition:transform .2s;width:10px;flex-shrink:0;}
.file-item.expanded .file-chevron{transform:rotate(90deg);}
.file-name{font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-body{display:none;padding:0 12px 10px 32px;}
.file-item.expanded .file-body{display:block;}

/* ─── Toggle pill ───────────────────────────────────────────── */
.toggle-pill{font-size:10px;padding:2px 9px;border-radius:20px;cursor:pointer;
  font-weight:600;user-select:none;white-space:nowrap;border:1px solid;
  transition:all var(--transition);}
.toggle-on{background:rgba(63,185,80,.12);color:var(--green);border-color:var(--green-dim);}
.toggle-off{background:rgba(248,81,73,.08);color:var(--red);border-color:var(--red);}

/* ─── Prompt / Code box ─────────────────────────────────────── */
.prompt-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px 12px;font-family:'Cascadia Code','Fira Code',monospace;font-size:11px;
  white-space:pre-wrap;max-height:280px;overflow-y:auto;color:var(--text-dim);
  margin-top:8px;line-height:1.6;}

/* ─── Backend chips ─────────────────────────────────────────── */
.backend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-top:8px;}
.backend-chip{padding:7px 10px;border-radius:var(--radius);font-size:11px;
  background:var(--surface2);border:1px solid var(--border);text-align:center;line-height:1.4;}
.backend-chip.ok{border-color:var(--green-dim);background:rgba(63,185,80,.06);}

/* ─── Sort controls ─────────────────────────────────────────── */
.sort-bar{display:flex;align-items:center;gap:8px;padding:6px 0;flex-wrap:wrap;}
.sort-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);
  padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;
  transition:all var(--transition);}
.sort-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,.08);}
.sort-btn:hover{border-color:var(--border2);color:var(--text);}

/* ─── Section expand all bar ────────────────────────────────── */
.expand-bar{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.expand-bar span{font-size:11px;color:var(--text-dim);}

/* ─── Compare diff ──────────────────────────────────────────── */
.diff-card{background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;margin-top:10px;}
.diff-cat-header{display:flex;align-items:center;gap:8px;padding:8px 12px;
  cursor:pointer;transition:background var(--transition);}
.diff-cat-header:hover{background:var(--surface3);}
.diff-cat-body{padding:6px 12px 10px;}
.diff-added{color:var(--green);font-size:11px;padding:2px 0;}
.diff-added::before{content:'+ ';font-weight:700;}
.diff-removed{color:var(--red);font-size:11px;padding:2px 0;}
.diff-removed::before{content:'− ';font-weight:700;}
.diff-count{font-size:11px;background:var(--surface3);border-radius:20px;
  padding:1px 7px;font-weight:600;}
.diff-trend{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
.diff-trend.up{background:rgba(248,81,73,.12);color:var(--red);}
.diff-trend.down{background:rgba(63,185,80,.12);color:var(--green);}
.diff-trend.same{background:rgba(139,148,158,.12);color:var(--text-dim);}

/* ─── Review item ───────────────────────────────────────────── */
.review-item{background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);margin:5px 0;overflow:hidden;
  transition:border-color var(--transition);}
.review-item:hover{border-color:var(--border2);}
.review-item.active-review{border-color:var(--accent);}
.review-item-header{display:flex;align-items:center;gap:8px;padding:8px 12px;
  cursor:pointer;transition:background var(--transition);}
.review-item-header:hover{background:var(--surface2);}
.review-item-body{padding:8px 12px 10px;border-top:1px solid var(--border);}

/* ─── Findings section ──────────────────────────────────────── */
.findings-section{margin:8px 0;}
.findings-title{font-size:10px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.findings-item{font-size:12px;padding:3px 0 3px 10px;color:var(--text-dim);
  border-left:2px solid var(--border);margin-bottom:2px;}

/* ─── Phase progress bar ────────────────────────────────────── */
.phase-bar{display:flex;align-items:center;gap:0;margin:10px 0;overflow-x:auto;}
.phase-step{padding:7px 18px;font-size:11px;font-weight:600;cursor:pointer;
  transition:all var(--transition);white-space:nowrap;text-align:center;
  border:1px solid var(--border);margin-right:-1px;}
.phase-step:first-child{border-radius:var(--radius) 0 0 var(--radius);}
.phase-step:last-child{border-radius:0 var(--radius) var(--radius) 0;margin-right:0;}
.phase-step.done{background:var(--green-dim);color:#fff;border-color:var(--green-dim);}
.phase-step.current{background:var(--accent-dim);color:#fff;border-color:var(--accent);}
.phase-step.pending{background:var(--surface2);color:var(--text-dim);}

/* ─── Loading overlay ───────────────────────────────────────── */
.loading-bar{height:2px;background:var(--accent-dim);border-radius:2px;
  animation:loadbar 1.2s ease-in-out infinite;width:60%;}
@keyframes loadbar{0%{width:0%;opacity:1}70%{width:80%;opacity:1}100%{width:100%;opacity:0}}
.loading-inline{display:inline-flex;align-items:center;gap:6px;color:var(--text-dim);font-size:12px;}
.spin{animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ─── Toast notification ────────────────────────────────────── */
#toast{position:fixed;bottom:20px;right:20px;background:var(--surface3);
  border:1px solid var(--border2);color:var(--text);padding:10px 16px;
  border-radius:var(--radius-lg);font-size:12px;opacity:0;
  transition:opacity .3s;z-index:9999;max-width:320px;pointer-events:none;}
#toast.show{opacity:1;}
#toast.ok{border-color:var(--green-dim);color:var(--green);}
#toast.err{border-color:var(--red);color:var(--red);}

/* ─── Workflow guide steps ───────────────────────────────────── */
.workflow-steps{display:flex;flex-direction:column;gap:0;margin:12px 0;}
.workflow-step{display:flex;align-items:flex-start;gap:14px;padding:10px 0;position:relative;}
.workflow-step:not(:last-child)::after{content:'';position:absolute;left:17px;top:42px;
  width:2px;height:calc(100% - 10px);background:var(--border);z-index:0;}
.workflow-step-num{width:34px;height:34px;border-radius:50%;background:var(--accent-dim);
  color:var(--accent);display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;flex-shrink:0;position:relative;z-index:1;border:2px solid var(--accent);}
.workflow-step-body{flex:1;padding-top:4px;}
.workflow-step-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px;}
.workflow-step-desc{font-size:11px;color:var(--text-dim);margin-bottom:6px;}

/* ─── Deep Dive rows ─────────────────────────────────────────── */
/* Full-row selection: clicking anywhere on the row toggles it */
.dd-row{display:flex;align-items:flex-start;gap:10px;padding:8px 10px;
  margin:2px 0;border-radius:var(--radius);cursor:pointer;
  border:1px solid transparent;font-size:12px;line-height:1.5;
  transition:background var(--transition),border-color var(--transition);}
.dd-row:hover{background:var(--surface2);border-color:var(--border);}
/* Selected (default): green left accent + green tint */
.dd-row.dd-row-selected,.dd-row:not(.dd-row-deselected){
  background:rgba(63,185,80,.06);border-color:var(--green-dim);}
.dd-row:not(.dd-row-deselected) .dd-row-check-icon{color:var(--green);font-size:13px;font-weight:700;flex-shrink:0;margin-top:1px;}
/* Deselected: dim with strikethrough */
.dd-row.dd-row-deselected{background:transparent;border-color:transparent;opacity:.55;}
.dd-row.dd-row-deselected .dd-row-check-icon{color:var(--text-muted);font-size:13px;}
.dd-row-check-icon{font-size:13px;flex-shrink:0;margin-top:1px;width:14px;text-align:center;}
.dd-row-content{flex:1;display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;}
/* Sticky action bar at the bottom of the Deep Dive card */
.dd-sticky-bar{position:sticky;bottom:0;background:var(--surface);
  border-top:1px solid var(--border);padding:8px 14px;
  margin:10px -18px -16px;border-radius:0 0 var(--radius-lg) var(--radius-lg);
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;z-index:10;}

/* ─── Coverage pills ─────────────────────────────────────────── */
.coverage-pills{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.coverage-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;
  border-radius:20px;font-size:11px;font-weight:500;border:1px solid;}
.coverage-pill.covered{border-color:var(--green-dim);color:var(--green);background:rgba(63,185,80,.08);}
.coverage-pill.missing{border-color:var(--border2);color:var(--text-muted);background:var(--surface2);}
.coverage-bar-outer{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin:6px 0 8px;}
.coverage-bar-inner{height:100%;border-radius:3px;transition:width .4s ease;}

/* ─── Utility micro-classes (replaces repeated inline styles) ── */
.fs10{font-size:10px}.fs11{font-size:11px}.fs12{font-size:12px}
.c-dim{color:var(--text-dim)}.c-muted{color:var(--text-muted)}.c-accent{color:var(--accent)}
.fw6{font-weight:600}.fw7{font-weight:700}
.ml-auto{margin-left:auto}
.no-ls{list-style:none}
.mb8{margin-bottom:8px}.mb6{margin-bottom:6px}.mt8{margin-top:8px}
.fx-wrap{flex-wrap:wrap}
</style>

<div id="toast"></div>

<script>
// UTILITIES
function escHtml(s){
  if(typeof s!=='string')s=String(s||'');
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso){
  if(!iso)return'–';
  return iso.slice(0,16).replace('T',' ');
}
function fmtDateShort(iso){
  if(!iso)return'–';
  return iso.slice(0,10);
}
function relativeTime(iso){
  if(!iso)return'';
  // Normalise: if no timezone suffix, treat as UTC (server stores UTC)
  const norm=(iso.endsWith('Z')||iso.includes('+'))?iso:iso+'Z';
  const diff=Date.now()-new Date(norm).getTime();
  if(isNaN(diff))return'';
  const m=Math.floor(diff/60000);
  if(m<1)return'just now';
  if(m<60)return`${m}m ago`;
  const h=Math.floor(m/60);
  if(h<24)return`${h}h ago`;
  return`${Math.floor(h/24)}d ago`;
}

// Toast
let _toastTimer=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='show '+(type==='err'?'err':'ok');
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>el.className='',3000);
}

// API helper with loading state
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  try{
    const r=await fetch(path,opts);
    return r.json();
  }catch(e){return{error:e.message};}
}

// Toggle file expand in file explorer
function toggleFileExpand(el){
  el.closest('.file-item').classList.toggle('expanded');
}

// STATE
let state={
  projects:[],current:null,tab:'dashboard',
  backends:[],adminConfig:{},appName:'Contexta',
  lastDeepDive:null,_ddAllItems:[],
  _dashVersion:'',_dashReview:'',
  _diagVersion:'',_diagReview:'',
  _intelCategory:null,
  _versionSort:'newest',
  _reviewSort:'newest',
  _debugMode:false,
  _lastRenderedProject:null,
};
const TABS=['dashboard','ingest','intelligence','versions','reviews','diagrams','phases','presales','admin'];

// Shared hierarchy loader
async function loadHierarchy(pid){
  let h={};
  try{h=await api('GET',`/api/projects/${pid}/hierarchy`);}catch(e){}
  const tree=h.tree||[];
  const versions=[];
  for(const phase of tree){
    for(const ver of(phase.versions||[])){
      versions.push({...ver,phase_label:phase.label,phase_is_current:phase.is_current});
    }
  }
  versions.sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
  return{tree,versions,
    totalVersions:h.total_versions||versions.length,
    totalReviews:h.total_reviews||0,
    currentPhase:h.current_phase||''};
}

function formatVersionOption(v){
  const cnt=v.review_count||0;
  const ar=v.active_review;
  let aStr='';
  if(ar)aStr=`, active: ${ar.review_id}${ar.persona?' · '+ar.persona:''}`;
  const lbl=v.label?' – '+v.label:'';
  return`${v.version_id}${lbl} (${cnt} review${cnt===1?'':'s'}${aStr})`;
}
</script>

<script>
// HEADER & RENDER
function renderHeader(){
  const proj=state.current;
  const phase=proj?proj.phase:'';
  const opts=state.projects.map(p=>
    `<option value="${p.id}" ${p.id===(proj?.id)?'selected':''}>${escHtml(p.name)}</option>`
  ).join('');
  // Show project name in header if a project is selected, otherwise show app name
  const displayName = proj ? proj.name : state.appName;
  document.getElementById('header').innerHTML=`
    <span class="logo">⚡ <span>${escHtml(displayName)}</span></span>
    ${phase?`<span class="phase-badge">${escHtml(phase)}</span>`:''}
    ${state.projects.length?`<select class="proj-select" onchange="selectProject(this.value)">${opts}</select>`
      :'<span style="color:var(--text-dim);font-size:12px">No projects</span>'}
    <nav>
      ${TABS.map(t=>`<button class="${state.tab===t?'active':''}" onclick="switchTab('${t}')">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}
      <button class="${state.tab==='settings'?'active':''}" onclick="switchTab('settings')" title="Settings">⚙</button>
    </nav>`;
}

function switchTab(tab){
  // Skip full re-render if same tab and same project — avoids unnecessary API calls
  if(tab===state.tab&&state.current&&state._lastRenderedProject===state.current.id){
    // Still scroll to top for UX consistency
    window.scrollTo({top:0,behavior:'smooth'});
    return;
  }
  state.tab=tab;
  render();
}

async function render(){
  renderHeader();
  if(state.current)state._lastRenderedProject=state.current.id;
  const main=document.getElementById('main');
  main.innerHTML=`<div style="padding:20px;text-align:center"><div class="loading-bar"></div></div>`;
  const views={
    dashboard:viewDashboard,ingest:viewIngest,intelligence:viewIntelligence,
    versions:viewVersions,reviews:viewReviews,diagrams:viewDiagrams,phases:viewPhases,
    presales:viewPresales,settings:viewSettings,admin:viewAdmin
  };
  try{
    main.innerHTML=await(views[state.tab]||viewDashboard)();
    // S2-01: after DOM is written, sync injected-questions chip list on the reviews tab
    if(state.tab==='reviews'){
      setTimeout(()=>{ if(typeof _renderInjectedQuestions==='function')_renderInjectedQuestions(); },0);
    }
  }catch(e){
    console.error('render() view error:',e);
    main.innerHTML='<div class="card"><p style="color:var(--red);font-size:12px">&#9888; Page failed to load: '+escHtml(e.message)+'</p><button class="btn btn-sm btn-ghost mt" onclick="render()">&#8635; Retry</button></div>';
  }
}

// NO PROJECT VIEW
function viewNoProject(){
  const _projList=state.projects.length
    ?'<hr style="border:none;border-top:1px solid var(--border);margin:14px 0">'
     +'<p class="card-section">Existing Projects</p>'
     +'<ul class="items">'+state.projects.map(p=>`<li><a href="#" onclick="selectProject('${p.id}')">${escHtml(p.name)}</a> <span class="tag">${p.phase||'–'}</span></li>`).join('')+'</ul>'
    :'';
  return`<div class="card">
    <div class="empty">
      <div class="empty-icon">📁</div>
      <p>Create or select a project to get started.</p>
      <div style="max-width:340px;margin:0 auto">
        <div class="form-row"><label>Project Name</label>
          <input id="newName" placeholder="e.g. Cloud Migration Assessment"></div>
        <div class="form-row"><label>Description</label>
          <input id="newDesc" placeholder="Optional description"></div>
        <button class="btn" onclick="createProject()">Create Project</button>
        <div id="createProjectError" class="mt"></div>
      </div>
    </div>
    ${_projList}</div>`;
}
</script>

<script>
// DASHBOARD VIEW
async function viewDashboard(){
  if(!state.current)return viewNoProject();
  const pid=state.current.id;
  const selV=state._dashVersion||'';
  const selR=state._dashReview||'';

  let metricsUrl=`/api/projects/${pid}/hierarchy/metrics`;
  const ps=[];
  if(selV)ps.push(`version_id=${selV}`);
  if(selR)ps.push(`review_id=${selR}`);
  if(ps.length)metricsUrl+='?'+ps.join('&');

  let metrics={},versions=[];
  try{[metrics]=await Promise.all([api('GET',metricsUrl)]);}catch(e){}
  try{const r=await api('GET',`/api/projects/${pid}/hierarchy/versions`);versions=r.versions||[];}catch(e){}

  const avail=metrics.available_reviews||[];
  const ds=metrics.data_source||{};

  const vOpts=versions.map(v=>`<option value="${v.version_id}" ${v.version_id===selV?'selected':''}>${escHtml(v.version_id)} ${escHtml(v.label||'')} (${fmtDateShort(v.created_at)})</option>`).join('');
  const rOpts=avail.map(r=>`<option value="${r.review_id}" ${r.review_id===selR?'selected':''}>${r.review_id} – ${escHtml(r.persona)} (${fmtDateShort(r.created_at)})</option>`).join('');

  const ctxCard=versions.length?`
    <div class="card">
      <div class="flex-between mb">
        <div class="card-title"><span class="icon">🎯</span>Data Context</div>
        <span class="tag tag-blue">${escHtml(ds.phase||'–')}</span>
      </div>
      <p class="card-subtitle">Scope all dashboard metrics to a specific version and review.</p>
      <div class="flex">
        <div style="flex:1;min-width:160px">
          <label class="form-row" style="margin-bottom:0"><span class="fs10 c-dim">Version</span>
          <select id="dashVersion" onchange="onVersionChange()" style="width:100%;margin-top:3px">
            <option value="">Latest Version</option>${vOpts}
          </select></label>
        </div>
        <div style="flex:1;min-width:180px">
          <label class="form-row" style="margin-bottom:0"><span class="fs10 c-dim">Review</span>
          <select id="dashReview" onchange="updateDashMetrics()" style="width:100%;margin-top:3px">
            <option value="">Active Review</option>${rOpts}
          </select></label>
        </div>
      </div>
      ${ds.version?`<p style="font-size:11px;color:var(--accent);margin-top:8px">
        Showing: <strong>${escHtml(ds.version_label||ds.version||'latest')}</strong>
        → <strong>${ds.review_persona?escHtml(ds.review_persona)+' ('+ds.review+')':ds.review||'latest review'}</strong>
      </p>`:''}
    </div>`:''

  const risks=metrics.risks_identified||0;
  const constraints=metrics.constraints||0;
  const deps=metrics.dependencies||0;
  const assumptions=metrics.assumptions||0;
  const actions=metrics.action_items||0;
  const totalV=metrics.total_versions||versions.length;
  const totalR=metrics.total_reviews||0;
  const gaps=metrics.gaps_identified||0;
  const findings=metrics.total_findings||0;
  const artifacts=metrics.artifact_count||0;
  
  // Get all finding categories dynamically (when review is selected)
  const findingCats=metrics.finding_categories||{};

  // Build standard stats tiles
  let statsHTML=`
    <div class="stat-grid mb">
      <div class="stat red" onclick="navigateToIntelligence('risks')"><div class="num">${risks}</div><div class="lbl">Risks</div></div>
      <div class="stat yellow" onclick="navigateToIntelligence('constraints')"><div class="num">${constraints}</div><div class="lbl">Constraints</div></div>
      <div class="stat purple" onclick="navigateToIntelligence('dependencies')"><div class="num">${deps}</div><div class="lbl">Dependencies</div></div>
      <div class="stat" onclick="navigateToIntelligence('assumptions')"><div class="num">${assumptions}</div><div class="lbl">Assumptions</div></div>
      <div class="stat" onclick="navigateToIntelligence('action_items')"><div class="num">${actions}</div><div class="lbl">Action Items</div></div>
      <div class="stat green" onclick="switchTab('versions')"><div class="num">${totalV}</div><div class="lbl">Versions</div></div>
      <div class="stat green" onclick="switchTab('reviews')"><div class="num">${totalR}</div><div class="lbl">Reviews</div></div>
      ${artifacts?`<div class="stat" onclick="switchTab('ingest')"><div class="num">${artifacts}</div><div class="lbl">Artefacts</div></div>`:''}`;
  
  // Add dynamic finding category tiles (excluding standard ones already shown)
  const standardCats=['risks','constraints','dependencies','assumptions','action_items','gaps'];
  for(const[cat,count]of Object.entries(findingCats)){
    if(standardCats.includes(cat))continue;
    if(count>0){
      const label=cat.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase());
      statsHTML+=`<div class="stat yellow" onclick="navigateToIntelligence('${cat}')"><div class="num">${count}</div><div class="lbl">${escHtml(label)}</div></div>`;
    }
  }
  
  // Add remaining standard tiles
  statsHTML+=(findings?`<div class="stat yellow" onclick="navigateToIntelligence('findings')"><div class="num">${findings}</div><div class="lbl">Findings</div></div>`:'')
    +(gaps?`<div class="stat red" onclick="navigateToIntelligence('gaps')"><div class="num">${gaps}</div><div class="lbl">Gaps</div></div>`:'')
    +'</div>';

  const statsHtml=statsHTML;

  const trend=metrics.trend||[];
  let trendHtml='';
  if(trend.length>1){
    const maxR=Math.max(...trend.map(t=>t.stats?.risks||0),1);
    trendHtml=`<div class="card">
      <div class="flex-between mb"><div class="card-title"><span class="icon">📈</span>Risk Trend</div>
      <span class="fs11 c-dim">Last ${trend.length} versions</span></div>
      <div style="display:flex;gap:10px;align-items:flex-end;padding:6px 0;min-height:56px">
        ${trend.map(t=>{const h=Math.max(8,Math.round((t.stats?.risks||0)/maxR*48));
          return`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;cursor:pointer"
            title="${escHtml(t.version_id+' · '+fmtDateShort(t.created_at))}"
            onclick="navigateToVersion('${t.version_id}')">
            <span style="font-size:9px;color:var(--text-dim)">${t.stats?.risks||0}</span>
            <div style="width:100%;height:${h}px;background:var(--red);border-radius:3px 3px 0 0;opacity:.7;transition:opacity .2s"
              onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.7"></div>
            <span style="font-size:9px;color:var(--text-muted)">${t.version_id}</span>
            <span style="font-size:8px;color:var(--text-muted)">${fmtDateShort(t.created_at)}</span>
          </div>`;}).join('')}
      </div>
    </div>`;
  }

  const qa=`<div class="card">
    <div class="card-title mb"><span class="icon">⚡</span>Quick Actions</div>
    <div class="flex">
      <button class="btn" onclick="switchTab('ingest')">📎 Ingest Artefacts</button>
      <button class="btn btn-outline" onclick="goToBuildIntelligence()">🔨 Build Intelligence</button>
      <button class="btn btn-outline" onclick="switchTab('reviews')">🔍 Run Review</button>
      <button class="btn btn-ghost btn-sm" onclick="switchTab('versions')">📋 Browse Versions</button>
      <button class="btn-icon" title="Toggle debug" onclick="toggleDebug()" class="ml-auto">🐛</button>
    </div>
  </div>`;

  const debugHtml=state._debugMode?`<div class="card" style="border-color:var(--yellow)">
    <div class="card-title" style="color:var(--yellow)">🐛 Debug</div>
    <code class="fs11 c-dim">
      project=${pid} | version=${ds.version||'(latest)'} | review=${ds.review||'(active)'} | phase=${ds.phase||'–'}
    </code></div>`:''

  return ctxCard+statsHtml+trendHtml+qa+debugHtml;
}

function navigateToVersion(vid){state._dashVersion=vid;state._dashReview='';state.tab='dashboard';render();}
function navigateToIntelligence(cat){
  state._intelCategory=cat;
  switchTab('intelligence');
  // Scroll to the category section after render
  setTimeout(()=>{
    const el=document.getElementById(`intel_${cat}`);
    if(el){
      el.scrollIntoView({behavior:'smooth',block:'start'});
      el.setAttribute('open','');
    }
  },100);
}
function toggleDebug(){state._debugMode=!state._debugMode;render();}
function onVersionChange(){
  const v=document.getElementById('dashVersion');
  state._dashVersion=v?v.value:'';
  state._dashReview='';
  render();
}
async function updateDashMetrics(){
  const v=document.getElementById('dashVersion');
  const r=document.getElementById('dashReview');
  state._dashVersion=v?v.value:'';
  state._dashReview=r?r.value:'';
  render();
}
</script>

<script>
// INGEST VIEW
const ARTIFACT_CATEGORIES=[
  {value:'project_artefact',label:'Project Artefact',icon:'📋'},
  {value:'meetings_comms',label:'Meetings & Comms',icon:'📞'},
  {value:'delivery_notes',label:'Delivery Notes',icon:'📝'},
  {value:'client_context',label:'Client Context',icon:'🏢'},
  {value:'architecture_design',label:'Architecture & Design',icon:'🏗️'},
  {value:'external_data',label:'External Data',icon:'🌐'},
];
const CATEGORY_META_SCHEMA={
  project_artefact:[{name:'version',type:'string',label:'Version',required:false},{name:'owner',type:'string',label:'Owner',required:false}],
  meetings_comms:[{name:'date',type:'date',label:'Date',required:false},{name:'participants',type:'array',label:'Participants (comma-sep)',required:false}],
  delivery_notes:[{name:'sprint',type:'string',label:'Sprint / Iteration',required:false},{name:'date',type:'date',label:'Date',required:false}],
  client_context:[{name:'source',type:'enum',label:'Source',required:true,options:['retrospective','historical','lessons_learned','other']},
    {name:'relevance',type:'enum',label:'Relevance',required:false,options:['delivery','operations','commercial','security','other']}],
  architecture_design:[{name:'systemName',type:'string',label:'System Name',required:false},
    {name:'layer',type:'enum',label:'Layer',required:false,options:['frontend','backend','data','platform','integration','other']}],
  external_data:[{name:'sourceUrl',type:'string',label:'Source URL',required:false},{name:'retrievedAt',type:'date',label:'Retrieved At',required:false}],
};

async function viewIngest(){
  if(!state.current)return viewNoProject();
  const pid=state.current.id;
  let artifacts=[];
  try{const r=await api('GET',`/api/v1/projects/${pid}/artifacts`);artifacts=r.artifacts||[];}catch(e){}
  let legacyDocs=[];
  let toggles={};
  try{const ctx=await api('GET',`/api/projects/${pid}/context`);legacyDocs=ctx.documents||[];toggles=ctx.file_toggles||{};}catch(e){}

  const catOpts=ARTIFACT_CATEGORIES.map(c=>`<option value="${c.value}">${c.icon} ${c.label}</option>`).join('');

  const included=artifacts.filter(a=>a.include).length+legacyDocs.length;
  const total=artifacts.length+legacyDocs.length;

  const addCard=`<div class="card">
    <div class="flex-between mb">
      <div class="card-title"><span class="icon">📎</span>Add Artefact</div>
      ${total?`<span id="ingestCountBadge" class="tag ${included===total?'tag-green':included===0?'tag-red':'tag-yellow'}">${included}/${total} included</span>`:''}
    </div>
    <div class="flex gap-sm mb">
      <button class="btn btn-sm" id="tabUpload" onclick="switchIngestTab('upload')">Upload File</button>
      <button class="btn btn-sm btn-ghost" id="tabPaste" onclick="switchIngestTab('paste')">Paste Text</button>
      <button class="btn btn-sm btn-ghost" id="tabPaths" onclick="switchIngestTab('paths')">File Paths</button>
    </div>

    <div id="ingestUpload">
      <div class="form-row"><label>Category <span style="color:var(--red)">*</span></label>
        <select id="uploadCategory" onchange="renderMetadataFields('upload')">${catOpts}</select></div>
      <div id="uploadMetaFields"></div>
      <div class="form-row"><label>Title</label><input id="uploadTitle" placeholder="e.g. Client scope document"></div>
      <div class="form-row"><label>File</label>
        <input type="file" id="uploadFile" accept=".txt,.md,.csv,.eml,.json,.yaml,.yml,.pdf,.docx,.xlsx,.pptx"
          style="background:var(--surface2);padding:8px;border-radius:var(--radius);width:100%"></div>
      <button class="btn" onclick="doUploadArtifact()">Upload</button>
    </div>

    <div id="ingestPaste" style="display:none">
      <div class="form-row"><label>Category <span style="color:var(--red)">*</span></label>
        <select id="pasteCategory" onchange="renderMetadataFields('paste')">${catOpts}</select></div>
      <div id="pasteMetaFields"></div>
      <div class="form-row"><label>Title</label><input id="pasteTitle" placeholder="e.g. Sprint 2 meeting notes"></div>
      <div class="form-row"><label>Text Content <span style="color:var(--red)">*</span></label>
        <textarea id="pasteText" rows="5" placeholder="Paste your content here…"></textarea></div>
      <button class="btn" onclick="doPasteArtifact()">Save Text</button>
    </div>

    <div id="ingestPaths" style="display:none">
      <p class="card-subtitle">Legacy: file paths relative to project root, one per line.</p>
      <div class="form-row"><textarea id="ingestPathsArea" rows="3" placeholder="sample_data/scope.txt"></textarea></div>
      <button class="btn" onclick="doIngest()">Ingest Files</button>
    </div>
    <div id="ingestResult" class="mt"></div>
  </div>`;

  let regHtml='';
  if(total){
    regHtml=`<div class="card">
      <div class="flex-between mb">
        <div class="card-title"><span class="icon">🗂️</span>Artefact Registry</div>
        <div class="flex gap-sm">
          <button class="btn btn-sm btn-ghost" id="filesToggle"
            onclick="toggleExpandSection('.file-item','filesToggle')">Expand All</button>
          <button class="btn btn-sm btn-outline"
            title="Extract and index text content from all included artefacts so they are ready for intelligence building"
            onclick="processAllArtifacts()">🔄 Re-process Included</button>
        </div>
      </div>
      <div class="file-explorer">`;

    for(const a of artifacts){
      const ci=ARTIFACT_CATEGORIES.find(c=>c.value===a.category)||{icon:'📄',label:a.category};
      const statusTag=a.status==='processed'?'tag-green':a.status==='failed'?'tag-red':a.status==='processing'?'tag-yellow':'';
      const meta=Object.entries(a.metadata||{});
      regHtml+=`<div class="file-item">
        <div class="file-header" onclick="toggleFileExpand(this)">
          <span class="file-chevron">▶</span>
          <span style="font-size:13px">${ci.icon}</span>
          <span class="file-name">${escHtml(a.title||a.fileName||'Untitled')}</span>
          <span class="tag">${escHtml(ci.label)}</span>
          <span class="tag ${statusTag}">${a.status}</span>
          <span class="fs10 c-muted">${fmtDateShort(a.createdAt)}</span>
          <span class="toggle-pill ${a.include?'toggle-on':'toggle-off'}" data-aid="${a.artifactId}"
            onclick="event.stopPropagation();toggleArtifact('${pid}','${a.artifactId}',${!a.include})">
            ${a.include?'Included':'Excluded'}</span>
        </div>
        <div class="file-body">
          <p style="font-size:11px;color:var(--text-dim);margin-bottom:5px">
            ${a.fileName?`File: <strong>${escHtml(a.fileName)}</strong> · `:''}Type: ${a.type}
          </p>
          ${meta.length?`<div class="flex gap-sm" class="mb6">${meta.map(([k,v])=>`<span class="tag">${k}: ${Array.isArray(v)?v.join(', '):escHtml(String(v))}</span>`).join('')}</div>`:''}
          <div class="flex gap-sm">
            <button class="btn btn-sm btn-outline" onclick="processArtifact('${pid}','${a.artifactId}')">Process</button>
            <button class="btn btn-sm btn-red" onclick="deleteArtifact('${pid}','${a.artifactId}')">Remove</button>
          </div>
        </div>
      </div>`;
    }
    for(const d of legacyDocs){
      const fn=d.filename||d.metadata?.filename||'';
      const st=d.metadata?.source_type||'doc';
      const words=d.metadata?.word_count||0;
      const secs=d.sections||[];
      const isOn=toggles[fn]!==false;
      regHtml+=`<div class="file-item">
        <div class="file-header" onclick="toggleFileExpand(this)">
          <span class="file-chevron">▶</span>
          <span style="font-size:13px">${st==='csv'?'📊':st==='email'?'📧':'📄'}</span>
          <span class="file-name">${escHtml(fn)}</span>
          <span class="tag">${st}</span>
          <span class="fs10 c-muted">${words} words · ${secs.length} sections</span>
          <span class="toggle-pill ${isOn?'toggle-on':'toggle-off'}" data-legacy="1"
            onclick="event.stopPropagation();toggleFileActive('${escHtml(fn)}',${!isOn})">
            ${isOn?'Included':'Excluded'}</span>
        </div>
        <div class="file-body">
          ${secs.length?secs.map(s=>`<div style="font-size:11px;color:var(--text-dim);padding:2px 0 2px 8px;border-left:2px solid var(--border);margin:2px 0">
            <span style="color:var(--text)">${escHtml(s.title||s.heading||'Section')}</span>
            <span style="color:var(--text-muted);font-size:10px"> · ${(s.content||'').length} chars</span>
          </div>`).join(''):'<p class="fs11 c-muted">No section data</p>'}
        </div>
      </div>`;
    }
    regHtml+=`</div></div>`;
  }
  // Update counter after rendering
  setTimeout(()=>_updateIngestCounter(),50);

  // Build Intelligence action card – shown only when artefacts are present
  let intelActionCard='';
  if(total){
    const backendOpts=(state.backends||[]).map(b=>{
      const selected=(b.name===(state.current.ai_backend||'files_only'))?'selected':'';
      const avail=b.available?'':' (unavailable)';
      return`<option value="${b.name}" ${selected}>${b.display_name||b.name}${avail}</option>`;
    }).join('');
    intelActionCard=`<div class="card" style="border-top:2px solid var(--accent)">
      <div class="flex-between mb">
        <div class="card-title"><span class="icon">🔨</span>Build Intelligence</div>
      </div>
      <p style="font-size:12px;color:var(--text-dim);margin-bottom:10px">
        Run the extraction pipeline on all <strong>included</strong> artefacts above.
        Choose <em>files_only</em> for instant offline extraction or an AI backend for
        deeper analysis.
      </p>
      <div class="flex gap-sm" style="align-items:center;flex-wrap:wrap">
        <div style="display:flex;flex-direction:column;gap:3px;min-width:180px">
          <label class="fs11 c-dim">Extraction backend</label>
          <select id="intelBackendSelect" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;color:var(--text);font-size:12px">
            ${backendOpts}
          </select>
        </div>
        <button class="btn" style="margin-top:16px" onclick="buildContext()">🔨 Build Intelligence</button>
        <button class="btn btn-ghost" style="margin-top:16px" title="Re-run with same backend, no label prompt" onclick="rebuildContext()">🔁 Rebuild</button>
      </div>
      <p style="font-size:10px;color:var(--text-muted);margin-top:8px">
        ✨ When an AI backend is selected, pattern-based extraction runs first, then the
        LLM enriches the results in a second pass.
      </p>
    </div>`;
  }

  return addCard+regHtml+intelActionCard;
}

function switchIngestTab(tab){
  ['upload','paste','paths'].forEach(t=>{
    const el=document.getElementById('ingest'+t[0].toUpperCase()+t.slice(1));
    const btn=document.getElementById('tab'+t[0].toUpperCase()+t.slice(1));
    if(el)el.style.display=t===tab?'':'none';
    if(btn){btn.className='btn btn-sm '+(t===tab?'':'btn-ghost');}
  });
  if(tab==='upload')renderMetadataFields('upload');
  if(tab==='paste')renderMetadataFields('paste');
}
</script>

<script>
// ─── Metadata fields helpers ─────────────────────────────────
function renderMetadataFields(prefix){
  const catEl=document.getElementById(prefix+'Category');
  const cnt=document.getElementById(prefix+'MetaFields');
  if(!catEl||!cnt)return;
  const fields=CATEGORY_META_SCHEMA[catEl.value]||[];
  if(!fields.length){cnt.innerHTML='';return;}
  let html=`<div style="border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin:6px 0 8px;background:var(--bg)">
    <p class="card-section" style="margin-top:0">Context Fields</p>`;
  for(const f of fields){
    const id=`${prefix}_meta_${f.name}`;
    const req=f.required?` <span style="color:var(--red)">*</span>`:'';
    if(f.type==='enum'){
      html+=`<div class="form-row"><label>${f.label}${req}</label><select id="${id}"><option value="">— select —</option>${f.options.map(o=>`<option value="${o}">${o.replace(/_/g,' ')}</option>`).join('')}</select></div>`;
    }else if(f.type==='date'){
      html+=`<div class="form-row"><label>${f.label}${req}</label><input id="${id}" type="date"></div>`;
    }else if(f.type==='array'){
      html+=`<div class="form-row"><label>${f.label}${req}</label><input id="${id}" placeholder="e.g. Alice, Bob"></div>`;
    }else{
      html+=`<div class="form-row"><label>${f.label}${req}</label><input id="${id}" placeholder="${f.label}"></div>`;
    }
  }
  html+='</div>';
  cnt.innerHTML=html;
}

function collectMetadata(prefix){
  const catEl=document.getElementById(prefix+'Category');
  if(!catEl)return{};
  const fields=CATEGORY_META_SCHEMA[catEl.value]||[];
  const md={};
  for(const f of fields){
    const el=document.getElementById(`${prefix}_meta_${f.name}`);
    if(!el)continue;
    const v=el.value.trim();
    if(!v)continue;
    md[f.name]=f.type==='array'?v.split(',').map(s=>s.trim()).filter(Boolean):v;
  }
  return md;
}

function validateMetadata(prefix){
  const catEl=document.getElementById(prefix+'Category');
  if(!catEl)return{valid:true,errors:[]};
  const fields=CATEGORY_META_SCHEMA[catEl.value]||[];
  const errors=[];
  for(const f of fields){
    if(!f.required)continue;
    const el=document.getElementById(`${prefix}_meta_${f.name}`);
    if(!el||!el.value.trim())errors.push(`${f.label} is required`);
  }
  return{valid:errors.length===0,errors};
}

async function doUploadArtifact(){
  const pid=state.current.id;
  const fi=document.getElementById('uploadFile');
  const cat=document.getElementById('uploadCategory').value;
  const title=document.getElementById('uploadTitle').value;
  const el=document.getElementById('ingestResult');
  if(!fi.files.length){el.innerHTML='<p style="color:var(--red)">Select a file</p>';return;}
  if(!cat){el.innerHTML='<p style="color:var(--red)">Category required</p>';return;}
  const{valid,errors}=validateMetadata('upload');
  if(!valid){el.innerHTML=`<p style="color:var(--red)">${errors.join('<br>')}</p>`;return;}
  const md=collectMetadata('upload');
  const file=fi.files[0];
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Uploading…</span>';
  const fd=new FormData();
  fd.append('file',file);fd.append('category',cat);
  if(title)fd.append('title',title);
  if(Object.keys(md).length)fd.append('metadata',JSON.stringify(md));
  try{
    const resp=await fetch(`/api/v1/projects/${pid}/artifacts/upload`,{method:'POST',body:fd});
    const r=await resp.json();
    if(r.artifact){
      toast(`Uploaded: ${r.artifact.title||r.artifact.fileName}`);
      el.innerHTML='';fi.value='';document.getElementById('uploadTitle').value='';
      setTimeout(()=>render(),600);
    }else{el.innerHTML=`<p style="color:var(--red)">${r.error||'Upload failed'}</p>`;}
  }catch(ex){el.innerHTML=`<p style="color:var(--red)">${ex.message}</p>`;}
}

async function doPasteArtifact(){
  const pid=state.current.id;
  const cat=document.getElementById('pasteCategory').value;
  const title=document.getElementById('pasteTitle').value;
  const text=document.getElementById('pasteText').value;
  const el=document.getElementById('ingestResult');
  if(!text.trim()){el.innerHTML='<p style="color:var(--red)">Text required</p>';return;}
  if(!cat){el.innerHTML='<p style="color:var(--red)">Category required</p>';return;}
  const{valid,errors}=validateMetadata('paste');
  if(!valid){el.innerHTML=`<p style="color:var(--red)">${errors.join('<br>')}</p>`;return;}
  const md=collectMetadata('paste');
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Saving…</span>';
  const r=await api('POST',`/api/v1/projects/${pid}/artifacts/text`,{category:cat,title,text,metadata:md});
  if(r.artifact){
    toast(`Saved: ${r.artifact.title}`);
    el.innerHTML='';document.getElementById('pasteText').value='';document.getElementById('pasteTitle').value='';
    setTimeout(()=>render(),600);
  }else{el.innerHTML=`<p style="color:var(--red)">${r.error||r.message||'Save failed'}</p>`;}
}

async function toggleArtifact(pid,id,inc){
  // Prevent double-toggle while request in flight
  const pill=document.querySelector(`.toggle-pill[data-aid="${id}"]`);
  if(pill&&pill.dataset.busy==='1')return;
  if(pill)pill.dataset.busy='1';
  const r=await api('POST',`/api/v1/projects/${pid}/artifacts/${id}/toggle`,{include:inc});
  if(pill)delete pill.dataset.busy;
  if(r.error){toast(r.error,'err');return;}
  // Update only this pill in-place; never re-render the whole tab
  if(pill){
    pill.className='toggle-pill '+(inc?'toggle-on':'toggle-off');
    pill.textContent=inc?'Included':'Excluded';
    pill.setAttribute('onclick',`event.stopPropagation();toggleArtifact('${pid}','${id}',${!inc})`);
  }
  _updateIngestCounter();
}

function _updateIngestCounter(){
  const pills=document.querySelectorAll('.toggle-pill[data-aid]');
  const inc=[...pills].filter(p=>p.classList.contains('toggle-on')).length;
  const tot=pills.length;
  // Add legacy doc count (they are always included)
  const legacyCount=document.querySelectorAll('.toggle-pill[data-legacy]').length;
  const legacyInc=document.querySelectorAll('.toggle-pill[data-legacy].toggle-on').length;
  const total=tot+legacyCount;
  const included=inc+legacyInc;
  const badge=document.getElementById('ingestCountBadge');
  if(badge&&total){
    badge.textContent=`${included}/${total} included`;
    badge.className='tag '+(included===total?'tag-green':included===0?'tag-red':'tag-yellow');
  }
}
async function deleteArtifact(pid,id){
  if(!confirm('Remove this artefact?'))return;
  await api('POST',`/api/v1/projects/${pid}/artifacts/${id}/delete`,{});
  toast('Artefact removed');render();
}
async function processArtifact(pid,id){
  const r=await api('POST',`/api/v1/projects/${pid}/artifacts/${id}/process`,{});
  if(r.job){toast(`Processing queued (${r.job.jobId})`);setTimeout(()=>render(),500);}
  else toast(r.error||'Processing failed','err');
}
async function processAllArtifacts(){
  const pid=state.current.id;
  const r=await api('POST',`/api/v1/projects/${pid}/artifacts/process`,{onlyIncluded:true,force:true});
  if(r.queuedArtifactIds){
    const n=r.queuedArtifactIds.length;
    if(n===0){
      toast('No included artefacts to process. Add artefacts first, or check that some are marked Included.');
    }else{
      toast(`Re-processed ${n} artefact${n===1?'':'s'} ✓`);
    }
    setTimeout(()=>render(),600);
  }else{
    toast(r.error||r.message||'Processing failed','err');
  }
}
async function toggleFileActive(fname,active){
  await api('POST',`/api/projects/${state.current.id}/toggle-file`,{filename:fname,active});render();
}
async function doIngest(){
  const paths=document.getElementById('ingestPathsArea').value.split('\n').map(p=>p.trim()).filter(Boolean);
  if(!paths.length)return;
  const r=await api('POST','/api/ingest',{project_id:state.current.id,file_paths:paths});
  let html=`<div class="card"><div class="card-title">Ingested: ${r.ingested||0} file(s)</div>`;
  if(r.documents)html+=`<ul class="items">${r.documents.map(d=>`<li>✓ ${escHtml(d.filename)} (${d.source_type}, ${d.sections} sections)</li>`).join('')}</ul>`;
  if(r.errors?.length)html+=`<p style="color:var(--red);margin-top:6px">${r.errors.map(e=>`✗ ${escHtml(e.file)}: ${escHtml(e.error)}`).join('<br>')}</p>`;
  if(r.error)html+=`<p style="color:var(--red)">${r.error}</p>`;
  html+='</div>';
  document.getElementById('ingestResult').innerHTML=html;
}
</script>

<script>
// INTELLIGENCE VIEW
async function viewIntelligence(){
  if(!state.current)return viewNoProject();
  const pid=state.current.id;
  const selV=state._dashVersion||'';
  const selR=state._dashReview||'';
  let metricsUrl=`/api/projects/${pid}/hierarchy/metrics`;
  const ps=[];
  if(selV)ps.push(`version_id=${selV}`);
  if(selR)ps.push(`review_id=${selR}`);
  if(ps.length)metricsUrl+='?'+ps.join('&');
  let metrics={};
  try{metrics=await api('GET',metricsUrl);}catch(e){}

  const ds=metrics.data_source||{};

  // Load review findings when a review is scoped
  let revFindings={};
  let versionData=null;
  let intelligenceData={};

  if(ds.review){
    try{
      const rd=await api('GET',`/api/projects/${pid}/hierarchy/reviews/${ds.review}`);
      if(rd&&rd.findings)revFindings=rd.findings;
    }catch(e){}
  }

  if(ds.version){
    try{
      const vd=await api('GET',`/api/projects/${pid}/hierarchy/versions/${ds.version}`);
      if(vd)versionData=vd;
    }catch(e){}
  }

  // Always load the current intelligence.json (latest build)
  try{
    const data=await api('GET',`/api/projects/${pid}/intelligence`);
    intelligenceData=data.intelligence||data;
  }catch(e){}

  // Source priority:
  // 1. Review findings — when a review is selected, show its findings (most specific)
  // 2. intelligenceData — the full arrays from the last intelligence build
  //    (versions don't store item arrays, only stats counts, so we always read intelligenceData
  //     for the actual lists; version/review selection controls counts on Dashboard)
  const useReview=Object.keys(revFindings).length>0;
  const src=useReview?revFindings:intelligenceData;

  if(!useReview && !intelligenceData.risks && !intelligenceData.constraints && !intelligenceData.scope){
    return`<div class="card"><div class="empty"><div class="empty-icon">🧠</div>
      <p>No intelligence built yet. Go to <strong>Ingest</strong> to add artefacts and run Build Intelligence.</p>
      <button class="btn mt" onclick="goToBuildIntelligence()">Go to Build Intelligence</button></div></div>`;
  }

  // Build inline version selector so users can scope without going to Dashboard
  let versionSelector='';
  try{
    const vr=await api('GET',`/api/projects/${pid}/hierarchy/versions`);
    const allV=vr.versions||[];
    if(allV.length>1){
      const vOpts=allV.map(v=>`<option value="${v.version_id}" ${v.version_id===selV?'selected':''}>${escHtml(v.version_id)}${v.label?' – '+escHtml(v.label):''} (${fmtDateShort(v.created_at)})</option>`).join('');
      versionSelector=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap">
        <label class="fs11 c-dim">Scope version:</label>
        <select style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
          padding:4px 8px;color:var(--text);font-size:11px"
          onchange="state._dashVersion=this.value;state._dashReview='';render()">
          <option value="">Latest</option>${vOpts}
        </select>
        ${selV?`<button class="btn btn-xs btn-ghost" onclick="state._dashVersion='';state._dashReview='';render()">✕ Clear</button>`:''}
      </div>`;
    }
  }catch(e){}

  const cats=['risks','assumptions','dependencies','constraints','action_items'];
  const catIcons={
    risks:'🔴',assumptions:'💭',dependencies:'🔗',constraints:'⛔',action_items:'✅',
    design_gaps:'⚠️',recommendations:'💡',gaps:'🔍',findings:'📋',questions:'❓',concerns:'⚡'
  };

  // Scope label: what are we actually showing?
  let scopeLabel='';
  if(useReview){
    scopeLabel=`<p style="font-size:11px;color:var(--accent);margin-top:4px">
      Showing review findings: <strong>${escHtml(ds.review_persona||'')} (${escHtml(ds.review||'')})</strong>
      ${ds.version_label||ds.version?` · version <strong>${escHtml(ds.version_label||ds.version)}</strong>`:''}
    </p>`;
  }else if(selV){
    scopeLabel=`<p style="font-size:11px;color:var(--text-dim);margin-top:4px">
      Showing intelligence content · version context: <strong>${escHtml(ds.version_label||selV)}</strong>
      <span style="color:var(--text-muted)"> (run a review on this version to see its specific findings)</span>
    </p>`;
  }

  const header=`<div class="card">
    <div class="flex-between mb">
      <div class="card-title"><span class="icon">🧠</span>Project Intelligence</div>
      <div class="flex gap-sm">
        <button class="btn btn-sm btn-ghost" id="intelToggle"
          onclick="toggleExpandSection('#main details','intelToggle')">Expand All</button>
        <button class="btn btn-sm btn-outline" onclick="goToBuildIntelligence()">🔨 Rebuild</button>
      </div>
    </div>
    ${scopeLabel}
    ${versionSelector}
  </div>`;

  let html=header;
  const allCats=useReview
    ?Object.keys(revFindings).filter(k=>Array.isArray(revFindings[k]))
    :cats;
  for(const c of allCats){
    const items=src[c]||[];
    if(!items.length)continue;
    const highlighted=state._intelCategory===c;
    const icon=catIcons[c]||'📌';
    html+=`<details class="card" ${highlighted?'open':''} id="intel_${c}">
      <summary class="collapse-header" style="list-style:none;${highlighted?'border-left:3px solid var(--accent);':''};margin:-16px -18px 0;border-radius:var(--radius-lg) var(--radius-lg) 0 0">
        <span class="chevron">▶</span>
        <span>${icon}</span>
        <strong>${c.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</strong>
        <span class="tag ${highlighted?'tag-blue':''}" style="margin-left:4px">${items.length}</span>
      </summary>
      <div class="collapse-body">
        <ul class="items">${items.map(x=>`<li>${typeof x==='object'?(x.description||JSON.stringify(x)):escHtml(String(x))}</li>`).join('')}</ul>
      </div>
    </details>`;
  }
  if(intelligenceData.scope){
    html+=`<details class="card">
      <summary class="collapse-header" style="list-style:none;margin:-16px -18px 0;border-radius:var(--radius-lg) var(--radius-lg) 0 0">
        <span class="chevron">▶</span> <span>📄</span> <strong>Scope</strong>
      </summary>
      <div class="collapse-body"><p style="font-size:12px;white-space:pre-wrap;color:var(--text-dim)">${escHtml(intelligenceData.scope.slice(0,2000))}</p></div>
    </details>`;
  }
  if(state._intelCategory){
    setTimeout(()=>{
      const el=document.getElementById('intel_'+state._intelCategory);
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    },100);
  }
  state._intelCategory=null;
  return html;
}

function expandAllIntel(){document.querySelectorAll('#main details').forEach(d=>d.open=true);}
function collapseAllIntel(){document.querySelectorAll('#main details').forEach(d=>d.open=false);}

// ── Unified expand/collapse toggle ──────────────────────────────────────────
// Replaces separate expandAll*/collapseAll* functions.
// sel: CSS selector for elements to toggle (details elements use .open; file-items use class)
// btnId: id of the toggle button — its text flips between "Expand All" / "Collapse All"
function toggleExpandSection(sel,btnId){
  const btn=document.getElementById(btnId);
  const isExpanded=btn&&btn.textContent.trim()==='Collapse All';
  document.querySelectorAll(sel).forEach(el=>{
    if(el.tagName==='DETAILS'){
      el.open=!isExpanded;
    }else{
      // file-item elements
      if(isExpanded)el.classList.remove('expanded');
      else el.classList.add('expanded');
    }
  });
  if(btn)btn.textContent=isExpanded?'Expand All':'Collapse All';
}
// Legacy shims — kept so any remaining inline calls still work
function expandAllFiles(){document.querySelectorAll('.file-item').forEach(el=>el.classList.add('expanded'));}
function collapseAllFiles(){document.querySelectorAll('.file-item').forEach(el=>el.classList.remove('expanded'));}
function expandAllVersions(){document.querySelectorAll('#main details').forEach(d=>d.open=true);}
function collapseAllVersions(){document.querySelectorAll('#main details').forEach(d=>d.open=false);}
function expandAllReviews(){document.querySelectorAll('#main details').forEach(d=>d.open=true);}
function collapseAllReviews(){document.querySelectorAll('#main details').forEach(d=>d.open=false);}
</script>

<script>
// VERSIONS VIEW  –  Bug #1 Fixed: compare uses enriched allVersions
async function viewVersions(){
  if(!state.current)return viewNoProject();
  const pid=state.current.id;

  let hierarchy={};
  try{hierarchy=await api('GET',`/api/projects/${pid}/hierarchy`);}catch(e){}
  const tree=hierarchy.tree||[];
  const totalV=hierarchy.total_versions||0;
  const totalR=hierarchy.total_reviews||0;

  if(!totalV)return`<div class="card"><div class="empty">
    <div class="empty-icon">📋</div>
    <p>No versions yet. Go to <strong>Ingest</strong>, add artefacts, then use Build Intelligence to create the first snapshot.</p>
    <button class="btn mt" onclick="goToBuildIntelligence()">Go to Build Intelligence</button></div></div>`;

  // Sort control
  const sort=state._versionSort||'newest';
  const sortBar=`<div class="sort-bar">
    <span>Sort:</span>
    <button class="sort-btn ${sort==='newest'?'active':''}" onclick="setVersionSort('newest')">Newest First</button>
    <button class="sort-btn ${sort==='oldest'?'active':''}" onclick="setVersionSort('oldest')">Oldest First</button>
    <button class="sort-btn ${sort==='most-reviews'?'active':''}" onclick="setVersionSort('most-reviews')">Most Reviews</button>
  </div>`;

  // Expand/collapse all control — single toggle button
  const expandBar=`<div class="expand-bar">
    <button class="btn btn-sm btn-ghost" id="versionsToggle"
      onclick="toggleExpandSection('#main details','versionsToggle')">Expand All</button>
    <span style="margin-left:auto;color:var(--text-dim)">${totalV} versions · ${totalR} reviews</span>
  </div>`;

  // Build phase tree
  let treeHtml='';
  for(const phase of tree){
    let phaseVersions=phase.versions||[];
    if(!phaseVersions.length&&!phase.is_current)continue;

    // Apply sort
    phaseVersions=[...phaseVersions];
    if(sort==='oldest')phaseVersions.sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||''));
    else if(sort==='most-reviews')phaseVersions.sort((a,b)=>(b.reviews||[]).length-(a.reviews||[]).length);
    else phaseVersions.sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));

    const phRevCnt=phaseVersions.reduce((s,v)=>s+(v.reviews||[]).length,0);
    const isCurrent=phase.is_current;
    treeHtml+=`<details ${isCurrent?'open':''} class="card" style="${isCurrent?'border-left:3px solid var(--accent)':''}">
      <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;margin:-16px -18px 0;padding:14px 18px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;background:var(--surface)">
        <span class="chevron">▶</span>
        <strong style="font-size:13px;color:${isCurrent?'var(--accent)':'var(--text)'}">${escHtml(phase.label)}</strong>
        ${isCurrent?'<span class="tag tag-green">current</span>':''}
        <span class="tag">${phaseVersions.length} ver</span>
        <span class="tag">${phRevCnt} rev</span>
        ${phase.description?`<span class="fs11 c-muted">${escHtml(phase.description)}</span>`:''}
      </summary>
      <div style="padding-top:12px">`;

    if(!phaseVersions.length){
      treeHtml+=`<p style="font-size:12px;color:var(--text-dim);padding:8px 0">No versions in this phase yet.</p>`;
    }else{
      for(const ver of phaseVersions){
        const verRevs=ver.reviews||[];
        const activeRid=ver.active_review_id||'';
        // Compact: collapsed by default. Summary shows version id + date + review count only.
        treeHtml+=`<details style="margin:4px 0;padding-left:8px;border-left:2px solid var(--border)">
          <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:var(--radius);transition:background .15s"
            onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
            <span class="chevron">▶</span>
            <strong style="font-size:12px">${escHtml(ver.version_id)}</strong>
            ${ver.label?`<span style="color:var(--text-dim);font-size:11px">– ${escHtml(ver.label)}</span>`:''}
            <span class="fs10 c-muted">${fmtDateShort(ver.created_at)}</span>
            <span class="tag ${verRevs.length?'tag-blue':''}" class="ml-auto">${verRevs.length} review${verRevs.length===1?'':'s'}</span>
            ${activeRid?'<span class="tag tag-green" style="font-size:9px">active set</span>':''}
          </summary>
          <div style="padding:6px 0 4px 14px">
            <div class="flex gap-sm mb" style="flex-wrap:wrap">
              <button class="btn btn-xs btn-ghost" onclick="selectVersionContext('${ver.version_id}')">View on Dashboard</button>
              ${ver.stats?.risks?`<span class="tag tag-red">${ver.stats.risks} risks</span>`:''}
              <span class="fs10 c-dim">${ver.persona?escHtml(ver.persona)+' · ':''} ${escHtml(ver.ai_backend||'files_only')}</span>
            </div>`;

        if(verRevs.length){
          for(const rev of verRevs){
            const rid=rev.review_id||'';if(!rid)continue;
            const isActive=rid===activeRid;
            treeHtml+=`<div class="review-item ${isActive?'active-review':''}">
              <div class="review-item-header" onclick="toggleRevItem(this)">
                <span class="chevron">▶</span>
                <span class="tag" style="font-size:10px;padding:1px 5px;font-weight:700;background:var(--surface3)">R${rev.iteration_number||'?'}</span>
                <strong style="font-size:11px">${rid}</strong>
                ${isActive?'<span class="tag tag-green">active</span>':''}
                <span class="tag tag-purple">${escHtml(rev.persona||'–')}</span>
                ${rev.total_findings?`<span class="tag tag-yellow">${rev.total_findings} findings</span>`:''}
                <span style="font-size:10px;color:var(--text-muted);margin-left:auto">${relativeTime(rev.created_at)}</span>
              </div>
              <div class="review-item-body" style="display:none">
                ${rev.summary?`<p style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${escHtml(rev.summary.slice(0,160))}</p>`:''}
                <div class="flex gap-sm">
                  <button class="btn btn-sm btn-outline" onclick="viewReviewDetail('${rid}')">Full Details</button>
                  ${!isActive?`<button class="btn btn-sm btn-ghost" onclick="setActiveReview('${ver.version_id}','${rid}')">Set Active</button>`:''}
                  <button class="btn btn-sm btn-red" onclick="deleteReview('${rid}')">Delete</button>
                </div>
              </div>
            </div>`;
          }
        }else{
          treeHtml+=`<p class="fs11 c-muted">No reviews yet.</p>`;
        }
        treeHtml+=`</div></details>`;
      }
    }
    treeHtml+=`</div></details>`;
  }

  // ── Compare Versions (BUG #1 FIX: use enriched allVersions from hierarchy list)
  // allVersions is already loaded from the hierarchy tree above – includes live review_count + active_review
  const allVersions=[];
  for(const phase of tree){
    for(const ver of(phase.versions||[])){
      allVersions.push(ver);
    }
  }
  // Sort newest first for dropdown
  allVersions.sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));

  let compareHtml='';
  if(allVersions.length>=2){
    const mkOpts=(vers)=>vers.map(v=>`<option value="${v.version_id}">${escHtml(formatVersionOption(v))}</option>`).join('');
    const optsAsc=[...allVersions].reverse();
    compareHtml=`<div class="card">
      <div class="card-title mb"><span class="icon">⚖️</span>Compare Versions</div>
      <p class="card-subtitle">Compare intelligence output and review findings between any two versions.</p>
      <div class="flex mb">
        <select id="cmpA" style="flex:1">${mkOpts(optsAsc)}</select>
        <span style="color:var(--text-muted);font-weight:700">→</span>
        <select id="cmpB" style="flex:1">${mkOpts(allVersions)}</select>
        <button class="btn" onclick="compareVersions()">Compare</button>
      </div>
      <div id="cmpResult"></div>
    </div>`;
  }

  return`<div class="card">
    <div class="flex-between mb">
      <div class="card-title"><span class="icon">📋</span>Project History</div>
    </div>
    ${sortBar}
    ${expandBar}
  </div>`+treeHtml+compareHtml;
}

<script>
// COMPARE VERSIONS (enriched diff display)
async function compareVersions(){
  const a=document.getElementById('cmpA').value;
  const b=document.getElementById('cmpB').value;
  const el=document.getElementById('cmpResult');
  if(a===b){el.innerHTML='<p style="color:var(--yellow)">⚠ Select two different versions.</p>';return;}
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Comparing…</span>';
  const pid=state.current.id;

  const r=await api('POST',`/api/projects/${pid}/compare-versions`,{version_a:a,version_b:b});
  if(r.error){el.innerHTML=`<p style="color:var(--red)">${escHtml(r.error)}</p>`;return;}

  const cats=r.categories||{};
  const s=r.summary||{};

  // Trend badge
  const trendMap={improving:'tag-green',risks_increasing:'tag-red',complexity_increasing:'tag-yellow',stable:''};
  const trendTag=`<span class="tag ${trendMap[s.trend]||''}">${s.trend||'–'}</span>`;

  let html=`<div class="diff-card">
    <div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <strong style="font-size:12px">${escHtml(a)}</strong>
      <span style="color:var(--text-muted)">→</span>
      <strong style="font-size:12px">${escHtml(b)}</strong>
      ${trendTag}
      <span style="margin-left:auto;font-size:11px;color:var(--text-dim)">
        <span style="color:var(--green)">+${s.total_added||0} added</span> &nbsp;
        <span style="color:var(--red)">–${s.total_removed||0} removed</span>
      </span>
    </div>`;

  const catIcons={risks:'🔴',assumptions:'💭',dependencies:'🔗',constraints:'⛔',action_items:'✅'};
  for(const[cat,data]of Object.entries(cats)){
    const net=data.net_change||0;
    const netCol=net>0?'var(--red)':net<0?'var(--green)':'var(--text-dim)';
    const arrow=net>0?'↑':net<0?'↓':'→';
    const added=data.added||[];
    const removed=data.removed||[];
    const hasChanges=added.length||removed.length;
    html+=`<details ${hasChanges?'open':''} style="border-bottom:1px solid var(--border)">
      <summary class="diff-cat-header">
        <span class="chevron">▶</span>
        <span>${catIcons[cat]||'📌'}</span>
        <strong style="font-size:12px;text-transform:capitalize">${cat.replace(/_/g,' ')}</strong>
        <span class="diff-count">${data.count_before} → ${data.count_after}</span>
        <span style="font-size:12px;font-weight:700;color:${netCol}">${arrow} ${Math.abs(net)}</span>
        ${hasChanges?'':'<span style="font-size:11px;color:var(--text-muted);margin-left:4px">no changes</span>'}
      </summary>
      <div class="diff-cat-body">
        ${added.length?`<div style="margin-bottom:4px">
          <p style="font-size:10px;color:var(--text-muted);margin-bottom:3px">ADDED (${added.length})</p>
          ${added.slice(0,6).map(i=>'<div class="diff-added">'+escHtml(String(i).slice(0,120))+'</div>').join('')}
          ${added.length>6?('<p style="font-size:10px;color:var(--text-muted);margin-top:2px">… and '+(added.length-6)+' more</p>'):''}
        </div>`:''}
        ${removed.length?`<div>
          <p style="font-size:10px;color:var(--text-muted);margin-bottom:3px">REMOVED (${removed.length})</p>
          ${removed.slice(0,6).map(i=>'<div class="diff-removed">'+escHtml(String(i).slice(0,120))+'</div>').join('')}
          ${removed.length>6?('<p style="font-size:10px;color:var(--text-muted);margin-top:2px">… and '+(removed.length-6)+' more</p>'):''}
        </div>`:''}
        ${!hasChanges?`<p class="fs11 c-muted">No changes in this category.</p>`:''}
      </div>
    </details>`;
  }
  html+=`<div style="padding:8px 14px;font-size:11px;color:var(--text-dim)">
    Compare: ${fmtDate(r.timestamp_a)} → ${fmtDate(r.timestamp_b)}
  </div></div>`;
  el.innerHTML=html;
}
</script>

/**
 * Render the persona-aware PM Coverage Assessment block.
 * @param {Object} review - Full review object from API
 * @returns {string} HTML string
 */
function renderCoverageAssessment(review){
  const personaId=(review.persona||'').toLowerCase().replace(/\s+/g,'_');

  // Build dimensions: shared baseline + persona-specific
  const personaDims=COVERAGE_PERSONA[personaId]||[];
  const allDims=[...COVERAGE_BASELINE,...personaDims];

  // Deduplicate by id (in case of overlap)
  const seen=new Set();
  const dims=allDims.filter(d=>seen.has(d.id)?false:(seen.add(d.id),true));

  // Build corpus to search
  const corpus=(
    Object.values(review.findings||{}).flat().join(' ')+' '+
    (review.questions||[]).join(' ')+' '+
    (review.summary||'')
  ).toLowerCase();

  const covered=dims.filter(d=>d.keywords.some(kw=>corpus.includes(kw)));
  const missing=dims.filter(d=>!d.keywords.some(kw=>corpus.includes(kw)));
  const score=covered.length;
  const total=dims.length;
  const pct=Math.round(score/total*100);
  const barColor=pct>=80?'var(--green)':pct>=50?'var(--yellow)':'var(--red)';
  const scoreTag=pct>=80?'tag-green':pct>=50?'tag-yellow':'tag-red';

  // Persona label for heading
  const personaLabel=review.persona?`for ${escHtml(review.persona)}`:'';

  return`<div class="mb">
    <div class="flex-between" style="margin-bottom:4px">
      <p class="card-section" style="margin:0">📊 Coverage Assessment ${personaLabel}</p>
      <span class="tag ${scoreTag}">${score}/${total} areas covered</span>
    </div>
    <div class="coverage-bar-outer">
      <div class="coverage-bar-inner" style="width:${pct}%;background:${barColor}"></div>
    </div>
    <div class="coverage-pills">
      ${covered.map(d=>`<span class="coverage-pill covered" title="${d.keywords.slice(0,3).join(', ')}">${d.icon} ${escHtml(d.label)}</span>`).join('')}
      ${missing.map(d=>`<span class="coverage-pill missing" title="Not detected: ${d.keywords.slice(0,3).join(', ')}">${d.icon} ${escHtml(d.label)}</span>`).join('')}
    </div>
    ${missing.length?`<p style="font-size:11px;color:var(--text-muted);margin-top:4px">
      ⬆️ Consider adding context on: ${missing.slice(0,4).map(d=>escHtml(d.label)).join(', ')}${missing.length>4?' and more':''}
    </p>`:'<p style="font-size:11px;color:var(--green);margin-top:4px">✓ All key areas detected in this review</p>'}
  </div>`;
}
