<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Delivery Accelerator v3</title>
<style>
:root {
  --bg: #0f1419; --surface: #1a2332; --surface2: #243447;
  --border: #2d4055; --text: #e6edf3; --text-dim: #8b949e;
  --accent: #58a6ff; --accent2: #3fb950; --warn: #d29922; --danger: #f85149;
  --radius: 8px; --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5; }
header { background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 10px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
header h1 { font-size: 16px; font-weight: 600; white-space:nowrap; }
header .phase-badge { background: var(--accent); color:#000; padding:2px 10px;
  border-radius: 12px; font-size: 11px; font-weight: 600; }
.proj-select { background:var(--surface2); border:1px solid var(--border);
  color:var(--text); padding:5px 10px; border-radius:var(--radius); font-size:12px; }
nav { display:flex; gap:3px; margin-left:auto; flex-wrap:wrap; }
nav button { background:transparent; color:var(--text-dim); border:none;
  padding:7px 12px; border-radius:var(--radius); cursor:pointer; font-size:12px; }
nav button:hover, nav button.active { background:var(--surface2); color:var(--accent); }
main { max-width:1100px; margin:0 auto; padding:20px; }
</style>
</head>
<body>
<div id="app">
  <header id="header"></header>
  <main id="main"></main>
</div>

<style>
.card { background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:18px; margin-bottom:14px; }
.card h2 { font-size:14px; margin-bottom:10px; color:var(--accent); }
.card h3 { font-size:12px; margin:10px 0 5px; color:var(--text-dim); }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; }
.stat { text-align:center; padding:10px; background:var(--surface2); border-radius:var(--radius); }
.stat .num { font-size:24px; font-weight:700; color:var(--accent); }
.stat .label { font-size:10px; color:var(--text-dim); text-transform:uppercase; }
ul.items { list-style:none; }
ul.items li { padding:5px 0; border-bottom:1px solid var(--border); font-size:12px; }
ul.items li:last-child { border:none; }
.btn { background:var(--accent); color:#000; border:none; padding:7px 14px;
  border-radius:var(--radius); cursor:pointer; font-size:12px; font-weight:600; }
.btn:hover { opacity:0.85; }
.btn-outline { background:transparent; color:var(--accent); border:1px solid var(--accent); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn-warn { background:var(--warn); color:#000; }
.btn-danger { background:var(--danger); color:#fff; }
input,select,textarea { background:var(--surface2); border:1px solid var(--border);
  color:var(--text); padding:7px 10px; border-radius:var(--radius); font-size:12px; width:100%; }
select { width:auto; min-width:140px; }
textarea { resize:vertical; min-height:60px; font-family:inherit; }
.form-row { margin-bottom:10px; }
.form-row label { display:block; font-size:11px; color:var(--text-dim); margin-bottom:3px; }
.flex { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.mt { margin-top:10px; }
.empty { text-align:center; padding:32px; color:var(--text-dim); }
.tag { display:inline-block; background:var(--surface2); padding:2px 8px;
  border-radius:10px; font-size:10px; margin:2px; }
.tag-ok { border:1px solid var(--accent2); color:var(--accent2); }
.tag-off { border:1px solid var(--text-dim); color:var(--text-dim); }
.findings-section { margin:8px 0; }
.findings-section .title { font-size:11px; font-weight:600; color:var(--text-dim);
  margin-bottom:3px; text-transform:uppercase; }
.findings-section li { font-size:12px; padding:3px 0; }
.prompt-box { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
  padding:10px; font-family:monospace; font-size:11px; white-space:pre-wrap;
  max-height:300px; overflow-y:auto; margin-top:8px; color:var(--text-dim); }
.collapsible summary { cursor:pointer; font-size:12px; color:var(--accent); margin-top:8px; }
.backend-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:6px; margin-top:8px; }
.backend-chip { padding:6px 10px; border-radius:var(--radius); font-size:11px;
  background:var(--surface2); border:1px solid var(--border); text-align:center; }
.backend-chip.available { border-color:var(--accent2); }
/* File Explorer */
.file-explorer { border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
.file-item { border-bottom:1px solid var(--border); }
.file-item:last-child { border-bottom:none; }
.file-header { display:flex; align-items:center; gap:8px; padding:10px 12px; cursor:pointer;
  font-size:12px; transition:background 0.15s; }
.file-header:hover { background:var(--surface2); }
.file-chevron { font-size:9px; color:var(--text-dim); transition:transform 0.2s; width:12px; }
.file-item.expanded .file-chevron { transform:rotate(90deg); }
.file-icon { font-size:14px; }
.file-name { font-weight:600; color:var(--text); }
.file-body { display:none; padding:0 12px 10px 34px; }
.file-item.expanded .file-body { display:block; }
.file-section { padding:3px 0; font-size:11px; color:var(--text-dim);
  border-left:2px solid var(--border); padding-left:8px; margin:3px 0; }
.section-title { color:var(--text); font-weight:500; }
.file-toggle { font-size:10px; padding:3px 8px; border-radius:10px; cursor:pointer;
  margin-left:auto; font-weight:600; user-select:none; white-space:nowrap; }
.toggle-on { background:rgba(63,185,80,0.15); color:var(--accent2); border:1px solid var(--accent2); }
.toggle-off { background:rgba(248,81,73,0.1); color:var(--danger); border:1px solid var(--danger); }
</style>

<script>
// ─── API Helper ───
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  try { const r = await fetch(path, opts); return r.json(); }
  catch(e) { return {error: e.message}; }
}

// ─── State ───
let state = { projects:[], current:null, tab:'dashboard', backends:[], adminConfig:{}, health:{} };
const TABS = ['dashboard','ingest','intelligence','versions','reviews','proposals','phases','admin'];

// ─── Header ───
function renderHeader() {
  const proj = state.current;
  const phase = proj ? proj.phase : '';
  const options = state.projects.map(p =>
    `<option value="${p.id}" ${p.id===(proj?.id)?'selected':''}>${p.name}</option>`
  ).join('');
  document.getElementById('header').innerHTML = `
    <h1>Accelerator</h1>
    ${phase ? `<span class="phase-badge">${phase}</span>` : ''}
    ${state.projects.length ? `<select class="proj-select" onchange="selectProject(this.value)">${options}</select>` : '<span style="color:var(--text-dim);font-size:12px">No projects</span>'}
    <nav>${TABS.map(t=>`<button class="${state.tab===t?'active':''}" onclick="switchTab('${t}')">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}
      <button class="${state.tab==='settings'?'active':''}" onclick="switchTab('settings')">⚙</button>
    </nav>`;
}

function switchTab(tab) { state.tab = tab; render(); }

async function render() {
  renderHeader();
  const main = document.getElementById('main');
  const views = {
    dashboard: viewDashboard, ingest: viewIngest, intelligence: viewIntelligence,
    versions: viewVersions, reviews: viewReviews, proposals: viewProposals,
    phases: viewPhases, settings: viewSettings, admin: viewAdmin
  };
  main.innerHTML = await (views[state.tab] || viewDashboard)();
}
</script>

<script>
// ─── Dashboard View ───
async function viewDashboard() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;
  let intel = {}, versions = [];
  try { const r = await api('GET',`/api/projects/${pid}/intelligence`); intel = r.intelligence || r; } catch(e){}
  try { const r = await api('GET',`/api/projects/${pid}/versions`); versions = r.versions||[]; } catch(e){}
  const meta = intel._build_metadata || {};
  const backendHtml = state.backends.map(b =>
    `<div class="backend-chip ${b.available?'available':''}">${b.available?'●':'○'} ${b.name}</div>`
  ).join('');
  return `
    <div class="grid">
      <div class="stat"><div class="num">${meta.total_risks||0}</div><div class="label">Risks</div></div>
      <div class="stat"><div class="num">${meta.total_constraints||0}</div><div class="label">Constraints</div></div>
      <div class="stat"><div class="num">${meta.total_dependencies||0}</div><div class="label">Dependencies</div></div>
      <div class="stat"><div class="num">${meta.total_assumptions||0}</div><div class="label">Assumptions</div></div>
      <div class="stat"><div class="num">${meta.total_action_items||0}</div><div class="label">Actions</div></div>
      <div class="stat"><div class="num">${versions.length}</div><div class="label">Versions</div></div>
    </div>
    <div class="card mt"><h2>Quick Actions</h2>
      <div class="flex mt">
        <button class="btn" onclick="switchTab('ingest')">Ingest Files</button>
        <button class="btn btn-outline" onclick="buildContext()">Build Intelligence</button>
        <button class="btn btn-outline" onclick="switchTab('reviews')">Run Review</button>
      </div>
    </div>
    <div class="card"><h2>AI Backends</h2><div class="backend-grid">${backendHtml}</div></div>
    ${intel.risks?.length ? `<div class="card"><h2>Top Risks</h2><ul class="items">${intel.risks.slice(0,5).map(r=>`<li>${r}</li>`).join('')}</ul></div>` : ''}
    ${intel.action_items?.length ? `<div class="card"><h2>Action Items</h2><ul class="items">${intel.action_items.slice(0,5).map(a=>`<li>${a}</li>`).join('')}</ul></div>` : ''}`;
}

function viewNoProject() {
  return `<div class="card"><h2>Getting Started</h2>
    <p style="color:var(--text-dim);margin-bottom:14px;font-size:13px">Create a project to begin. Upload documents, build intelligence, then run AI reviews.</p>
    <div class="form-row"><label>Project Name</label><input id="newName" placeholder="e.g. Cloud Migration Assessment"></div>
    <div class="form-row"><label>Description</label><input id="newDesc" placeholder="Optional description"></div>
    <button class="btn" onclick="createProject()">Create Project</button>
    ${state.projects.length ? `<h3 class="mt">Existing Projects</h3><ul class="items">${state.projects.map(p=>`<li><a href="#" onclick="selectProject('${p.id}')" style="color:var(--accent)">${p.name}</a> <span class="tag">${p.phase}</span></li>`).join('')}</ul>` : ''}
  </div>`;
}
</script>

<script>
// ─── Ingest View ───
async function viewIngest() {
  if (!state.current) return viewNoProject();
  const ctx = await api('GET',`/api/projects/${state.current.id}/context`);
  const docs = ctx.documents || [];
  const toggles = ctx.file_toggles || {};
  const ingestForm = `<div class="card"><h2>Ingest Documents</h2>
    <p style="color:var(--text-dim);font-size:12px;margin-bottom:10px">Enter file paths (one per line) relative to project root. Supports: .txt, .md, .csv, .eml</p>
    <div class="form-row"><label>File Paths</label>
      <textarea id="ingestPaths" rows="4" placeholder="sample_data/scope.txt&#10;sample_data/scope_cpg.txt"></textarea>
    </div>
    <button class="btn" onclick="doIngest()">Ingest Files</button>
    <div id="ingestResult" class="mt"></div></div>`;

  if (!docs.length) return ingestForm;

  // Build file explorer with expandable rows and toggles
  const fileRows = docs.map((d, i) => {
    const fname = d.filename || d.metadata?.filename || `doc-${i}`;
    const srcType = d.metadata?.source_type || 'unknown';
    const words = d.metadata?.word_count || 0;
    const sections = d.sections || [];
    const sectionCount = sections.length;
    const ingestedAt = d.metadata?.ingested_at || d.metadata?.created_at || '';
    const isActive = toggles[fname] !== false; // default active
    const toggleClass = isActive ? 'toggle-on' : 'toggle-off';
    const toggleLabel = isActive ? 'Included' : 'Excluded';

    const sectionHtml = sections.length ? sections.map(s =>
      `<div class="file-section"><span class="section-title">${escHtml(s.title || s.heading || 'Section')}</span> <span style="color:var(--text-dim);font-size:10px">${(s.content||'').length} chars</span></div>`
    ).join('') : '<div style="font-size:11px;color:var(--text-dim);padding:4px 0">No section data available</div>';

    return `<div class="file-item">
      <div class="file-header" onclick="toggleFileExpand(this)">
        <span class="file-chevron">▶</span>
        <span class="file-icon">${srcType==='csv'?'📊':srcType==='email'?'📧':srcType==='transcript'?'🎙️':'📄'}</span>
        <span class="file-name">${escHtml(fname)}</span>
        <span class="tag">${srcType}</span>
        <span style="font-size:10px;color:var(--text-dim)">${words} words · ${sectionCount} sections</span>
        ${ingestedAt ? `<span style="font-size:10px;color:var(--text-dim);margin-left:auto">${ingestedAt.slice(0,16)}</span>` : ''}
        <span class="file-toggle ${toggleClass}" onclick="event.stopPropagation();toggleFileActive('${escHtml(fname)}',${!isActive})">${toggleLabel}</span>
      </div>
      <div class="file-body">${sectionHtml}</div>
    </div>`;
  }).join('');

  const activeCount = docs.filter(d => toggles[(d.filename||d.metadata?.filename||'')] !== false).length;

  return ingestForm + `<div class="card"><h2>Ingested Documents (${docs.length})</h2>
    <p style="font-size:11px;color:var(--text-dim);margin-bottom:10px">${activeCount} of ${docs.length} files included in next review cycle. Toggle to exclude/include.</p>
    <div class="file-explorer">${fileRows}</div></div>`;
}

function toggleFileExpand(el) {
  const item = el.closest('.file-item');
  item.classList.toggle('expanded');
}

async function toggleFileActive(filename, active) {
  await api('POST', `/api/projects/${state.current.id}/toggle-file`, {filename, active});
  render();
}

async function doIngest() {
  const paths = document.getElementById('ingestPaths').value.split('\n').map(p=>p.trim()).filter(Boolean);
  if (!paths.length) return;
  const r = await api('POST','/api/ingest',{project_id:state.current.id,file_paths:paths});
  let html = `<div class="card"><h3>Ingested: ${r.ingested||0} file(s)</h3>`;
  if (r.documents) html += `<ul class="items">${r.documents.map(d=>`<li>✓ ${d.filename} (${d.source_type}, ${d.sections} sections, ${d.word_count} words)</li>`).join('')}</ul>`;
  if (r.errors?.length) html += `<p style="color:var(--danger);margin-top:6px">${r.errors.map(e=>`✗ ${e.file}: ${e.error}`).join('<br>')}</p>`;
  if (r.error) html += `<p style="color:var(--danger)">${r.error}</p>`;
  html += '</div>';
  document.getElementById('ingestResult').innerHTML = html;
}

// ─── Intelligence View ───
async function viewIntelligence() {
  if (!state.current) return viewNoProject();
  const data = await api('GET',`/api/projects/${state.current.id}/intelligence`);
  const i = data.intelligence || data;
  if (!i.risks && !i.constraints && !i.scope) return `<div class="card empty"><p>No intelligence built yet.</p><button class="btn mt" onclick="buildContext()">Build Now</button></div>`;
  const cats = ['risks','assumptions','dependencies','constraints','action_items'];
  return `<div class="card"><h2>Project Intelligence</h2>
    <div class="flex"><button class="btn btn-sm btn-outline" onclick="buildContext()">Rebuild</button>
    <button class="btn btn-sm btn-outline" onclick="switchTab('versions')">View Versions</button></div></div>` +
    cats.map(c => { const items = i[c]||[]; if(!items.length) return '';
      return `<div class="card"><h2>${c.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())} (${items.length})</h2><ul class="items">${items.map(x=>`<li>${typeof x==='object'?(x.description||JSON.stringify(x)):x}</li>`).join('')}</ul></div>`;
    }).join('') + (i.scope?`<div class="card"><h2>Scope</h2><p style="font-size:12px;white-space:pre-wrap">${i.scope.slice(0,1500)}</p></div>`:'');
}
</script>

<script>
// ─── Versions View ───
async function viewVersions() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;
  const r = await api('GET',`/api/projects/${pid}/versions`);
  const versions = r.versions || [];
  if (!versions.length) return `<div class="card empty"><p>No versions yet. Build intelligence first.</p><button class="btn mt" onclick="buildContext()">Build Intelligence</button></div>`;
  return `<div class="card"><h2>Context Versions (${versions.length})</h2>
    <ul class="items">${versions.map(v=>`<li><strong>${v.version_id}</strong> ${v.label?'– '+v.label:''} <span class="tag">${v.timestamp?.slice(0,16)||''}</span>
      <span style="font-size:11px;color:var(--text-dim)">risks:${v.stats?.risks||0} deps:${v.stats?.dependencies||0} docs:${v.stats?.document_count||0}</span></li>`).join('')}</ul></div>
    ${versions.length >= 2 ? `<div class="card"><h2>Compare Versions</h2>
      <div class="flex">
        <select id="cmpA">${versions.map(v=>`<option value="${v.version_id}">${v.version_id} ${v.label||''}</option>`).join('')}</select>
        <span style="color:var(--text-dim)">vs</span>
        <select id="cmpB">${versions.slice().reverse().map(v=>`<option value="${v.version_id}">${v.version_id} ${v.label||''}</option>`).join('')}</select>
        <button class="btn btn-sm" onclick="compareVersions()">Compare</button>
      </div><div id="cmpResult" class="mt"></div></div>` : ''}`;
}

async function compareVersions() {
  const a = document.getElementById('cmpA').value;
  const b = document.getElementById('cmpB').value;
  if (a===b) { document.getElementById('cmpResult').innerHTML='<p style="color:var(--warn)">Select different versions</p>'; return; }
  const r = await api('POST',`/api/projects/${state.current.id}/compare-versions`,{version_a:a,version_b:b});
  if (r.error) { document.getElementById('cmpResult').innerHTML=`<p style="color:var(--danger)">${r.error}</p>`; return; }
  const cats = r.categories || {};
  let html = '<div class="card mt"><h3>Changes: '+a+' → '+b+'</h3>';
  for (const [cat, data] of Object.entries(cats)) {
    const dir = data.net_change>0?'↑':data.net_change<0?'↓':'→';
    html += `<div style="margin:6px 0;font-size:12px"><strong>${cat}</strong> ${data.count_before}→${data.count_after} ${dir} (${data.net_change>=0?'+':''}${data.net_change})`;
    if (data.added?.length) html += data.added.slice(0,3).map(i=>`<div style="color:var(--accent2);margin-left:12px">+ ${i.slice(0,80)}</div>`).join('');
    if (data.removed?.length) html += data.removed.slice(0,3).map(i=>`<div style="color:var(--danger);margin-left:12px">- ${i.slice(0,80)}</div>`).join('');
    html += '</div>';
  }
  const s = r.summary||{};
  html += `<p class="mt" style="font-size:11px;color:var(--text-dim)">Trend: ${s.trend||'?'} | +${s.total_added||0} added, -${s.total_removed||0} removed</p></div>`;
  document.getElementById('cmpResult').innerHTML = html;
}
</script>

<script>
// ─── Reviews View ───
async function viewReviews() {
  if (!state.current) return viewNoProject();
  const personas = await api('POST','/api/personas');
  const history = await api('GET',`/api/projects/${state.current.id}/reviews`);
  const reviews = history.reviews || [];
  const backendOpts = state.backends.map(b=>`<option value="${b.name}">${b.display_name} ${b.available?'':'(not configured)'}</option>`).join('');
  return `<div class="card"><h2>Run Persona Review</h2>
    <div class="flex">
      <select id="personaSelect">${(personas.personas||[]).map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select>
      <select id="backendSelect">${backendOpts}</select>
      <button class="btn" onclick="runReview()">Run Review</button>
    </div>
    <div class="form-row mt"><label>Custom Prompt (optional – additional context for AI)</label>
      <textarea id="customPrompt" rows="3" placeholder="e.g. Budget is capped at 500K. Must use only AWS services. Team has 3 senior engineers."></textarea>
    </div>
    <div id="reviewResult" class="mt"></div></div>` +
    (reviews.length ? `<div class="card"><h2>Review History (${reviews.length})</h2><ul class="items">${reviews.map(r=>`<li><strong>${r.persona}</strong> ${r.timestamp?.slice(0,16)||''} <span class="tag">${r.ai_backend}</span> ${r.total_findings||0} findings</li>`).join('')}</ul></div>` : '');
}

async function runReview() {
  const persona = document.getElementById('personaSelect').value;
  const backend = document.getElementById('backendSelect').value;
  const custom = document.getElementById('customPrompt').value.trim();
  document.getElementById('reviewResult').innerHTML = '<p style="color:var(--text-dim)">Running review...</p>';
  const body = {project_id:state.current.id, persona, ai_backend:backend};
  if (custom) body.custom_prompt = custom;
  const r = await api('POST','/api/review', body);
  if (r.error) { document.getElementById('reviewResult').innerHTML=`<p style="color:var(--danger)">${r.error}</p>`; return; }
  let html = `<div class="card"><h3>${r.persona} <span class="tag">${r.ai_backend}</span></h3>
    <p style="font-size:11px;color:var(--text-dim)">${r.summary||''}</p>`;
  if (r.ai_metadata?.tokens_used) html += `<p style="font-size:11px;color:var(--accent2)">Tokens: ${r.ai_metadata.tokens_used} | Latency: ${r.ai_metadata.latency_ms}ms</p>`;
  for (const [s, items] of Object.entries(r.findings||{})) {
    if (items.length) html += `<div class="findings-section"><div class="title">${s.replace(/_/g,' ')}</div><ul class="items">${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
  }
  if (r.questions?.length) html += `<div class="findings-section"><div class="title">Open Questions</div><ul class="items">${r.questions.map(q=>`<li>? ${q}</li>`).join('')}</ul></div>`;
  if (r.prompt_used) html += `<details class="collapsible"><summary>View Prompt Sent to AI</summary><div class="prompt-box">${escHtml(r.prompt_used)}</div></details>`;
  if (r.raw_output) html += `<details class="collapsible"><summary>View Raw AI Output</summary><div class="prompt-box">${escHtml(r.raw_output)}</div></details>`;
  html += '</div>';
  document.getElementById('reviewResult').innerHTML = html;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>

<script>
// ─── Proposals View ───
async function viewProposals() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;
  let proposal = null;
  try { proposal = await api('GET',`/api/projects/${pid}/proposal`); } catch(e){}
  if (!proposal || proposal.error) {
    return `<div class="card"><h2>Create Proposal</h2>
      <div class="form-row"><label>Proposal Name</label><input id="propName" placeholder="Cloud Migration Proposal"></div>
      <div class="form-row"><label>Client</label><input id="propClient" placeholder="Client name"></div>
      <div class="form-row"><label>Notes</label><textarea id="propNotes" rows="2" placeholder="Initial notes"></textarea></div>
      <button class="btn" onclick="createProposal()">Create Proposal</button></div>`;
  }
  const versions = proposal.versions || [];
  return `<div class="card"><h2>${proposal.proposal_name}</h2>
    <p style="font-size:12px;color:var(--text-dim)">Client: ${proposal.client||'-'} | Versions: ${proposal.total_versions} | Current: ${proposal.current_version}</p>
    <button class="btn btn-sm btn-outline mt" onclick="addProposalVersion()">+ Add Version</button></div>
    ${versions.length?`<div class="card"><h2>Versions</h2><ul class="items">${versions.map(v=>`<li><strong>${v.version_id}</strong> ${v.label||''} <span class="tag">${v.status}</span> ${v.created_at?.slice(0,16)||''}</li>`).join('')}</ul></div>`:''}`;
}

async function createProposal() {
  const name = document.getElementById('propName').value;
  const client = document.getElementById('propClient').value;
  const notes = document.getElementById('propNotes').value;
  if (!name) return;
  await api('POST',`/api/projects/${state.current.id}/proposal`,{name,client,notes});
  render();
}
async function addProposalVersion() {
  const label = prompt('Version label:','Revised');
  const changes = prompt('What changed:','');
  if (!label) return;
  await api('POST',`/api/projects/${state.current.id}/proposal/version`,{label,changes});
  render();
}

// ─── Phases View ───
async function viewPhases() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;
  const phases = ['discovery','proposal','planning','execution','review'];
  const current = state.current.phase || 'discovery';
  let history = [];
  try { const r = await api('GET',`/api/projects/${pid}/phase-history`); history = r.history||[]; } catch(e){}
  const phaseBar = phases.map(p => {
    const active = p === current;
    const passed = phases.indexOf(p) < phases.indexOf(current);
    const style = active ? 'background:var(--accent);color:#000' : passed ? 'background:var(--accent2);color:#000' : 'background:var(--surface2)';
    return `<span style="padding:5px 12px;border-radius:var(--radius);font-size:11px;${style}">${p}</span>`;
  }).join('<span style="color:var(--text-dim)">→</span>');
  return `<div class="card"><h2>Project Phase</h2><div class="flex mt">${phaseBar}</div>
    <div class="flex mt">
      <select id="nextPhase">${phases.filter(p=>p!==current).map(p=>`<option value="${p}">${p}</option>`).join('')}</select>
      <input id="phaseReason" placeholder="Reason for transition" style="flex:1">
      <button class="btn btn-sm" onclick="doTransition()">Transition</button>
    </div><div id="phaseResult" class="mt"></div></div>` +
    (history.length ? `<div class="card"><h2>Phase History</h2><ul class="items">${history.map(h=>`<li><strong>${h.phase}</strong> – ${h.entered_at?.slice(0,16)||''} ${h.duration?'('+h.duration+')':''} ${h.is_current?' ← current':''} ${h.reason?'– '+h.reason:''}</li>`).join('')}</ul></div>` : '');
}

async function doTransition() {
  const phase = document.getElementById('nextPhase').value;
  const reason = document.getElementById('phaseReason').value;
  const r = await api('POST',`/api/projects/${state.current.id}/phase`,{new_phase:phase,reason});
  if (r.error) { document.getElementById('phaseResult').innerHTML=`<p style="color:var(--danger)">${r.error}</p>`; return; }
  state.current.phase = phase; render();
}
</script>

<script>
// ─── Settings View ───
async function viewSettings() {
  const r = await api('GET','/api/projects/all');
  state.allProjects = r.projects || state.projects;
  const backendHtml = state.backends.map(b =>
    `<div class="backend-chip ${b.available?'available':''}">${b.available?'●':'○'} <strong>${b.name}</strong><br><span style="font-size:10px">${b.display_name}</span></div>`
  ).join('');
  const projectActions = state.current ? `<div class="card"><h2>Project Actions</h2>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:10px">Current: <strong>${state.current.name}</strong> (${state.current.id})</p>
    <div class="flex">
      <button class="btn btn-sm btn-warn" onclick="archiveProject()">Archive Project</button>
      <button class="btn btn-sm btn-danger" onclick="deleteProject()">Delete Project</button>
    </div>
    <p style="font-size:10px;color:var(--text-dim);margin-top:8px">Both actions require PIN (default: 1234)</p></div>` : '';
  return `<div class="card"><h2>Create New Project</h2>
    <div class="form-row"><label>Project Name</label><input id="newName" placeholder="Project name"></div>
    <div class="form-row"><label>Description</label><input id="newDesc" placeholder="Description"></div>
    <button class="btn" onclick="createProject()">Create</button></div>
    ${projectActions}
    ${state.projects.length ? `<div class="card"><h2>All Projects</h2><ul class="items">${state.allProjects.map(p=>`<li><a href="#" onclick="selectProject('${p.id}')" style="color:var(--accent)">${p.name}</a> <span class="tag">${p.phase}</span> (${p.file_count} files) ${p.status==='archived'?'<span class="tag" style="border:1px solid var(--warn);color:var(--warn)">archived</span>':''}</li>`).join('')}</ul></div>` : ''}
    <div class="card"><h2>AI Backends Status</h2><div class="backend-grid">${backendHtml}</div>
      <p class="mt" style="font-size:11px;color:var(--text-dim)">Configure via environment variables:<br>
        GROQ_API_KEY (free) | OPENROUTER_API_KEY (free) | GEMINI_API_KEY | AWS credentials for Bedrock</p></div>`;
}

async function archiveProject() {
  if (!state.current) return;
  const pin = prompt('Enter PIN to archive this project:');
  if (!pin) return;
  const r = await api('POST', `/api/projects/${state.current.id}/archive`, {pin});
  if (r.error) { alert('Error: ' + r.error); return; }
  alert(r.message || 'Project archived');
  await loadProjects();
  state.current = state.projects[0] || null;
  state.tab = 'dashboard';
  render();
}

async function deleteProject() {
  if (!state.current) return;
  if (!confirm(`Permanently delete "${state.current.name}"? This cannot be undone.`)) return;
  const pin = prompt('Enter PIN to permanently delete:');
  if (!pin) return;
  const r = await api('POST', `/api/projects/${state.current.id}/delete`, {pin});
  if (r.error) { alert('Error: ' + r.error); return; }
  alert(r.message || 'Project deleted');
  await loadProjects();
  state.current = state.projects[0] || null;
  state.tab = 'dashboard';
  render();
}

// ─── Actions ───
async function createProject() {
  const name = document.getElementById('newName').value;
  const desc = document.getElementById('newDesc')?.value || '';
  if (!name) return;
  const r = await api('POST','/api/projects',{name, description:desc});
  if (r.project) { await loadProjects(); state.current = state.projects.find(p=>p.id===r.project.id)||r.project; state.tab='dashboard'; render(); }
  else if (r.error) alert(r.error);
}

async function selectProject(id) {
  state.current = state.projects.find(x=>x.id===id) || state.current;
  state.tab = 'dashboard'; render();
}

async function buildContext() {
  if (!state.current) return;
  const label = prompt('Version label (optional):','');
  const r = await api('POST',`/api/projects/${state.current.id}/build-context`,label?{label}:{});
  if (r._build_metadata) { alert(`Built: ${r._build_metadata.total_risks||0} risks, ${r._build_metadata.total_constraints||0} constraints, ${r._build_metadata.total_dependencies||0} dependencies`); render(); }
  else if (r.error) alert(r.error);
}

async function loadProjects() {
  const r = await api('GET','/api/projects');
  state.projects = r.projects || [];
  if (!state.current && state.projects.length) state.current = state.projects[0];
}

async function loadBackends() {
  const r = await api('GET','/api/backends');
  state.backends = r.backends || [];
}

// ─── Init ───
(async () => { await Promise.all([loadProjects(), loadBackends()]); render(); })();
</script>

<script>
// ─── Admin View (V3) ───
async function viewAdmin() {
  let config = {}, health = {}, lifecycle = {}, suggestions = [];
  try { const r = await api('GET','/api/admin/config'); config = r.config || {}; } catch(e){}
  try { const r = await api('GET','/api/admin/health'); health = r.health || {}; } catch(e){}
  try { const r = await api('GET','/api/admin/lifecycle'); lifecycle = r.lifecycle || {}; } catch(e){}
  try { const r = await api('GET','/api/admin/auto-archive-suggestions'); suggestions = r.suggestions || []; } catch(e){}

  const lastRun = health.last_intelligence_run || {};
  const apiStatus = health.api_status || {};

  // System Health section
  let healthHtml = `<div class="card"><h2>System Health</h2>
    <h3>Last Intelligence Run</h3>
    <div style="font-size:12px;padding:6px 0">`;
  if (lastRun.status === 'never_run') {
    healthHtml += `<span style="color:var(--text-dim)">No intelligence runs recorded yet</span>`;
  } else {
    const statusColor = lastRun.success ? 'var(--accent2)' : 'var(--danger)';
    healthHtml += `<span style="color:${statusColor}">${lastRun.success?'Success':'Failed'}</span>
      – ${lastRun.project_name||''} (${lastRun.version_id||''})
      <span style="color:var(--text-dim);margin-left:8px">${lastRun.timestamp?.slice(0,16)||''}</span>
      ${lastRun.duration_ms ? `<span class="tag">${Math.round(lastRun.duration_ms)}ms</span>` : ''}`;
    if (lastRun.error) healthHtml += `<div style="color:var(--danger);margin-top:4px">${lastRun.error}</div>`;
  }
  healthHtml += `</div><h3>API Connectivity</h3><div class="backend-grid">`;
  for (const [name, info] of Object.entries(apiStatus)) {
    const configured = info.configured;
    healthHtml += `<div class="backend-chip ${configured?'available':''}">${configured?'●':'○'} <strong>${name}</strong><br><span style="font-size:10px">${configured?'Configured':'Not configured'}</span></div>`;
  }
  healthHtml += `</div></div>`;

  // Config section
  let configHtml = `<div class="card"><h2>Configuration</h2>
    <div class="form-row"><label>Max Active Projects</label><input id="cfgMaxProjects" type="number" value="${config.max_active_projects||5}" style="width:80px"></div>
    <div class="form-row"><label>Default Persona</label>
      <select id="cfgPersona" style="width:200px">
        <option value="solution_architect" ${config.default_persona==='solution_architect'?'selected':''}>Solution Architect</option>
        <option value="delivery_manager" ${config.default_persona==='delivery_manager'?'selected':''}>Delivery Manager</option>
        <option value="product_owner" ${config.default_persona==='product_owner'?'selected':''}>Product Owner</option>
        <option value="resource_manager" ${config.default_persona==='resource_manager'?'selected':''}>Resource Manager</option>
      </select></div>
    <div class="form-row"><label>Default Phase</label>
      <select id="cfgPhase" style="width:200px">
        <option value="discovery" ${config.default_phase==='discovery'?'selected':''}>Discovery</option>
        <option value="proposal" ${config.default_phase==='proposal'?'selected':''}>Proposal</option>
        <option value="planning" ${config.default_phase==='planning'?'selected':''}>Planning</option>
        <option value="execution" ${config.default_phase==='execution'?'selected':''}>Execution</option>
        <option value="review" ${config.default_phase==='review'?'selected':''}>Review</option>
      </select></div>
    <div class="form-row"><label>Admin PIN</label><input id="cfgPin" type="password" value="${config.admin_pin||'1234'}" style="width:120px"></div>
    <h3>API Keys</h3>
    <div class="form-row"><label>Groq API Key</label><input id="cfgGroq" placeholder="${config.api_keys?.groq||'Not set'}" type="password"></div>
    <div class="form-row"><label>OpenRouter API Key</label><input id="cfgOpenRouter" placeholder="${config.api_keys?.openrouter||'Not set'}" type="password"></div>
    <div class="form-row"><label>Gemini API Key</label><input id="cfgGemini" placeholder="${config.api_keys?.gemini||'Not set'}" type="password"></div>
    <button class="btn mt" onclick="saveAdminConfig()">Save Configuration</button>
    <div id="configResult" class="mt"></div></div>`;

  // Lifecycle logs section
  let lifecycleHtml = `<div class="card"><h2>Project Lifecycle Logs</h2>`;
  const archived = lifecycle.archived || [];
  const deleted = lifecycle.deleted || [];
  if (archived.length) {
    lifecycleHtml += `<h3>Archived Projects (${archived.length}/${lifecycle.max_entries||5})</h3><ul class="items">`;
    for (const a of archived) {
      const canRestore = a.restore_allowed !== false;
      lifecycleHtml += `<li><strong>${a.name}</strong> (${a.project_id}) – ${a.archived_at?.slice(0,16)||''}
        ${canRestore ? `<button class="btn btn-sm btn-outline" onclick="restoreProject('${a.project_id}')" style="margin-left:8px">Restore</button>` : '<span class="tag">Restored</span>'}
      </li>`;
    }
    lifecycleHtml += `</ul>`;
  } else {
    lifecycleHtml += `<p style="color:var(--text-dim);font-size:12px">No archived projects</p>`;
  }
  if (deleted.length) {
    lifecycleHtml += `<h3>Deleted Projects (${deleted.length}/${lifecycle.max_entries||5})</h3><ul class="items">`;
    for (const d of deleted) {
      lifecycleHtml += `<li><strong>${d.name}</strong> (${d.project_id}) – Deleted ${d.deleted_at?.slice(0,16)||''} <span style="font-size:10px;color:var(--text-dim)">${(d.file_metadata||[]).length} files</span></li>`;
    }
    lifecycleHtml += `</ul>`;
  }
  lifecycleHtml += `</div>`;

  // Auto-archive suggestions
  let suggestHtml = '';
  if (suggestions.length) {
    suggestHtml = `<div class="card"><h2>Auto-Archive Suggestions</h2><ul class="items">`;
    for (const s of suggestions) {
      suggestHtml += `<li><strong>${s.name}</strong> – Inactive ${s.inactive_days} days (threshold: ${s.threshold_days})
        <button class="btn btn-sm btn-warn" onclick="archiveProject('${s.project_id}')" style="margin-left:8px">Archive</button></li>`;
    }
    suggestHtml += `</ul></div>`;
  }

  return healthHtml + configHtml + lifecycleHtml + suggestHtml;
}

async function saveAdminConfig() {
  const updates = {
    max_active_projects: parseInt(document.getElementById('cfgMaxProjects').value) || 5,
    default_persona: document.getElementById('cfgPersona').value,
    default_phase: document.getElementById('cfgPhase').value,
    admin_pin: document.getElementById('cfgPin').value,
    api_keys: {}
  };
  const groq = document.getElementById('cfgGroq').value;
  const openrouter = document.getElementById('cfgOpenRouter').value;
  const gemini = document.getElementById('cfgGemini').value;
  if (groq) updates.api_keys.groq = groq;
  if (openrouter) updates.api_keys.openrouter = openrouter;
  if (gemini) updates.api_keys.gemini = gemini;

  const r = await api('POST', '/api/admin/config', updates);
  if (r.config) {
    document.getElementById('configResult').innerHTML = '<p style="color:var(--accent2)">Configuration saved</p>';
  } else {
    document.getElementById('configResult').innerHTML = `<p style="color:var(--danger)">${r.error||'Save failed'}</p>`;
  }
}

async function restoreProject(projectId) {
  const pin = prompt('Enter PIN to restore:');
  if (!pin) return;
  const r = await api('POST', `/api/projects/${projectId}/restore`, {pin});
  if (r.error) { alert('Error: ' + r.error); return; }
  alert(r.message || 'Project restored');
  await loadProjects();
  render();
}
</script>

<script>
// ─── Enhanced Reviews View (V3: File Visibility) ───
// Override the reviews view to include file visibility per version
const _originalViewReviews = viewReviews;
viewReviews = async function() {
  if (!state.current) return viewNoProject();
  const pid = state.current.id;
  const personas = await api('POST','/api/personas');
  const history = await api('GET',`/api/projects/${pid}/reviews`);
  const reviews = history.reviews || [];
  const backendOpts = state.backends.map(b=>`<option value="${b.name}">${b.display_name||b.name} ${b.available?'':'(not configured)'}</option>`).join('');

  // File Visibility section (V3)
  let fileVisHtml = '';
  try {
    const ctx = await api('GET',`/api/projects/${pid}/context`);
    const docs = ctx.documents || [];
    const toggles = ctx.file_toggles || {};
    if (docs.length) {
      const activeCount = docs.filter(d => toggles[(d.filename||d.metadata?.filename||'')] !== false).length;
      fileVisHtml = `<div class="card"><h2>File Visibility (Current Version)</h2>
        <p style="font-size:11px;color:var(--text-dim);margin-bottom:8px">${activeCount} of ${docs.length} files included. Files are frozen per version for reproducibility.</p>
        <div style="max-height:200px;overflow-y:auto">`;
      for (const d of docs) {
        const fname = d.filename || d.metadata?.filename || '';
        const isActive = toggles[fname] !== false;
        const icon = isActive ? '●' : '○';
        const color = isActive ? 'var(--accent2)' : 'var(--text-dim)';
        fileVisHtml += `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px">
          <span style="color:${color}">${icon}</span>
          <span>${escHtml(fname)}</span>
          <span style="margin-left:auto;font-size:10px;color:${color}">${isActive?'ON':'OFF'}</span>
          <span class="file-toggle ${isActive?'toggle-on':'toggle-off'}" onclick="toggleFileActive('${escHtml(fname)}',${!isActive})">${isActive?'Included':'Excluded'}</span>
        </div>`;
      }
      fileVisHtml += `</div></div>`;
    }
  } catch(e) {}

  // Run Intelligence button (explicit trigger, V3)
  const runIntelHtml = `<div class="card"><h2>Run Intelligence</h2>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:8px">Explicit action: builds intelligence from active files. Creates a versioned snapshot.</p>
    <div class="flex">
      <button class="btn" onclick="buildContext()">Run Intelligence</button>
      <button class="btn btn-outline" onclick="runDeepDive()">Deep Dive Analysis</button>
    </div><div id="deepDiveResult" class="mt"></div></div>`;

  return fileVisHtml + runIntelHtml + `<div class="card"><h2>Run Persona Review</h2>
    <div class="flex">
      <select id="personaSelect">${(personas.personas||[]).map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select>
      <select id="backendSelect">${backendOpts}</select>
      <button class="btn" onclick="runReview()">Run Review</button>
    </div>
    <div class="form-row mt"><label>Custom Prompt (optional – additional context for AI)</label>
      <textarea id="customPrompt" rows="3" placeholder="e.g. Budget is capped at 500K. Must use only AWS services. Team has 3 senior engineers."></textarea>
    </div>
    <div id="reviewResult" class="mt"></div></div>` +
    (reviews.length ? `<div class="card"><h2>Review History (${reviews.length})</h2><ul class="items">${reviews.map(r=>`<li><strong>${r.persona}</strong> ${r.timestamp?.slice(0,16)||''} <span class="tag">${r.ai_backend}</span> ${r.total_findings||0} findings</li>`).join('')}</ul></div>` : '');
};

async function runDeepDive() {
  if (!state.current) return;
  const el = document.getElementById('deepDiveResult');
  el.innerHTML = '<p style="color:var(--text-dim)">Running Deep Dive analysis...</p>';
  const persona = document.getElementById('personaSelect')?.value || '';
  const custom = document.getElementById('customPrompt')?.value || '';
  const r = await api('POST', `/api/projects/${state.current.id}/deep-dive`, {persona, custom_prompt: custom});
  if (r.error) { el.innerHTML = `<p style="color:var(--danger)">${r.error}</p>`; return; }

  const dd = r.deep_dive || {};
  const sv = r.scope_validation || {};
  let html = `<div class="card"><h3>Deep Dive Results</h3>
    <p style="font-size:11px;color:var(--text-dim)">Scope completeness: ${Math.round((sv.completeness_score||0)*100)}%</p>`;

  if (dd.missing_areas?.length) {
    html += `<div class="findings-section"><div class="title">Missing Areas</div><ul class="items">`;
    for (const m of dd.missing_areas) { html += `<li><span class="tag tag-${m.severity==='high'?'off':'ok'}">${m.severity}</span> ${m.area}: ${m.suggestion}</li>`; }
    html += `</ul></div>`;
  }
  if (dd.risk_flags?.length) {
    html += `<div class="findings-section"><div class="title">Risk Flags</div><ul class="items">`;
    for (const f of dd.risk_flags.slice(0,10)) { html += `<li><span class="tag">${f.severity}</span> ${f.flag}</li>`; }
    html += `</ul></div>`;
  }
  if (dd.clarification_questions?.length) {
    html += `<div class="findings-section"><div class="title">Clarification Questions</div><ul class="items">`;
    for (const q of dd.clarification_questions) { html += `<li>? ${q}</li>`; }
    html += `</ul></div>`;
  }
  if (dd.suggested_additions?.length) {
    html += `<div class="findings-section"><div class="title">Suggested Additions to Scope</div><ul class="items">`;
    for (const s of dd.suggested_additions) { html += `<li><span class="tag">${s.priority}</span> [${s.category}] ${s.suggestion}</li>`; }
    html += `</ul></div>`;
  }
  html += `<div class="flex mt">
    <button class="btn btn-sm btn-outline" onclick="acceptAllSuggestions()">Accept All</button>
    <button class="btn btn-sm btn-outline" onclick="addToPrompt()">Add to Prompt</button>
  </div>`;
  html += `</div>`;
  el.innerHTML = html;
}

async function acceptAllSuggestions() {
  if (!state.current) return;
  const r = await api('POST', `/api/projects/${state.current.id}/deep-dive/feedback`, {accepted: ['all']});
  alert(r.status === 'feedback_applied' ? 'Feedback applied!' : (r.error || 'Failed'));
}

async function addToPrompt() {
  const text = prompt('Enter text to add to next prompt:');
  if (!text) return;
  const r = await api('POST', `/api/projects/${state.current.id}/deep-dive/feedback`, {added_to_prompt: [text]});
  alert(r.status === 'feedback_applied' ? 'Added to prompt!' : (r.error || 'Failed'));
}
</script>

<script>
// ─── Init ───
(async () => { await Promise.all([loadProjects(), loadBackends()]); render(); })();
</script>
