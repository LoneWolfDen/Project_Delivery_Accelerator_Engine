// REVIEW FULL DETAIL VIEW
// ═══════════════════════════════════════════════════════════════
async function viewReviewDetail(rid){
  if(!rid||rid==='undefined'){toast('Invalid review ID','err');return;}
  const pid=state.current.id;
  const r=await api('GET',`/api/projects/${pid}/hierarchy/reviews/${rid}`);
  if(r.error){toast(r.error,'err');return;}

  const vc=r.version_context||{};
  let html=`<div class="card">
    <div class="flex-between mb">
      <div class="card-title"><span class="icon">🔍</span>Review ${escHtml(r.review_id)}</div>
      <button class="btn btn-sm btn-ghost" onclick="render()">← Back</button>
    </div>
    <div class="flex gap-sm mb" style="flex-wrap:wrap">
      <span class="tag tag-blue">Version: ${escHtml(r.version_id)}</span>
      <span class="tag">${escHtml(r.phase_id)}</span>
      <span class="tag tag-purple">${escHtml(r.persona)}</span>
      <span class="tag">${escHtml(r.ai_backend||'files_only')}</span>
      <span style="font-size:11px;color:var(--text-muted);margin-left:auto">${fmtDate(r.created_at)}</span>
    </div>`;

  // Files included (Bug #2 fix result: now shows both artifact v1 + legacy files)
  if(r.included_files?.length){
    html+=`<div class="mb">
      <p class="card-section">Files Included (${r.included_files.length})</p>
      <div class="flex gap-sm" style="flex-wrap:wrap">
        ${r.included_files.map(f=>`<span class="tag tag-green">${escHtml(f)}</span>`).join('')}
      </div>
    </div>`;
  }else{
    html+=`<div class="mb"><p class="card-section">Files Included</p>
      <p style="font-size:11px;color:var(--text-muted)">No file information recorded for this review.</p></div>`;
  }

  if(r.categories?.length){
    html+=`<div class="flex gap-sm mb">${r.categories.filter(Boolean).map(c=>`<span class="tag">${escHtml(c)}</span>`).join('')}</div>`;
  }

  if(r.summary){
    html+=`<div class="mb" style="background:var(--surface2);border-radius:var(--radius);padding:10px">
      <p style="font-size:12px;color:var(--text-dim)">${escHtml(r.summary)}</p>
    </div>`;
  }

  // ── PM Coverage Assessment (persona-aware) ──────────────────
  html+=renderCoverageAssessment(r);

  // Findings with expand/collapse
  const findings=r.findings||{};
  if(Object.keys(findings).length){
    html+=`<div class="flex-between mb"><p class="card-section" style="margin:0">Findings</p>
      <div class="flex gap-sm">
        <button class="btn-icon" onclick="expandAllIntel()" title="Expand all">⊕</button>
        <button class="btn-icon" onclick="collapseAllIntel()" title="Collapse all">⊖</button>
      </div></div>`;
    for(const[s,items]of Object.entries(findings)){
      if(!items.length)continue;
      html+=`<details open>
        <summary class="collapse-header" style="list-style:none;margin-bottom:4px">
          <span class="chevron">▶</span>
          <strong style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">${escHtml(s.replace(/_/g,' '))}</strong>
          <span class="tag" style="margin-left:4px">${items.length}</span>
        </summary>
        <div class="collapse-body" style="padding-left:12px">
          ${items.map(it=>`<div class="findings-item">${escHtml(String(it))}</div>`).join('')}
        </div>
      </details>`;
    }
  }

  if(r.questions?.length){
    html+=`<details open>
      <summary class="collapse-header" style="list-style:none;margin:6px 0 4px">
        <span class="chevron">▶</span>
        <strong style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">Open Questions</strong>
        <span class="tag" style="margin-left:4px">${r.questions.length}</span>
      </summary>
      <div class="collapse-body" style="padding-left:12px">
        ${r.questions.map(q=>`<div class="findings-item">❓ ${escHtml(q)}</div>`).join('')}
      </div>
    </details>`;
  }

  if(r.prompt_used){
    html+=`<details style="margin-top:8px">
      <summary class="collapse-header" style="list-style:none;margin-bottom:0">
        <span class="chevron">▶</span> <span style="font-size:12px;color:var(--accent)">Prompt Used</span>
      </summary>
      <div class="prompt-box" style="margin-top:6px">${escHtml(r.prompt_used)}</div>
    </details>`;
  }
  if(r.custom_prompt){
    html+=`<details style="margin-top:6px">
      <summary class="collapse-header" style="list-style:none;margin-bottom:0">
        <span class="chevron">▶</span> <span style="font-size:12px;color:var(--accent)">Custom Prompt</span>
      </summary>
      <div class="prompt-box" style="margin-top:6px">${escHtml(r.custom_prompt)}</div>
    </details>`;
  }
  if(r.ai_metadata?.tokens_used){
    html+=`<p style="font-size:11px;color:var(--text-muted);margin-top:10px">
      Tokens: ${r.ai_metadata.tokens_used} · Latency: ${r.ai_metadata.latency_ms}ms · Model: ${escHtml(r.ai_metadata.model||'–')}
    </p>`;
  }
  html+=`</div>`;
  document.getElementById('main').innerHTML=html;
}
</script>


<script>
// ═══════════════════════════════════════════════════════════════
// REVIEWS VIEW
// ═══════════════════════════════════════════════════════════════
async function viewReviews(){
  if(!state.current)return viewNoProject();
  const pid=state.current.id;
  const personas=await api('POST','/api/personas');
  const backendOpts=state.backends.map(b=>`<option value="${b.name}">${escHtml(b.display_name||b.name)}${b.available?'':' (not configured)'}</option>`).join('');

  let hierarchy={};
  try{hierarchy=await api('GET',`/api/projects/${pid}/hierarchy`);}catch(e){}
  const tree=hierarchy.tree||[];

  let versionsWithReviews=[];
  for(const phase of tree){
    for(const ver of(phase.versions||[])){
      if((ver.reviews||[]).length>0)versionsWithReviews.push({...ver,phase_label:phase.label});
    }
  }

  // Sort reviews
  const sort=state._reviewSort||'newest';
  const sortBar=`<div class="sort-bar">
    <span>Sort:</span>
    <button class="sort-btn ${sort==='newest'?'active':''}" onclick="setReviewSort('newest')">Newest First</button>
    <button class="sort-btn ${sort==='oldest'?'active':''}" onclick="setReviewSort('oldest')">Oldest First</button>
    <button class="sort-btn ${sort==='most-findings'?'active':''}" onclick="setReviewSort('most-findings')">Most Findings</button>
  </div>`;

  const runCard=`<div class="card">
    <div class="card-title mb"><span class="icon">🔍</span>Run Persona Review</div>
    <div class="flex mb">
      <div style="flex:1"><label style="font-size:10px;color:var(--text-dim)">Persona</label>
        <select id="personaSelect" style="width:100%;margin-top:3px">${(personas.personas||[]).map(p=>`<option value="${p.id}">${escHtml(p.name)}</option>`).join('')}</select></div>
      <div style="flex:1"><label style="font-size:10px;color:var(--text-dim)">AI Backend</label>
        <select id="backendSelect" style="width:100%;margin-top:3px">${backendOpts}</select></div>
    </div>
    <div class="form-row"><label>Custom Prompt <span style="font-size:10px;color:var(--text-muted)">(optional – additional context for AI)</span></label>
      <textarea id="customPrompt" rows="2" placeholder="e.g. Budget capped at £500K. AWS only. 3 senior engineers available."></textarea>
    </div>
    <div class="flex gap-sm">
      <button class="btn" onclick="runReview()">▶ Run Review</button>
      <button class="btn btn-outline" onclick="runDeepDive()" title="Structured gap analysis">🔬 Deep Dive Analysis</button>
    </div>
    <p style="font-size:10px;color:var(--text-muted);margin-top:6px">Deep Dive: scope validation, gap identification, risk flags, clarification questions. Enhanced with AI when an AI backend is selected.</p>
    <div id="reviewResult" class="mt"></div>
    <div id="deepDiveResult" class="mt"></div>
  </div>`;

  let listHtml='';
  if(versionsWithReviews.length){
    listHtml=`<div class="card">
      <div class="flex-between mb">
        <div class="card-title"><span class="icon">📜</span>Review History</div>
        <div class="flex gap-sm">
          <button class="btn btn-sm btn-ghost" onclick="expandAllReviews()">Expand All</button>
          <button class="btn btn-sm btn-ghost" onclick="collapseAllReviews()">Collapse All</button>
        </div>
      </div>
      ${sortBar}`;

    for(const ver of versionsWithReviews){
      let revs=[...(ver.reviews||[])];
      if(sort==='oldest')revs.sort((a,b)=>(a.created_at||'').localeCompare(b.created_at||''));
      else if(sort==='most-findings')revs.sort((a,b)=>(b.total_findings||0)-(a.total_findings||0));
      else revs.sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
      const activeId=ver.active_review_id||'';

      listHtml+=`<details open style="border-left:2px solid var(--border);padding-left:10px;margin:8px 0">
        <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:var(--radius)"
          onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
          <span class="chevron">▶</span>
          <strong style="font-size:12px">${escHtml(ver.version_id)}</strong>
          ${ver.label?`<span style="color:var(--text-dim);font-size:12px">– ${escHtml(ver.label)}</span>`:''}
          <span class="tag">${escHtml(ver.phase_label||'')}</span>
          <span class="tag tag-blue">${revs.length} reviews</span>
        </summary>`;

      for(const rev of revs){
        const rid=rev.review_id||'';if(!rid)continue;
        const isActive=rid===activeId;
        listHtml+=`<details style="margin:4px 0;background:var(--bg);border:1px solid ${isActive?'var(--accent)':'var(--border)'};border-radius:var(--radius);overflow:hidden">
          <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;gap:7px;padding:7px 10px"
            onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
            <span class="chevron">▶</span>
            <strong style="font-size:11px">${rid}</strong>
            ${isActive?'<span class="tag tag-green">active</span>':''}
            <span class="tag tag-purple">${escHtml(rev.persona||'–')}</span>
            <span class="tag">${escHtml(rev.ai_backend||'files_only')}</span>
            ${rev.total_findings?`<span class="tag tag-yellow">${rev.total_findings} findings</span>`:''}
            <span style="font-size:10px;color:var(--text-muted);margin-left:auto">${relativeTime(rev.created_at)} · ${fmtDateShort(rev.created_at)}</span>
          </summary>
          <div style="padding:8px 10px 10px;border-top:1px solid var(--border)">
            ${rev.summary?`<p style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${escHtml(rev.summary.slice(0,180))}</p>`:''}
            <div class="flex gap-sm">
              <button class="btn btn-sm btn-outline" onclick="viewReviewDetail('${rid}')">Full Details</button>
              ${!isActive?`<button class="btn btn-sm btn-ghost" onclick="setActiveReview('${ver.version_id}','${rid}')">Set Active</button>`:''}
              <button class="btn btn-sm btn-red" onclick="deleteReview('${rid}')">Delete</button>
            </div>
          </div>
        </details>`;
      }
      listHtml+=`</details>`;
    }
    listHtml+=`</div>`;
  }
  return runCard+listHtml;
}

function setReviewSort(s){state._reviewSort=s;render();}
function expandAllReviews(){document.querySelectorAll('#main details').forEach(d=>d.open=true);}
function collapseAllReviews(){document.querySelectorAll('#main details').forEach(d=>d.open=false);}

async function runReview(){
  const persona=document.getElementById('personaSelect').value;
  const backend=document.getElementById('backendSelect').value;
  const custom=document.getElementById('customPrompt').value.trim();
  const el=document.getElementById('reviewResult');
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Running review…</span>';
  const body={project_id:state.current.id,persona,ai_backend:backend};

  const r=await api('POST','/api/review',body);
  if(r.error){el.innerHTML=`<p style="color:var(--red)">${escHtml(r.error)}</p>`;return;}

  let html=`<div class="card">
    <div class="flex-between mb">
      <div class="card-title"><span class="icon">✅</span>${escHtml(r.persona)}</div>
      <div class="flex gap-sm">
        <span class="tag tag-purple">${escHtml(r.ai_backend)}</span>
        ${r.ai_metadata?.tokens_used?`<span class="tag tag-green">${r.ai_metadata.tokens_used} tokens</span>`:''}
      </div>
    </div>
    ${r.summary?`<p style="font-size:12px;color:var(--text-dim);margin-bottom:10px">${escHtml(r.summary)}</p>`:''}`;

  for(const[s,items]of Object.entries(r.findings||{})){
    if(items.length)html+=`<details open><summary class="collapse-header" style="list-style:none;margin-bottom:4px">
        <span class="chevron">▶</span>
        <strong style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">${escHtml(s.replace(/_/g,' '))}</strong>
        <span class="tag" style="margin-left:4px">${items.length}</span>
      </summary>
      <div class="collapse-body" style="padding-left:12px">
        ${items.map(i=>`<div class="findings-item">${escHtml(String(i))}</div>`).join('')}
      </div></details>`;
  }
  if(r.questions?.length){
    html+=`<details open><summary class="collapse-header" style="list-style:none;margin:4px 0">
      <span class="chevron">▶</span>
      <strong style="font-size:11px;text-transform:uppercase;letter-spacing:.5px">Open Questions</strong>
      <span class="tag" style="margin-left:4px">${r.questions.length}</span>
    </summary>
    <div class="collapse-body" style="padding-left:12px">
      ${r.questions.map(q=>`<div class="findings-item">❓ ${escHtml(q)}</div>`).join('')}
    </div></details>`;
  }
  if(r.prompt_used)html+=`<details style="margin-top:8px"><summary class="collapse-header" style="list-style:none">
    <span class="chevron">▶</span><span style="font-size:12px;color:var(--accent)">View Prompt</span>
    </summary><div class="prompt-box">${escHtml(r.prompt_used)}</div></details>`;
  if(r.raw_output)html+=`<details style="margin-top:4px"><summary class="collapse-header" style="list-style:none">
    <span class="chevron">▶</span><span style="font-size:12px;color:var(--accent)">Raw AI Output</span>
    </summary><div class="prompt-box">${escHtml(r.raw_output)}</div></details>`;
  html+=`<button class="btn btn-sm btn-ghost mt" onclick="render()">Refresh List</button></div>`;
  el.innerHTML=html;
}
</script>


<script>
// ═══════════════════════════════════════════════════════════════
// DEEP DIVE
// ═══════════════════════════════════════════════════════════════
async function runDeepDive(){
  if(!state.current)return;
  const el=document.getElementById('deepDiveResult');
  el.innerHTML='<span class="loading-inline"><span class="spin">⟳</span> Running Deep Dive…</span>';
  const persona=document.getElementById('personaSelect')?.value||'';
  const custom=document.getElementById('customPrompt')?.value||'';
  const r=await api('POST',`/api/projects/${state.current.id}/deep-dive`,{persona,custom_prompt:custom});
  if(r.error){el.innerHTML=`<p style="color:var(--red)">${escHtml(r.error)}</p>`;return;}
  state.lastDeepDive=r;
  const dd=r.deep_dive||{};
  const sv=r.scope_validation||{};
  const pct=Math.round((sv.completeness_score||0)*100);
  const pctTag=sv.completeness_score>=0.7?'tag-green':sv.completeness_score>=0.4?'tag-yellow':'tag-red';

  // Build flat items array for index-based retrieval
  state._ddAllItems=[
    ...(dd.missing_areas||[]).map(m=>`[Missing] ${m.area}: ${m.suggestion}`),
    ...(dd.risk_flags||[]).slice(0,10).map(f=>`[Risk] ${f.flag}`),
    ...(dd.clarification_questions||[]).map(q=>`[Question] ${q}`),
    ...(dd.suggested_additions||[]).map(s=>`[Suggestion] ${s.suggestion}`),
  ];

  let idx=0;

  // Each row is a clickable div — clicking anywhere selects/deselects the item
  // The checkbox is hidden visually but stays in DOM for form semantics.
  function ddSection(sectionId, icon, label, colorTag, items, rowFn){
    if(!items||!items.length)return'';
    const total=items.length;
    const rows=items.map((item)=>{
      const i=idx++;
      return`<div class="dd-row" data-idx="${i}" data-section="${sectionId}" onclick="toggleDDRow(this)">
        <span class="dd-row-check-icon" id="dd-chk-${i}">✓</span>
        <span class="dd-row-content">${rowFn(item)}</span>
      </div>`;
    }).join('');
    return`<details open style="margin-bottom:8px">
      <summary style="list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;
        padding:9px 12px;background:var(--surface2);border-radius:var(--radius);
        transition:background var(--transition)" class="dd-sum"
        onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background='var(--surface2)'">
        <span class="chevron" style="font-size:9px;color:var(--text-muted);transition:transform .2s">▶</span>
        <span>${icon}</span>
        <strong style="font-size:12px">${label}</strong>
        <span class="tag ${colorTag}" style="margin-left:2px">${total}</span>
        <span class="dd-sec-count" id="ddsec_${sectionId}" style="font-size:11px;color:var(--text-muted);margin-left:auto">${total} selected</span>
      </summary>
      <div style="padding:4px 0 0">${rows}</div>
    </details>`;
  }

  let html=`<div class="card" id="ddResultCard">
    <div class="flex-between mb">
      <div class="card-title"><span class="icon">🔬</span>Deep Dive Results</div>
      <span class="tag ${pctTag}">Scope ${pct}% complete</span>
    </div>`;

  if(dd.missing_areas?.length){
    html+=ddSection('missing','🔴','Missing Areas','tag-red',dd.missing_areas,m=>
      `<span class="tag ${m.severity==='high'?'tag-red':'tag-yellow'}" style="flex-shrink:0;margin-right:4px">${m.severity}</span>`+
      `<span><strong>${escHtml(m.area)}</strong>: ${escHtml(m.suggestion)}</span>`);
  }
  if(dd.risk_flags?.length){
    html+=ddSection('risks','⚠️','Risk Flags','tag-yellow',dd.risk_flags.slice(0,10),f=>
      `<span class="tag ${f.severity==='high'?'tag-red':'tag-yellow'}" style="flex-shrink:0;margin-right:4px">${f.severity}</span>`+
      `<span>${escHtml(f.flag)}</span>`);
  }
  if(dd.clarification_questions?.length){
    html+=ddSection('questions','❓','Clarification Questions','tag-blue',dd.clarification_questions,q=>
      `<span>❓ ${escHtml(q)}</span>`);
  }
  if(dd.suggested_additions?.length){
    html+=ddSection('suggestions','💡','Suggested Additions','',dd.suggested_additions,s=>
      `<span class="tag ${s.priority==='high'?'tag-red':'tag-yellow'}" style="flex-shrink:0;margin-right:4px">${s.priority}</span>`+
      `<span class="tag" style="flex-shrink:0;margin-right:4px">${escHtml(s.category)}</span>`+
      `<span>${escHtml(s.suggestion)}</span>`);
  }

  html+=`<div class="dd-sticky-bar">
    <span id="ddTotalCount" style="font-size:11px;font-weight:600;color:var(--text-dim)">
      ${state._ddAllItems.length} of ${state._ddAllItems.length} selected
    </span>
    <button class="btn btn-sm" onclick="acceptAllSuggestions()">✅ Accept</button>
    <button class="btn btn-sm btn-outline" onclick="addSelectedToPrompt()">📋 Add to Prompt</button>
    <button class="btn btn-sm btn-ghost" onclick="toggleAllDDRows(true)">Select All</button>
    <button class="btn btn-sm btn-ghost" onclick="toggleAllDDRows(false)">Deselect All</button>
  </div>
  <div id="ddFeedbackResult"></div></div>`;
  el.innerHTML=html;
  _refreshDDTotals();
}

// Toggle an individual row (called by clicking the whole row div)
function toggleDDRow(rowEl){
  const isSelected=!rowEl.classList.contains('dd-row-deselected');
  if(isSelected){
    rowEl.classList.add('dd-row-deselected');
    rowEl.classList.remove('dd-row-selected');
  }else{
    rowEl.classList.remove('dd-row-deselected');
    rowEl.classList.add('dd-row-selected');
  }
  const sectionId=rowEl.dataset.section;
  _refreshDDSectionCount(sectionId);
  _refreshDDTotals();
}

function toggleAllDDRows(select){
  document.querySelectorAll('.dd-row').forEach(row=>{
    if(select){row.classList.remove('dd-row-deselected');row.classList.add('dd-row-selected');}
    else{row.classList.add('dd-row-deselected');row.classList.remove('dd-row-selected');}
  });
  ['missing','risks','questions','suggestions'].forEach(s=>_refreshDDSectionCount(s));
  _refreshDDTotals();
}

function _refreshDDSectionCount(sectionId){
  const rows=document.querySelectorAll(`.dd-row[data-section="${sectionId}"]`);
  const selCount=[...rows].filter(r=>!r.classList.contains('dd-row-deselected')).length;
  const el=document.getElementById(`ddsec_${sectionId}`);
  if(el)el.textContent=`${selCount} selected`;
}

function _refreshDDTotals(){
  const all=document.querySelectorAll('.dd-row');
  const sel=[...all].filter(r=>!r.classList.contains('dd-row-deselected')).length;
  const tot=document.getElementById('ddTotalCount');
  if(tot)tot.textContent=`${sel} of ${all.length} selected`;
}

function _getSelectedDDItems(){
  const allItems=state._ddAllItems||[];
  const sel=[];
  document.querySelectorAll('.dd-row').forEach(row=>{
    if(!row.classList.contains('dd-row-deselected')){
      const i=parseInt(row.dataset.idx,10);
      if(allItems[i])sel.push(allItems[i]);
    }
  });
  return sel;
}

async function acceptAllSuggestions(){
  if(!state.current)return;
  const items=_getSelectedDDItems();
  if(!items.length){toast('No items selected','err');return;}
  const r=await api('POST',`/api/projects/${state.current.id}/deep-dive/feedback`,{accepted:items});
  if(r.error){toast(r.error,'err');return;}
  toast(`Accepted ${r.accepted_count} items`);
  document.getElementById('ddFeedbackResult').innerHTML=`<p style="color:var(--green);font-size:12px">✓ Accepted ${r.accepted_count} items</p>`;
}

async function addSelectedToPrompt(){
  if(!state.current)return;
  const items=_getSelectedDDItems();
  if(!items.length){toast('No items selected','err');return;}
  const r=await api('POST',`/api/projects/${state.current.id}/deep-dive/feedback`,{added_to_prompt:items});
  if(r.error){toast(r.error,'err');return;}
  toast(`Added ${r.added_to_prompt_count} items to prompt`);
  const ta=document.getElementById('customPrompt');
  if(ta){ta.value=(ta.value?ta.value+'\n':'')+items.join('\n');}
  document.getElementById('ddFeedbackResult').innerHTML=`<p style="color:var(--green);font-size:12px">✓ Added ${r.added_to_prompt_count} items to prompt</p>`;
}
</script>


<script>
// ═══════════════════════════════════════════════════════════════
// DIAGRAMS VIEW
// ═══════════════════════════════════════════════════════════════
async function viewDiagrams(){
  if(!state.current)return viewNoProject();
  const pid=state.current.id;

  // Check if intelligence is built
  let intel={};
  try{const r=await api('GET',`/api/projects/${pid}/intelligence`);intel=r.intelligence||r;}catch(e){}
  const hasIntel=!!(intel.risks||intel.scope||intel.dependencies);

  // Load list of already-generated diagrams
  let existing=[];
  try{const r=await api('GET',`/api/projects/${pid}/diagrams`);existing=r.diagrams||[];}catch(e){}

  const TYPES=[
    {key:'dependency_map',   label:'Dependency Map',   icon:'🔗',
     desc:'Nodes for each intelligence item grouped by category (risks, dependencies, assumptions, constraints, action items).'},
    {key:'risk_heatmap',     label:'Risk Heatmap',     icon:'🔴',
     desc:'Risks plotted on a 3×3 Impact vs Likelihood grid, colour-coded by severity.'},
    {key:'scope_overview',   label:'Scope Overview',   icon:'📄',
     desc:'One swimlane per category showing all extracted items — a single-page project summary.'},
  ];

  const existingKeys=new Set(existing.map(d=>d.diagram_type));

  if(!hasIntel){
    return`<div class="card"><div class="empty">
      <div class="empty-icon">📐</div>
      <p>No intelligence built yet. Run Intelligence first, then generate diagrams.</p>
      <button class="btn mt" onclick="buildContext()">🔨 Run Intelligence</button>
    </div></div>`;
  }

  let html=`<div class="card">
    <div class="flex-between mb">
      <div class="card-title"><span class="icon">📐</span>Diagram Generator</div>
      <button class="btn btn-sm btn-outline" onclick="generateAllDiagrams()">⚡ Generate All</button>
    </div>
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:0">
      Auto-generates .drawio diagrams from built project intelligence.
      Open in <a href="https://app.diagrams.net" target="_blank" style="color:var(--accent)">diagrams.net</a> or VS Code Draw.io extension.
    </p>
  </div>`;

  for(const t of TYPES){
    const isReady=existingKeys.has(t.key);
    html+=`<div class="card">
      <div class="flex-between mb">
        <div>
          <div style="font-size:14px;font-weight:600">${t.icon} ${escHtml(t.label)}</div>
          <p style="font-size:12px;color:var(--text-dim);margin:4px 0 0">${escHtml(t.desc)}</p>
        </div>
        <span class="tag ${isReady?'tag-green':'tag-yellow'}">${isReady?'Ready':'Not generated'}</span>
      </div>
      <div class="flex gap-sm">
        <button class="btn btn-sm" id="gen-${t.key}"
          onclick="generateDiagram('${t.key}')">
          ${isReady?'🔄 Regenerate':'⚡ Generate'}
        </button>
        ${isReady?`<button class="btn btn-sm btn-outline"
          onclick="downloadDiagram('${t.key}','${t.label}')">
          ⬇ Download .drawio
        </button>`:''}
      </div>
      <div id="diag-status-${t.key}" style="margin-top:8px;font-size:11px;color:var(--text-dim)"></div>
    </div>`;
  }

  return html;
}

async function generateDiagram(dtype){
  if(!state.current)return;
  const pid=state.current.id;
  const btn=document.getElementById(`gen-${dtype}`);
  const status=document.getElementById(`diag-status-${dtype}`);
  if(btn){btn.disabled=true;btn.textContent='⏳ Generating…';}
  if(status)status.textContent='';
  try{
    const r=await api('POST',`/api/projects/${pid}/diagrams/${dtype}/generate`,{});
    if(r.error){
      if(status)status.textContent=`Error: ${r.error}`;
      if(btn){btn.disabled=false;btn.textContent='⚡ Generate';}
    }else{
      toast(`${dtype.replace(/_/g,' ')} diagram generated (${(r.size_bytes/1024).toFixed(1)} KB)`);
      render();
    }
  }catch(e){
    if(status)status.textContent='Generation failed.';
    if(btn){btn.disabled=false;btn.textContent='⚡ Generate';}
  }
}

async function generateAllDiagrams(){
  const types=['dependency_map','risk_heatmap','scope_overview'];
  for(const t of types)await generateDiagram(t);
}

async function downloadDiagram(dtype,label){
  if(!state.current)return;
  const pid=state.current.id;
  try{
    const resp=await fetch(`/api/projects/${pid}/diagrams/${dtype}`);
    if(!resp.ok){toast('Download failed','err');return;}
    const xml=await resp.text();
    const blob=new Blob([xml],{type:'application/xml'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`${dtype}.drawio`;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    toast(`Downloaded ${label}.drawio`);
  }catch(e){toast('Download error','err');}
}

// ═══════════════════════════════════════════════════════════════
// PHASES VIEW
// ═══════════════════════════════════════════════════════════════
async function viewPhases(){
  if(!state.current)return viewNoProject();
  const pid=state.current.id;
  let phases=[];
  try{const r=await api('GET',`/api/projects/${pid}/hierarchy/phases`);phases=r.phases||[];}catch(e){}
  if(!phases.length){
    phases=[
      {id:'pre-sales',label:'Pre-sales',order:1,description:'Client engagement, proposals, scoping',is_current:true,version_count:0,review_count:0},
      {id:'design',label:'Design',order:2,description:'Architecture, solution design, planning',is_current:false,version_count:0,review_count:0},
      {id:'delivery',label:'Delivery',order:3,description:'Execution, development, implementation',is_current:false,version_count:0,review_count:0},
      {id:'support',label:'Support',order:4,description:'Operations, maintenance, handover',is_current:false,version_count:0,review_count:0},
    ];
  }
  const sorted=phases.sort((a,b)=>a.order-b.order);
  const current=sorted.find(p=>p.is_current)||sorted[0];

  const bar=sorted.map(p=>{
    const done=p.order<current.order;
    const cls=p.is_current?'current':done?'done':'pending';
    return`<div class="phase-step ${cls}" onclick="viewPhaseDetail('${p.id}')" title="${escHtml(p.description)}">${escHtml(p.label)}</div>`;
  }).join('');

  let cards='';
  for(const p of sorted){
    const borderStyle=p.is_current?'border-left:3px solid var(--accent)':'';
    cards+=`<div class="card" style="${borderStyle}">
      <div class="flex-between mb">
        <div class="card-title" style="margin:0">
          <span class="icon">${p.is_current?'🟢':'⚪'}</span> ${escHtml(p.label)}
          ${p.is_current?'<span class="tag tag-green" style="margin-left:4px">current</span>':''}
        </div>
        ${p.entered_at?`<span style="font-size:10px;color:var(--text-muted)">Since ${fmtDateShort(p.entered_at)}</span>`:''}
      </div>
      <p style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${escHtml(p.description||'')}</p>
      <div class="flex gap-sm">
        <span class="tag tag-blue">${p.version_count||0} versions</span>
        <span class="tag">${p.review_count||0} reviews</span>
        ${!p.is_current?`<button class="btn btn-xs btn-outline" style="margin-left:auto"
          onclick="doHierarchyTransition('${p.id}')">Transition Here</button>`:''}
      </div>
    </div>`;
  }

  const trans=`<div class="card">
    <div class="card-title mb"><span class="icon">🔄</span>Transition Phase</div>
    <div class="flex gap-sm">
      <select id="nextPhaseH">${phases.filter(p=>!p.is_current).map(p=>`<option value="${p.id}">${escHtml(p.label)}</option>`).join('')}</select>
      <input id="phaseReasonH" placeholder="Reason (optional)" style="flex:1">
      <button class="btn btn-sm" onclick="doHierarchyTransition()">Transition</button>
    </div>
    <div id="phaseHResult" class="mt"></div>
  </div>`;

  return`<div class="card">
    <div class="card-title mb"><span class="icon">🗂️</span>Project Lifecycle</div>
    <p class="card-subtitle">Each phase contains versions and reviews. Click a phase to view its content.</p>
    <div class="phase-bar">${bar}</div>
  </div>`+cards+trans;
}

async function viewPhaseDetail(phaseId){
  const pid=state.current.id;
  let versions=[];
  try{const r=await api('GET',`/api/projects/${pid}/hierarchy/versions`);versions=(r.versions||[]).filter(v=>v.phase_id===phaseId);}catch(e){}
  let html=`<div class="card">
    <div class="flex-between mb">
      <div class="card-title"><span class="icon">🗂️</span>Phase: ${escHtml(phaseId)}</div>
      <button class="btn btn-sm btn-ghost" onclick="render()">← Back</button>
    </div>
    <p class="card-subtitle">${versions.length} versions in this phase</p>`;
  if(versions.length){
    for(const v of versions){
      html+=`<div class="card" style="background:var(--surface2)">
        <div class="flex-between">
          <strong>${escHtml(v.version_id)}</strong>
          <span style="font-size:10px;color:var(--text-muted)">${fmtDateShort(v.created_at)}</span>
        </div>
        <p style="font-size:11px;color:var(--text-dim)">${escHtml(v.label||'')} · ${v.artifact_count||0} files · ${v.review_count||0} reviews</p>
      </div>`;
    }
  }else{html+=`<p style="color:var(--text-muted);font-size:12px;padding:10px 0">No versions in this phase yet.</p>`;}
  html+=`</div>`;
  document.getElementById('main').innerHTML=html;
}

async function doHierarchyTransition(phaseIdOverride){
  const phase=phaseIdOverride||document.getElementById('nextPhaseH').value;
  const reason=document.getElementById('phaseReasonH')?.value||'';
  const r=await api('POST',`/api/projects/${state.current.id}/hierarchy/phase`,{phase_id:phase,reason});
  if(r.error){toast(r.error,'err');return;}
  toast(`Transitioned to ${phase}`);
  await api('POST',`/api/projects/${state.current.id}/phase`,{new_phase:phase,reason});
  state.current.phase=phase;
  setTimeout(()=>render(),600);
}
</script>


<script>
// ═══════════════════════════════════════════════════════════════
// ADMIN VIEW
// ═══════════════════════════════════════════════════════════════
async function viewAdmin(){
  let config={},health={},lifecycle={},suggestions=[];
  try{const r=await api('GET','/api/admin/config');config=r.config||{};}catch(e){}
  try{const r=await api('GET','/api/admin/health');health=r.health||{};}catch(e){}
  try{const r=await api('GET','/api/admin/lifecycle');lifecycle=r.lifecycle||{};}catch(e){}
  try{const r=await api('GET','/api/admin/auto-archive-suggestions');suggestions=r.suggestions||[];}catch(e){}

  const lastRun=health.last_intelligence_run||{};
  const apiStatus=health.api_status||{};

  const healthCard=`<div class="card">
    <div class="card-title mb"><span class="icon">💚</span>System Health</div>
    <p class="card-section">Last Intelligence Run</p>
    ${lastRun.status==='never_run'
      ?`<p style="color:var(--text-muted);font-size:12px">No runs recorded yet</p>`
      :`<div class="flex gap-sm flex-wrap">
          <span class="tag ${lastRun.success?'tag-green':'tag-red'}">${lastRun.success?'Success':'Failed'}</span>
          <strong style="font-size:12px">${escHtml(lastRun.project_name||'')} (${lastRun.version_id||'–'})</strong>
          <span style="color:var(--text-muted);font-size:11px">${fmtDate(lastRun.timestamp)}</span>
          ${lastRun.duration_ms?`<span class="tag">${Math.round(lastRun.duration_ms)}ms</span>`:''}
        </div>
        ${lastRun.error?`<p style="color:var(--red);font-size:11px;margin-top:4px">${escHtml(lastRun.error)}</p>`:''}`}
    <p class="card-section">API Connectivity</p>
    <div class="backend-grid">${Object.entries(apiStatus).map(([n,i])=>`<div class="backend-chip ${i.configured?'ok':''}">
      ${i.configured?'●':'○'} <strong>${n}</strong><br><span>${i.configured?'Configured':'Not set'}</span>
    </div>`).join('')}</div>
  </div>`;

  const configCard=`<div class="card">
    <div class="card-title mb"><span class="icon">⚙️</span>Configuration</div>
    <div class="form-group">
      <div class="form-row" style="flex:0 0 120px"><label>Max Active Projects</label>
        <input id="cfgMaxP" type="number" value="${config.max_active_projects||5}" style="width:80px"></div>
      <div class="form-row" style="flex:1"><label>Default Persona</label>
        <select id="cfgPersona" style="width:100%">
          ${['solution_architect','delivery_manager','product_owner','resource_manager'].map(p=>`<option value="${p}" ${config.default_persona===p?'selected':''}>${p.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}</option>`).join('')}
        </select></div>
      <div class="form-row" style="flex:0 0 120px"><label>Admin PIN</label>
        <input id="cfgPin" type="password" placeholder="Set via ADMIN_PIN env var" style="width:120px"></div>
    </div>
    <p class="card-section">API Keys</p>
    <div class="form-group">
      <div class="form-row" style="flex:1"><label>Groq</label><input id="cfgGroq" type="password" placeholder="${config.api_keys?.groq?'Configured':'Not set'}"></div>
      <div class="form-row" style="flex:1"><label>OpenRouter</label><input id="cfgOR" type="password" placeholder="${config.api_keys?.openrouter?'Configured':'Not set'}"></div>
      <div class="form-row" style="flex:1"><label>Gemini</label><input id="cfgGemini" type="password" placeholder="${config.api_keys?.gemini?'Configured':'Not set'}"></div>
    </div>
    <button class="btn mt" onclick="saveAdminConfig()">Save Configuration</button>
    <div id="configResult" class="mt"></div>
  </div>`;

  const archived=lifecycle.archived||[];
  const deleted=lifecycle.deleted||[];
  const lifecycleCard=`<div class="card">
    <div class="card-title mb"><span class="icon">📁</span>Project Lifecycle Logs</div>
    ${archived.length?`<p class="card-section">Archived (${archived.length})</p>
      <ul class="items">${archived.map(a=>`<li><strong>${escHtml(a.name)}</strong> — ${fmtDateShort(a.archived_at)}
        ${a.restore_allowed!==false?`<button class="btn btn-xs btn-outline" style="margin-left:8px" onclick="restoreProject('${a.project_id}')">Restore</button>`:'<span class="tag" style="margin-left:6px">Restored</span>'}
      </li>`).join('')}</ul>`:`<p style="color:var(--text-muted);font-size:12px">No archived projects.</p>`}
    ${deleted.length?`<p class="card-section">Deleted (${deleted.length})</p>
      <ul class="items">${deleted.map(d=>`<li><strong>${escHtml(d.name)}</strong> — Deleted ${fmtDateShort(d.deleted_at)}</li>`).join('')}</ul>`:''}
  </div>`;

  const suggestCard=suggestions.length?`<div class="card">
    <div class="card-title mb"><span class="icon">💡</span>Auto-Archive Suggestions</div>
    <ul class="items">${suggestions.map(s=>`<li><strong>${escHtml(s.name)}</strong> – inactive ${s.inactive_days} days
      <button class="btn btn-xs btn-yellow" style="margin-left:8px" onclick="archiveProject('${s.project_id}')">Archive</button></li>`).join('')}</ul>
  </div>`:'';

  return healthCard+configCard+lifecycleCard+suggestCard;
}

async function saveAdminConfig(){
  const up={
    max_active_projects:parseInt(document.getElementById('cfgMaxP').value)||5,
    default_persona:document.getElementById('cfgPersona').value,
    admin_pin:document.getElementById('cfgPin').value,
    api_keys:{}
  };
  const g=document.getElementById('cfgGroq').value;
  const o=document.getElementById('cfgOR').value;
  const gm=document.getElementById('cfgGemini').value;
  if(g)up.api_keys.groq=g;
  if(o)up.api_keys.openrouter=o;
  if(gm)up.api_keys.gemini=gm;
  const r=await api('POST','/api/admin/config',up);
  if(r.config){toast('Configuration saved');document.getElementById('configResult').innerHTML=`<p style="color:var(--green)">✓ Saved</p>`;}
  else{toast(r.error||'Save failed','err');}
}

async function restoreProject(pid){
  const pin=prompt('Enter PIN to restore:');
  if(!pin)return;
  const r=await api('POST',`/api/projects/${pid}/restore`,{pin});
  if(r.error){toast(r.error,'err');return;}
  toast(r.message||'Project restored');
  await loadProjects();render();
}
</script>


<script>
// ═══════════════════════════════════════════════════════════════
// SETTINGS VIEW
// ═══════════════════════════════════════════════════════════════
async function viewSettings(){
  const r=await api('GET','/api/projects/all');
  state.allProjects=r.projects||state.projects;
  let maxProjects=5;
  try{const c=await api('GET','/api/admin/config');maxProjects=c.config?.max_active_projects||5;}catch(e){}
  const activeCnt=(state.allProjects||state.projects).filter(p=>p.status!=='archived'&&p.status!=='deleted').length;
  const atLimit=activeCnt>=maxProjects;

  const createCard=`<div class="card">
    <div class="card-title mb"><span class="icon">➕</span>Create New Project</div>
    ${atLimit?`<p style="color:var(--red);font-size:12px;margin-bottom:8px">Limit reached: ${activeCnt}/${maxProjects}. Archive or delete a project first.</p>`
      :`<p class="card-subtitle">Active: ${activeCnt}/${maxProjects}</p>`}
    <div class="form-row"><label>Project Name</label><input id="newName" placeholder="e.g. Cloud Migration"></div>
    <div class="form-row"><label>Description</label><input id="newDesc" placeholder="Optional"></div>
    <button class="btn" onclick="createProject()" ${atLimit?'disabled':''}>Create Project</button>
    <div id="createProjectError" class="mt"></div>
  </div>`;

  const actCard=state.current?`<div class="card">
    <div class="card-title mb"><span class="icon">🗑️</span>Project Actions</div>
    <p class="card-subtitle">Current: <strong>${escHtml(state.current.name)}</strong> (${state.current.id})</p>
    <div class="flex gap-sm">
      <button class="btn btn-sm btn-yellow" onclick="archiveProject()">Archive Project</button>
      <button class="btn btn-sm btn-red" onclick="deleteProject()">Delete Project</button>
    </div>
    <p style="font-size:10px;color:var(--text-muted);margin-top:6px">Requires admin PIN (set via <code>ADMIN_PIN</code> env var)</p>
  </div>`:'';

  const allCard=(state.allProjects||[]).length?`<div class="card">
    <div class="card-title mb"><span class="icon">📂</span>All Projects</div>
    <ul class="items">${(state.allProjects||[]).map(p=>`<li>
      <a href="#" onclick="selectProject('${p.id}')">${escHtml(p.name)}</a>
      <span class="tag" style="margin-left:4px">${p.phase||'–'}</span>
      <span style="font-size:10px;color:var(--text-muted)">${p.file_count} files</span>
      ${p.status==='archived'?'<span class="tag tag-yellow" style="margin-left:4px">archived</span>':''}
    </li>`).join('')}</ul>
  </div>`:'';

  const bkCard=`<div class="card">
    <div class="card-title mb"><span class="icon">🤖</span>AI Backends</div>
    <div class="backend-grid">${state.backends.map(b=>`<div class="backend-chip ${b.available?'ok':''}">
      ${b.available?'●':'○'} <strong>${b.name}</strong><br><span style="font-size:10px">${escHtml(b.display_name||b.name)}</span>
    </div>`).join('')}</div>
    <p style="font-size:11px;color:var(--text-muted);margin-top:8px">
      Set via env vars: GROQ_API_KEY · OPENROUTER_API_KEY · GEMINI_API_KEY · AWS credentials
    </p>
  </div>`;

  return createCard+actCard+allCard+bkCard;
}

async function archiveProject(pid){
  const id=pid||state.current?.id;if(!id)return;
  const pin=prompt('Enter PIN to archive:');if(!pin)return;
  const r=await api('POST',`/api/projects/${id}/archive`,{pin});
  if(r.error){toast(r.error,'err');return;}
  toast(r.message||'Archived');
  await loadProjects();state.current=state.projects[0]||null;state.tab='dashboard';render();
}
async function deleteProject(){
  if(!state.current)return;
  if(!confirm(`Permanently delete "${state.current.name}"?`))return;
  const pin=prompt('Enter PIN to delete:');if(!pin)return;
  const r=await api('POST',`/api/projects/${state.current.id}/delete`,{pin});
  if(r.error){toast(r.error,'err');return;}
  toast(r.message||'Deleted');
  await loadProjects();state.current=state.projects[0]||null;state.tab='dashboard';render();
}

// ═══════════════════════════════════════════════════════════════
// SHARED ACTIONS
// ═══════════════════════════════════════════════════════════════
async function createProject(){
  const name=document.getElementById('newName').value.trim();
  const desc=document.getElementById('newDesc')?.value||'';
  if(!name)return;
  const r=await api('POST','/api/projects',{name,description:desc});
  if(r.project){
    await loadProjects();state.current=state.projects.find(p=>p.id===r.project.id)||r.project;
    state.tab='dashboard';toast(`Project "${name}" created`);render();
  }else if(r.error){
    const el=document.getElementById('createProjectError');
    if(el)el.innerHTML=`<p style="color:var(--red);font-size:12px;margin-top:6px">${escHtml(r.error)}</p>`;
    else toast(r.error,'err');
  }
}

async function selectProject(id){
  state.current=state.projects.find(x=>x.id===id)||state.current;
  state.tab='dashboard';render();
}

async function buildContext(){
  if(!state.current)return;
  let nextNum=1;
  try{const r=await api('GET',`/api/projects/${state.current.id}/hierarchy/versions`);nextNum=(r.versions||[]).length+1;}catch(e){}
  const label=prompt(`Label this version (optional, max 20 chars).\nWill create: v${nextNum} – [label]`,'');
  if(label===null)return;
  const trimmed=(label||'').trim().slice(0,20);

  // Pick the AI backend: use project setting if configured, otherwise files_only
  const selectedBackend=(state.current.ai_backend&&state.current.ai_backend!=='files_only')
    ?state.current.ai_backend
    :(state._intelBackend||'files_only');

  const payload={};
  if(trimmed)payload.label=trimmed;
  if(selectedBackend&&selectedBackend!=='files_only')payload.ai_backend=selectedBackend;

  const r=await api('POST',`/api/projects/${state.current.id}/build-context`,payload);
  if(r._build_metadata){
    const meta=r._build_metadata;
    const aiTag=meta.ai_enriched?` ✨ AI (${meta.ai_backend})`:'';
    toast(`Built v${nextNum}${aiTag}: ${meta.total_risks||0} risks, ${meta.total_constraints||0} constraints`);
    render();
  }else if(r.error){toast(r.error,'err');}
}

async function loadProjects(){
  const r=await api('GET','/api/projects');
  state.projects=r.projects||[];
  if(!state.current&&state.projects.length)state.current=state.projects[0];
}
async function loadBackends(){
  const r=await api('GET','/api/backends');
  state.backends=r.backends||[];
}

// ─── Bootstrap ───────────────────────────────────────────────
async function loadAppInfo(){
  try{
    const h=await api('GET','/api/health');
    if(h.app){state.appName=h.app;document.title=h.app;}
  }catch(e){}
}
(async()=>{await Promise.all([loadProjects(),loadBackends(),loadAppInfo()]);render();})();
</script>
</body>
</html>
